name: "NFC.cool"
preset: "minimal"
colorScheme: "custom"
fontPairing: "custom"
selfHostedFonts: true
favicons:
   - "images/favicon.png"
css:
   - "css/theme-base.css"
   - "css/landing.css"
js:
   - "js/theme.js"
headInlineScript: "(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})()"
logo:
   image: "images/nfc-cool-logo-dark.svg"
   darkImage: "images/nfc-cool-logo-light.svg"
tokens:
   colorAccent:
      any: "#FFC700"
      dark: "#FFD54F"
   colorAccentHover:
      any: "#E6B400"
      dark: "#FFC700"
   colorAccentLight:
      any: "rgba(255, 199, 0, 0.1)"
      dark: "rgba(255, 199, 0, 0.15)"
   colorBg:
      any: "#FFFFFF"
      dark: "#0D1117"
   colorBgAlt:
      any: "#F6F8FA"
      dark: "#161B22"
   colorBgCard:
      any: "#FFFFFF"
      dark: "#21262D"
   colorText:
      any: "#24292F"
      dark: "#E6EDF3"
   colorTextSecondary:
      any: "#57606A"
      dark: "#8B949E"
   colorTextMuted:
      any: "#6E7781"
      dark: "#7D8590"
   colorBorder:
      any: "#D0D7DE"
      dark: "#30363D"
   colorBorderLight:
      any: "#E8ECF0"
      dark: "#21262D"
   colorShadow:
      any: "rgba(31, 35, 40, 0.08)"
      dark: "rgba(0, 0, 0, 0.25)"
   colorShadowLg:
      any: "rgba(31, 35, 40, 0.15)"
      dark: "rgba(0, 0, 0, 0.4)"
   fontHeading:
      family: "Titillium Web"
      weights: [400, 600, 700]
   fontBody:
      family: "Titillium Web"
      weights: [400, 600, 700]
   maxWidth: "1200px"
   contentWidth: "720px"
   headerHeight: "64px"
   radius: "8px"
   radiusLg: "12px"