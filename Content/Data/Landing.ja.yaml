faqTitle: "よくある質問"
faq:
  - question: "NFC.coolは無料ですか?"
    answer: "はい、NFC.cool ToolsとNFC.cool BusinessCardはApp StoreとGoogle Playから無料でダウンロードできます。オプションのアプリ内サブスクリプションでNFC Safe(256ビットAES暗号化)、3Dスキャンの書き出し、無制限Webhookが利用可能になります。それ以外のすべての機能は永続的に無料です。"
  - question: "対応プラットフォームは何ですか?"
    answer: "NFC.cool ToolsはiPhone、iPad、Androidに対応しています。NFC.cool Business CardはiPhone専用ですが、その機能はAndroidではNFC.cool Toolsに統合されているため、Androidユーザーも2つ目のアプリを入れずに同じデジタル名刺機能を利用できます。"
  - question: "NFC.coolはオフラインで動作しますか?"
    answer: "はい。タグの読み書き、QRコードのスキャン、バーコードのスキャン、ドキュメントOCR、3Dキャプチャはすべて端末上で完結します。オプションのクラウド機能(自社サーバーへのWebhook、Business Cardのプッシュ通知)のみインターネット接続が必要です。"
  - question: "NFC.coolは私を追跡したり、データを販売したりしますか?"
    answer: "いいえ。NFC.coolはサードパーティの分析、広告SDK、トラッキングピクセルを一切使用していません。スキャンデータは、自分でWebhookに送信しない限り端末から外に出ません。クラッシュログはAppleの匿名の診断データで、iOSの設定でオプトアウトできます。"
  - question: "どのNFCタグがNFC.coolで使えますか?"
    answer: "NDEF準拠のNFCタグなら何でも対応します - NTAG213、NTAG215、NTAG216、MIFARE Ultralight、ICODE SLIXなど。一般的な用途には924バイト容量とiPhone・Androidとの互換性の高さからNTAG216をおすすめします。"
  - question: "NFC.coolはQRコードとバーコードをスキャンできますか?"
    answer: "はい。NFC.cool Toolsは一般的なすべてのQRコードと、20以上のバーコード形式(EAN、UPC、Code 128、Aztec、PDF417、Data Matrixなど)を、カメラからリアルタイムで、または写真ライブラリの画像からスキャンできます。バッチモードは在庫管理やイベント受付向けにカメラを開いたままにします。"
  - question: "iPhoneでNFCタグに書き込めますか?"
    answer: "はい - iPhone XS以降ならNFC.cool ToolsでNFCタグに書き込めます。URL、Wi-Fi認証情報、連絡先カード(vCard)、iOSショートカット、決済、SNSプロフィールなど25種類以上のメッセージタイプから選択できます。Tap-to-Unlockワークフロー向けに、NFC Safe(256ビットAES)で機密情報を事前に暗号化することも可能です。"
  - question: "NFC.coolはiOSショートカットとアクションボタンに対応していますか?"
    answer: "はい。NFC.cool ToolsはApp Intents、iOSショートカットアクション、ロック画面ウィジェット、アクションボタンのフックをサポートしています。コントロールセンター、ホーム画面、Apple Watchから任意のスキャンを即起動でき、スキャンをチェーンして独自の自動化を構築できます。"
  - question: "NFC.cool Business Cardはアプリなしでどう名刺を共有しますか?"
    answer: "Apple AppClip(ダウンロード不要で即共有、システムポップオーバーに名刺が表示)、QRコード、Apple Walletパス、または公開ウェブプロフィールURLで共有できます。受信側はワンタップで連絡先を保存できます - NFC.coolのインストールやアカウント作成は不要です。"
  - question: "NFC.coolはオープンソースですか?"
    answer: "アプリ自体はオープンソースではありませんが、データは可搬性があります。すべてのスキャンはデフォルトで端末上にとどまり、NFC.coolのサーバーには何も送信されません。開発者はWebhook、App Intents、iOSショートカット、URLスキームを通じてスキャン出力を独自のスタックに統合できます - 詳細はDevelopersページをご覧ください。"

