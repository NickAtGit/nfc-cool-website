faqTitle: "よくある質問"
faq:
  - question: "私のスマートフォンはNFCに対応していますか?"
    answer: "iPhone 7以降のすべてのiPhoneがNFCに対応しており、iPhone XS以降ならアプリを起動せずロック画面からタグを読み取れます。Androidは2015年以降のほとんどの機種でNFCに対応しています — お使いの機種のスペックをご確認ください。NFC.coolは初回起動時に対応状況をお知らせします。"
  - question: "iOSとAndroidの違いは?"
    answer: "iPhone版はフル機能のスキャン・ツールキットです — NFC、QR・バーコード、書類(OCR付き)、3D・ルームスキャン。Android版はNFCの読み取りと書き込みに加え、デジタル名刺機能を備えています。その他のツールはAndroidのロードマップに含まれています。"
  - question: "デジタル名刺は別のアプリですか?"
    answer: "iPhoneでは、はい — NFC.cool Business Card Makerはbusiness-card.nfc.coolで提供されている専用アプリです。Androidでは同じデジタル名刺機能がNFC.cool Toolsに組み込まれており、追加のインストールは必要ありません。"
  - question: "どのNFCタグを買えばいいですか?"
    answer: "iPhone用には、NTAGシリーズのType 2タグ(NTAG213/215/216)が最も適しています。NFC.coolはNFC Forum仕様(Type 1–5)に完全対応しており、MIFARE Classic、MIFARE Ultralight、MIFARE DESFire、ISO 14443、ISO 15693、FeliCaなどを含みます。極端に安いステッカーは避けてください — アンテナの品質が重要です。"
  - question: "3D・ルームスキャンには専用のiPhoneが必要ですか?"
    answer: "ルームスキャンにはAppleのLiDARセンサーが必要です — iPhone 12 Pro以降のProモデル、およびiPad Pro 2020以降が対象です。フォトグラメトリベースの3Dオブジェクト・スキャンは、iOS 17に対応し十分な処理能力を持つ任意のiPhone(おおむね2020年以降のモデル)で動作します。"
  - question: "アプリは無料ですか?"
    answer: "はい — App StoreとGoogle Playで両方とも無料で、広告もありません。アプリ内で一部の高度なワークフローはアンロック方式で提供される場合がありますが、NFC、QR、書類、3D、デジタル名刺の中核機能はすべて無料です。"
  - question: "私のデータはどこに保存されますか?"
    answer: "標準ではすべてがあなたのデバイス上に保存されます — スキャン、書き込みタグ、連絡先、書類、3Dモデル。NFC.coolにアップロードされることはありません。ご自身のサーバーへスキャン・データを転送したい場合はWebhookを有効にできますが、その場合でもNFC.coolはデータを参照しません。"
  - question: "企業でもNFC.coolを利用できますか?"
    answer: "はい — Webhookを使えば、チームのバックエンドやCRM、自動化ツール(Zapier、n8n、Make)へNFCやQRのスキャンを直接送信できます。NFC.coolのアカウントもアップロードも不要で、データが当社のサーバーを通ることはありません。大規模なNFCタグ・キャンペーンやカスタムブランディングのご相談はhello@nfc.coolまで。"
  - question: "GDPRに準拠していますか?"
    answer: "アプリはデバイス上でデータを処理するため、標準モードでは個人データがNFC.coolへ転送されることはありません。ウェブサイト自体もCookieを使用しません。ニュースレター(Mailjet)が唯一の第三者データフローですが、フォームはセルフホストなので訪問時にCookieは設定されません。詳しくはプライバシーポリシーをご覧ください。"
  - question: "OCRはどの言語に対応していますか?"
    answer: "書類スキャンはAppleのVisionフレームワークを使用しており、現在は英語、フランス語、イタリア語、ドイツ語、スペイン語、ポルトガル語、簡体字中国語を認識します。手書き認識はiOS 16以降でサポートされます。"
  - question: "Mac、iPad、Apple Watch版はありますか?"
    answer: "LiDAR搭載のiPad ProではiPhone版アプリが動作し、3D・ルームスキャンのフル機能を利用できます。現時点でMacやApple Watch専用アプリはありませんが、Business CardのAppClipはContinuity経由でApple WatchとMacの両方で動作します。"
  - question: "バグ報告や機能リクエストはどこへ?"
    answer: "hello@nfc.coolまでご連絡ください — すべてのご提案を記録し、ロードマップに反映します。通常は1日以内にお返事いたします。"

