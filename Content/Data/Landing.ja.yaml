faqTitle: "よくある質問"
faq:
  - question: "NFC.coolは無料ですか?"
    answer: "はい - NFC.cool ToolsとNFC.cool Business CardはApp StoreとGoogle Playから無料でダウンロードできます。NFCタグの読み取り、QRコードとバーコードのスキャン、ドキュメントスキャン(OCR付き)、3D・ルームスキャンはすべて無料。オプションのPlatinumサブスクリプションでは、NFC Safe(256ビットAES暗号化シークレット)、高度なNFC操作(フォーマット、パスワード保護、ロック、バッチモード、CSV書き込み、エキスパートコマンド、タップカウンター)、QRパワー機能(透かしなし、バッチ読み取り)、ドキュメントのPDFエクスポートとiCloudへの自動エクスポート、3D面積計算・モデルエクスポート・写真エクスポート、iOSショートカット・ウィジェット・コントロールセンター、Webhook、音声合成、プレミアムアプリアイコンとカラー、広告非表示と優先サポートが利用できます。"
  - question: "対応プラットフォームは何ですか?"
    answer: "NFC.cool ToolsはiPhone、iPad、Androidに対応しています。NFC.cool Business CardはiPhone専用ですが、その機能はAndroidではNFC.cool Toolsに統合されているため、Androidユーザーも2つ目のアプリを入れずに同じデジタル名刺機能を利用できます。iPadではカメラを使うすべての機能(QR、バーコード、ドキュメント、3D、ルームスキャン)が動作しますが、iPadにはNFCハードウェアがないため、NFCの読み書きにはiPhoneが必要です。"
  - question: "NFC.coolをどう始めればいいですか?"
    answer: "App StoreまたはGoogle PlayからNFC.cool Toolsをダウンロードし、各タブを試してみましょう - NFCはタグの読み書き、QRはQRコードとバーコード、Documentは紙からPDFへの変換、3Dは物体や部屋のキャプチャ用です。アカウント登録は不要、すべて端末上で動作します。"
  - question: "最初のNFCタグをどうスキャンしますか?"
    answer: "NFC.cool Toolsを開いて「NFCを読む」をタップし、iPhoneの上端をNFCタグに近づけます - NFC.coolがタグの内容を解析した画面で開きます。アプリのインストール以外、セットアップは不要です。"
  - question: "最初のNFCタグをどう書き込みますか?"
    answer: "NFC.cool Toolsを開いてNFCタブの「NFCを書き込む」を選び、メッセージタイプ(URL、Wi-Fi認証情報、連絡先カード、iOSショートカットなど)を選んでデータを入力したら、iPhoneの上端を空のNTAG216(またはNDEF準拠タグ)に近づけるだけ。これで誰がタップしても選んだアクションが実行されます。NDEFタグは<a href=\"/ja/affiliate-links/\">NFCタグページ</a>にある販売店から購入できます。"
  - question: "NFC.coolはオフラインで動作しますか?"
    answer: "はい。NFCタグの読み書き、QRコードのスキャン、バーコードのスキャン、ドキュメントOCR、3D・ルームキャプチャはすべて端末上で完結します。オプションのクラウド機能(自社サーバーへのWebhook、iCloud Sync)のみインターネット接続が必要です。"
  - question: "どのNFCタグがNFC.coolで使えますか?"
    answer: "NDEF準拠のNFCタグなら何でも対応します - NTAG213、NTAG215、NTAG216、MIFARE Ultralight、ICODE SLIXなど。一般的な用途には888バイト容量とiPhone・Androidとの互換性の高さからNTAG216をおすすめします。テスト済みの販売店は<a href=\"/ja/affiliate-links/\">NFCタグページ</a>でご確認いただけます。"
  - question: "NFC.coolはQRコードとバーコードをスキャンできますか?"
    answer: "はい - iPhoneカメラまたは写真ライブラリの画像から19種類のコード形式を認識できます。2次元コードは6種類(QRコード、Micro QR、Aztec、Data Matrix、PDF417、Micro PDF417)、リニアバーコードは13種類(EAN-13、EAN-8、UPC-E、Code 39 およびMod 43、Code 93、Code 128、Codabar、Interleaved 2 of 5、ITF-14、GS1 DataBarの3バリアント)。UPC-Aは先頭にゼロを補ってEAN-13として読み取られます。バッチモードは在庫管理やイベント受付向けにカメラを開いたままにします。"
  - question: "iPhoneでNFCタグに書き込めますか?"
    answer: "はい - iPhone 7以降ならNFC.cool ToolsでNFCタグの読み書きが両方できます。URL、Wi-Fi認証情報、連絡先カード(vCard)、iOSショートカット、決済、SNSプロフィールなど25種類以上のメッセージタイプから選択できます。Tap-to-Unlockワークフロー向けに、NFC Safe(256ビットAES)で機密情報を事前に暗号化することも可能です。"
  - question: "NFC.coolはiOSショートカットとアクションボタンに対応していますか?"
    answer: "はい、Platinumプランで対応しています。NFC.cool ToolsはApp Intents、iOSショートカットアクション、ロック画面およびホーム画面ウィジェット、アクションボタンのフック、コントロールセンターのクイック起動を備えています - スキャンをチェーンして独自の自動化を作るも、ボタン1つで起動するも自由自在。無料プランは基本のスキャン&共有フローをカバー、ショートカット・ウィジェット・アクションボタンはオプションのPlatinumサブスクリプションで利用可能です。"
  - question: "NFC.cool Business Cardはアプリなしでどう名刺を共有しますか?"
    answer: "Apple AppClip(ダウンロード不要で即共有、システムポップオーバーに名刺が表示)、QRコード、Apple Walletパス、または公開ウェブプロフィールURLで共有できます。受信側はワンタップで連絡先を保存できます - NFC.coolのインストールやアカウント作成は不要です。"
  - question: "NFC.coolは他のNFCアプリとどう違いますか?"
    answer: "ほとんどのNFCアプリは読み取りか書き込みのどちらかに特化していますが、NFC.cool Toolsはその両方に加えて、QRコード、バーコード、ドキュメントOCR、3Dキャプチャ、ルームスキャンを1つのアプリで提供します。違いはあと3つ。プライバシー(スキャンデータは端末上に留まり、NFC.coolのサーバーには送信されません)。深いiOS統合(App Intents、ショートカット、ロック画面ウィジェット、アクションボタン、Webhook)で、スキャンがアプリ内に閉じ込められず自分の自動化を起動。そして、開発者本人がメールに直接返信し、数日以内に修正をリリースする手厚いサポート。"

