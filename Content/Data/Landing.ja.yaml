hero:
  title: "iPhone・Android対応 NFCリーダー＆スキャナー"
  subtitle: "NFCタグ、QRコード、バーコード、書類、3Dモデル、お部屋までスキャン!"

description: "NFCタグ、QRコード、バーコード、書類、3Dモデル、お部屋まで - NFC.coolは、iPhoneとAndroid向けのオールインワン・スキャンツールキット。無料でダウンロードできます。"

heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"
heroImageWidth: 2540
heroImageHeight: 2540

ogImage: "/assets/images/og-landing.webp"
ogImageAlt: "NFC.cool - NFCタグ、QRコード、バーコード、書類、3Dオブジェクト、ルームをスキャン"

featuresTitle: "スキャンに必要なすべてが、ひとつに"
features:
  - title: "NFCの読み取り & 書き込み"
    description: "あらゆるNFCタグを読み取り、25種類以上のメッセージタイプを書き込み - リンク、Wi-Fi、連絡先、決済、ショートカット、SNSプロフィール。NFC Safe(256ビットAES)で機密情報を暗号化できます。"
    imagePath: "/assets/images/Webflow/nfc-card.webp"
    platforms: "iOS · Android"
    slug: "nfc-reader-writer"
  - title: "QRコードのスキャン & スタジオ"
    description: "カメラからQRコードをスキャン、または写真から検出。組み込みのQRコードスタジオでロゴ、カスタムカラー、Genmojiを使ったオリジナルデザインも作成できます。"
    imagePath: "/assets/images/Webflow/qr-studio.webp"
    platforms: "iOSのみ"
    slug: "qr-scanner"
  - title: "バーコード・スキャン"
    description: "全19種類のバーコード形式に対応 - EAN、UPC、Code 128、PDF417、Aztec、Data Matrix、そして他13種類。バッチモードでカメラを開いたまま、棚卸しやイベントの受付に活用できます。"
    imagePath: "/assets/images/Webflow/qr-barcode.webp"
    platforms: "iOSのみ"
    slug: "barcode-scanner"
  - title: "OCR付き書類スキャン"
    description: "自動エッジ検出とオンデバイスOCRで書類を取り込み、検索可能なPDFとして保存できます。"
    imagePath: "/assets/images/Webflow/document-scan.webp"
    platforms: "iOSのみ"
    slug: "document-scanner"
  - title: "3Dオブジェクト・スキャナー"
    description: "AppleのObject Captureが、現実世界のオブジェクトの周りを歩く間にテクスチャ付き3Dモデルを構築します。AR Quick Look用のUSDZ、Blender用のOBJに書き出し。LiDAR搭載のiPhone Pro / iPad Proが必要です。"
    imagePath: "/assets/images/Webflow/3d-object.webp"
    platforms: "iOSのみ"
    slug: "3d-object-scanner"
  - title: "ルーム・スキャナー"
    description: "LiDAR搭載デバイスで間取り図を自動生成し、ドア、窓、家具まで認識します。LiDAR搭載iPhone(12 Pro以降)または新しめのiPad Proが必要です。"
    imagePath: "/assets/images/Webflow/scan-room.webp"
    platforms: "iOSのみ"
    slug: "room-scanner"
  - title: "Webhook & オートメーション"
    description: "WebhookでスキャンデータをリアルタイムにあなたのサーバーへPOST - NFC、QR、バーコードに対応。他に4つのiOS専用フック(自動ショートカット、音声合成、オーディオ、リンクオープン)で機能を拡張。データが当社のサーバーを経由することはありません。"
    imagePath: "/assets/images/Webflow/webhook.webp"
    platforms: "iOS · Android"
    slug: "webhooks"
  - title: "ショートカット & ウィジェット"
    description: "iOSショートカット、ロック画面ウィジェット、Action Buttonと連携。ホーム画面やコントロールセンターからスキャンを即起動できます。"
    imagePath: "/assets/images/Tools-iOS/Screenshot-4.webp"
    platforms: "iOSのみ"

