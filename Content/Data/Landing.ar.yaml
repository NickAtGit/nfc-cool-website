faqTitle: "الأسئلة الشائعة"
faq:
  - question: "هل NFC.cool مجاني؟"
    answer: "نعم - تنزيل NFC.cool Tools وNFC.cool Business Card مجاني. قراءة وسوم NFC، ومسح رموز QR والباركود، ومسح المستندات باستخدام OCR، والمسح ثلاثي الأبعاد ومسح الغرف، كلها مجانية. ويفتح اشتراك Platinum الاختياري ميزة NFC Safe (أسرار مشفّرة بمعيار 256-bit AES)؛ وأدوات تحكّم NFC المتقدمة (التهيئة، والحماية بكلمة مرور، والقفل، وأوضاع الدفعات، والكتابة عبر CSV، وأوامر الخبراء، وعدّاد اللمسات)؛ وميزات QR الاحترافية (بلا علامات مائية، وقراءة بالدفعات)؛ وتصدير المستندات إلى PDF والتصدير التلقائي إلى iCloud؛ وحساب المساحة ثلاثية الأبعاد وتصدير النماذج والصور؛ واختصارات iOS والأدوات ومركز التحكم؛ وwebhooks؛ ومحوّل النص إلى كلام؛ وأيقونات وألوان تطبيق مميّزة؛ ودعمًا ذا أولوية وبلا إعلانات."
  - question: "ما المنصّات المدعومة؟"
    answer: "يعمل NFC.cool Tools على iPhone وiPad وAndroid. أما NFC.cool Business Card فيقتصر على iPhone - لكن ميزاته مدمجة في NFC.cool Tools على Android، فيحصل مستخدمو Android على قدرات بطاقة العمل الرقمية نفسها دون تثبيت تطبيق ثانٍ. وعلى iPad، تعمل جميع الميزات المعتمدة على الكاميرا (QR والباركود والمستندات والمسح ثلاثي الأبعاد ومسح الغرف)، لكن قراءة وكتابة NFC تتطلبان iPhone لأن أجهزة iPad لا تأتي بعتاد NFC."
  - question: "كيف أبدأ مع NFC.cool؟"
    answer: "نزّل NFC.cool Tools من App Store أو Google Play، ثم استكشف التبويبات: NFC لقراءة الوسوم وكتابتها، وQR لرموز QR والباركود، وDocument لمسح الورق وتحويله إلى PDF، و3D لالتقاط الأجسام والغرف. لا حاجة إلى حساب - كل شيء يعمل على الجهاز."
  - question: "كيف أمسح أول وسم NFC لي؟"
    answer: "افتح NFC.cool Tools، واضغط \"Read NFC\"، ثم قرّب الحافة العلوية من iPhone إلى وسم NFC - عندها يفتح NFC.cool عارضًا محتوى الوسم بعد تحليله. لا إعداد يُذكر سوى تثبيت التطبيق. وعلى هاتف Android يمكنك تجربته فورًا عبر <a href=\"/online-nfc-reader/\">قارئ NFC عبر الإنترنت</a> - دون الحاجة إلى أي تثبيت."
  - question: "كيف أكتب أول وسم NFC لي؟"
    answer: "افتح NFC.cool Tools، وانتقل إلى تبويب NFC واختر \"Write NFC\"، ثم اختر نوع الرسالة (رابط URL، أو بيانات Wi-Fi، أو بطاقة جهة اتصال، أو اختصار iOS، وغيرها)، وأدخل البيانات، ثم قرّب الحافة العلوية من iPhone إلى وسم NTAG216 فارغ (أو أي وسم متوافق مع NDEF). الآن يؤدي أي شخص يلمس ذلك الوسم إلى تشغيل الإجراء الذي اخترته. اشترِ وسوم NDEF من أي من المتاجر المدرجة في <a href=\"/affiliate-links/\">صفحة وسوم NFC</a>."
  - question: "هل يعمل NFC.cool دون اتصال بالإنترنت؟"
    answer: "نعم. قراءة وسوم NFC وكتابتها، ومسح رموز QR، ومسح الباركود، وOCR للمستندات، والالتقاط ثلاثي الأبعاد والتقاط الغرف، كلها تعمل بالكامل على الجهاز. وحدها الميزات السحابية الاختيارية (إرسال webhooks إلى خادمك، ومزامنة iCloud) تحتاج إلى الإنترنت."
  - question: "ما وسوم NFC المتوافقة مع NFC.cool؟"
    answer: "أي وسم NFC متوافق مع NDEF - NTAG213 وNTAG215 وNTAG216 وMIFARE Ultralight وICODE SLIX ومعظم الأنواع الأخرى. وNTAG216 هو الخيار الافتراضي الموصى به للاستخدام العام بفضل سعته البالغة 888 بايت وتوافقه الواسع مع iPhone وAndroid. راجع <a href=\"/affiliate-links/\">صفحة وسوم NFC</a> للاطّلاع على متاجر مُختبَرة."
  - question: "هل يستطيع NFC.cool مسح رموز QR والباركود؟"
    answer: "نعم - يتعرّف على ١٩ صيغة من كاميرا iPhone أو من أي صورة في مكتبتك: ٦ رموز ثنائية الأبعاد (QR Code وMicro QR وAztec وData Matrix وPDF417 وMicro PDF417) و١٣ باركودًا خطيًا (EAN-13 وEAN-8 وUPC-E وCode 39 بما في ذلك Mod 43 وCode 93 وCode 128 وCodabar وInterleaved 2 of 5 وITF-14، إضافة إلى أنواع GS1 DataBar الثلاثة). ويُقرأ UPC-A على أنه EAN-13 مع صفر بادئ. ويبقي وضع الدفعات الكاميرا مفتوحة لجرد المخزون وتسجيل الحضور في الفعاليات."
  - question: "هل يمكنني كتابة وسوم NFC باستخدام iPhone؟"
    answer: "نعم - كل iPhone بدءًا من iPhone 7 فصاعدًا يستطيع قراءة وسوم NFC وكتابتها باستخدام NFC.cool Tools. اختر من أكثر من ٢٥ نوع رسالة: روابط URL، وبيانات Wi-Fi، وبطاقات جهات الاتصال (vCard)، واختصارات iOS، والمدفوعات، والملفات الاجتماعية، وغيرها. شفّر أسرارك أولًا بميزة NFC Safe (256-bit AES) لأنشطة الفتح باللمس."
  - question: "هل يدعم NFC.cool اختصارات iOS وزر الإجراء (Action Button)؟"
    answer: "نعم، في باقة Platinum. يوفّر NFC.cool Tools ميزات App Intents، وإجراءات اختصارات iOS الأصلية، وأدوات لشاشة القفل والشاشة الرئيسية، وروابط لزر الإجراء (Action Button)، والتشغيل السريع من مركز التحكم - اربط عمليات المسح بأتمتة خاصة بك أو شغّلها بزر واحد. تغطّي الباقة المجانية سير المسح والمشاركة الأساسي؛ أما ميزات الاختصارات والأدوات وزر الإجراء فتأتي ضمن اشتراك Platinum الاختياري."
  - question: "كيف يشارك NFC.cool Business Card بطاقتي دون تطبيق؟"
    answer: "عبر Apple AppClip (مشاركة فورية دون تنزيل، إذ يرى المستلمون بطاقتك في نافذة منبثقة من النظام)، أو رمز QR، أو بطاقة Apple Wallet، أو رابط ملف شخصي عام على الويب. يحفظ المستلمون جهة اتصالك في هواتفهم بلمسة واحدة - دون الحاجة إلى تثبيت NFC.cool أو إنشاء حساب."
  - question: "بم يختلف NFC.cool عن تطبيقات NFC الأخرى؟"
    answer: "معظم تطبيقات NFC تركّز على القراءة أو الكتابة فقط - أما NFC.cool Tools فيؤدّي الأمرين، إضافة إلى رموز QR والباركود وOCR للمستندات والالتقاط ثلاثي الأبعاد ومسح الغرف في تطبيق واحد. وهناك ثلاثة فوارق أخرى: الخصوصية (تبقى بيانات المسح على الجهاز ولا تُرسَل أبدًا إلى خوادم NFC.cool)؛ والتكامل العميق مع iOS (App Intents والاختصارات وأدوات شاشة القفل وزر الإجراء وwebhooks) بحيث تُشغّل عمليات المسح أتمتتك الخاصة بدل أن تبقى حبيسة التطبيق؛ ودعم المطوّر الفردي النشط - إذ يقرأ المطوّر كل رسالة بنفسه ويصدر الإصلاحات خلال أيام."

