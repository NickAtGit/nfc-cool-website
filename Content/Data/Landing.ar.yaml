hero:
  title: "قارئ وسوم NFC وكاتبها وماسحها - NFC.cool Tools"
  subtitle: "اقرأ واكتب وسوم NFC مجانًا على iPhone وAndroid - وعلى iPhone أيضًا، امسح رموز QR والباركود والمستندات والنماذج ثلاثية الأبعاد والغرف."

description: "أدوات NFC مجانية لـiPhone وAndroid. اقرأ أي وسم NFC بلمسة، واكتب وسومك الخاصة بالروابط وشبكات Wi-Fi وجهات الاتصال، إضافة إلى مسح رموز QR والباركود والمستندات."

