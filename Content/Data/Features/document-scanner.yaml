faqTitle: "Frequently Asked"
faq:
  - question: "Does the OCR work offline?"
    answer: "Yes. iOS Vision handles OCR entirely on-device. You can scan and OCR documents on a plane, in the bush, anywhere."
  - question: "What languages does OCR support?"
    answer: "iOS Vision currently recognises English, French, Italian, German, Spanish, Portuguese, and simplified Chinese. Handwriting recognition is supported in addition."
  - question: "How accurate is the OCR?"
    answer: "Very high for printed text. Handwriting accuracy depends on neatness and contrast. You can edit any recognised text after the scan."
  - question: "Where are scanned documents stored?"
    answer: "Free tier: in the app sandbox on the device. Platinum: optionally auto-exported to iCloud Documents so they show up in the Files app and on every device signed into your iCloud."

