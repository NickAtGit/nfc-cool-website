hero:
  title: "Document Scanner with OCR"
  subtitle: "Capture documents with automatic edge detection and perspective correction. On-device OCR turns every scan into searchable text."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/document-scan.webp"

capabilitiesTitle: "What You Can Do"
capabilities:
  - title: "Auto Edge Detection"
    description: "Aim at a page; NFC.cool finds the corners and snaps automatically. Multi-page scans capture an entire stack in one session."
  - title: "Perspective Correction"
    description: "Skewed shot? NFC.cool warps the page to a clean rectangle, removes shadows, and boosts contrast so the result looks like a flat scan."
  - title: "On-Device OCR"
    description: "Text recognition happens locally on your iPhone - no document, no text leaves the device. Every page's recognized text is stored alongside the image and searchable inside the app."
  - title: "PDF Export with Embedded Text"
    description: "Build a multi-page PDF with the OCR'd text layer embedded, so every word is selectable, copyable, and searchable in any PDF reader."
  - title: "Quick Share & Save"
    description: "Send via Mail, Messages, or AirDrop, or save to Files. No watermark, no signup, no NFC.cool branding."

subsectionsTitle: "Smarter than a Screenshot"
subsections:
  - title: "Multi-Page Scans + Auto Title"
    body: "<p>Documents aren't always one page. NFC.cool keeps the camera open between captures, lets you reorder pages, drop the duds, and binds everything into one document. A built-in title-suggestion service reads the first page and proposes a sensible filename - saves you the renaming dance every time.</p>"
    imagePath: "/assets/images/Webflow/document-scan-detail.webp"
    imageAlt: "Multi-page document detail view"
    platforms: "iOS"

  - title: "Import from your Photo Library"
    body: "<p>Already snapped the receipt with the regular camera? Pick the image (or several) from your photo library - NFC.cool runs the same edge detection, perspective correction, and OCR on imported photos as on fresh captures. Useful for retroactively cleaning up months of scattered phone shots.</p>"
    platforms: "iOS"

  - title: "Compression You Control"
    body: "<p>PDFs from a phone can balloon if you're not careful. NFC.cool exposes the compression rate as a setting, so you can pick between archive-quality fidelity and email-friendly file size - without re-scanning.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool plugs straight into the iOS Shortcuts app with built-in actions: grab the last scanned NFC tag, write a message to a tag, open the scanner, or pull the last scanned QR code. Chain them into Shortcuts that scan a tag, parse its payload, and kick off whatever you want next - automation, logging, journaling, you name it. The same actions power the lock-screen <strong>Scan Button</strong> control on iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone connecting an NFC tag to automation blocks"
    platforms: "iOS"

  - title: "iCloud Sync across iPhone, iPad, and Mac"
    body: "<p>Documents sync seamlessly through iCloud across every device on your account. Scan a contract on the iPhone, review it on the iPad, sign it on the <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - same library, no exporting back and forth. The original images and the recognised text both ride along.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

