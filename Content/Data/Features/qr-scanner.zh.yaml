faqTitle: "常见问题"
faq:
  - question: "为什么这项功能仅限 iOS？"
    answer: "NFC.cool 的 Android 版本目前专注于 NFC 和电子名片。二维码扫描已列入 Android 的路线图。"
  - question: "工作室生成的二维码与所有扫码器都兼容吗？"
    answer: "兼容。它们是带有可选外观样式的标准二维码。任何标准扫码器（iOS 相机、Google Lens、Android 自带的扫描器）都能解码。"
  - question: "我可以扫描截图里的二维码吗？"
    answer: "可以。从相册中选取任意图片，NFC.cool 就能找到其中的每一个二维码，哪怕它被部分遮挡。"
  - question: "工作室会嵌入水印或 NFC.cool 的品牌标识吗？"
    answer: "免费版生成的码会带有一个小小的署名。白金版生成的码则没有水印：纯粹是你自己的设计。"

