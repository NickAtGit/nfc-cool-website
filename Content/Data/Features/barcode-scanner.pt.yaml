faqTitle: "Perguntas Frequentes"
faq:
  - question: "Porque é que isto é apenas para iOS?"
    answer: "A versão Android da NFC.cool foca-se atualmente no NFC e no Cartão de Visita Digital. A leitura de códigos de barras está no roteiro do Android."
  - question: "Posso ler vários códigos de barras ao mesmo tempo?"
    answer: "Sim - o modo de lote mantém a câmara aberta e coloca em fila cada código de barras que encontra. Toque em qualquer item da fila para agir sobre ele."
  - question: "Posso guardar e partilhar as minhas leituras?"
    answer: "Sim - cada leitura permanece na vista de histórico com a respetiva data e hora. Pode marcar uma leitura como favorita, dar-lhe um título e partilhá-la a partir daí."
  - question: "O leitor funciona offline?"
    answer: "Sim para a leitura em si. A pesquisa de produtos precisa de internet (processa o número do código de barras através de um motor de busca), mas a leitura do código de barras é feita apenas no dispositivo."

