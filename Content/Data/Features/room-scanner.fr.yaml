faqTitle: "Questions fréquentes"
faq:
  - question: "Le LiDAR est-il nécessaire ?"
    answer: "Oui. RoomPlan est une API d'Apple qui fonctionne uniquement avec le LiDAR. (le scanner d'objets 3D a lui aussi besoin du LiDAR - la session Object Capture d'Apple le vérifie.)"
  - question: "Combien de temps dure un scan ?"
    answer: "Il suffit de parcourir la pièce. Le résultat est généré en direct et prêt dès que vous avez terminé."
  - question: "Puis-je ouvrir le résultat dans un logiciel de CAO ?"
    answer: "Oui - le format USDZ est pris en charge par la plupart des outils de CAO et 3D modernes. Pour les flux SketchUp ou Revit, passez par Blender ou un outil gratuit de conversion USD vers OBJ."

