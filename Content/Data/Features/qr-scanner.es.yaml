faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿Por qué es solo para iOS?"
    answer: "La versión de Android de NFC.cool se centra actualmente en NFC y en la tarjeta de visita digital. La lectura de códigos QR está en la hoja de ruta de Android."
  - question: "¿Los códigos QR del estudio son compatibles con todos los lectores?"
    answer: "Sí. Son códigos QR estándar con un estilo cosmético opcional. Cualquier lector estándar (la cámara de iOS, Google Lens, los lectores nativos de Android) puede decodificarlos."
  - question: "¿Puedo escanear un código QR desde una captura de pantalla?"
    answer: "Sí. Elige cualquier imagen de tu fototeca y NFC.cool encuentra todos los códigos QR que haya dentro - incluso los parcialmente tapados."
  - question: "¿El estudio incrusta alguna marca de agua o identificación de NFC.cool?"
    answer: "Los códigos gratis llevan una pequeña atribución. Los códigos Platinum no tienen marca de agua - son puramente tu diseño."

