card:
  title: "Escáner de objetos 3D"
  description: "Da una vuelta alrededor de un objeto y el Object Capture de Apple crea un modelo 3D con textura. Exporta a USDZ para AR, STL para impresión 3D u OBJ para Blender. Requiere un iPhone Pro o iPad Pro con LiDAR."
  imagePath: "/assets/images/Webflow/3d-object.webp"
  platforms: "Solo iOS"

hero:
  title: "Escáner de objetos 3D"
  subtitle: "Da una vuelta alrededor de un objeto real con tu iPhone - NFC.cool ejecuta el Object Capture de Apple en el dispositivo para reconstruir un modelo 3D con textura. Exporta el modelo terminado a AR o a cualquier herramienta 3D."
  platforms: "Solo iOS"
  heroImagePath: "/assets/images/Webflow/3d-object.webp"

capabilitiesTitle: "Lo que puedes hacer"
capabilities:
  - title: "Captura por fotogrametría"
    description: "Da una vuelta alrededor de un objeto capturando decenas de fotos. El pipeline de Object Capture de Apple en el dispositivo reconstruye un modelo 3D con textura y geometría realista."
  - title: "Previsualiza y refina"
    description: "Revisa el modelo en 3D antes de exportarlo. Inspecciona las imágenes en bruto capturadas durante la sesión si quieres ver lo que vio la cámara."
  - title: "AR Quick Look"
    description: "Coloca cualquier objeto escaneado en tu salón mediante AR Quick Look. Comparte archivos USDZ con tus amigos - pueden verlos directamente en Mensajes."
  - title: "Seis formatos de exportación"
    description: "Exporta un USDZ con textura para AR Quick Look, o geometría simple como USD, OBJ, STL, PLY o ABC para Blender y el resto del pipeline de contenidos 3D."

subsectionsTitle: "De tu mano a tu vista de AR"
subsections:
  - title: "AR Quick Look en Mensajes"
    body: "<p>USDZ es el formato de AR nativo de Apple. Comparte un objeto escaneado en iMessage o por AirDrop y el destinatario puede girarlo, colocarlo en su propio espacio y hacer una captura de pantalla - todo desde la previsualización del mensaje, sin instalar la app. Genial para previsualizaciones de productos, documentación de esculturas o simplemente para presumir.</p>"
    platforms: "iOS"

  - title: "Atajos y App Intents"
    body: "<p>NFC.cool se integra directamente en la app Atajos de iOS con acciones incorporadas: obtener la última etiqueta NFC leída, grabar un mensaje en una etiqueta, abrir el escáner u obtener el último código QR leído. Encadénalas en Atajos que lean una etiqueta, analicen su payload e inicien lo que quieras a continuación - automatización, registro, diario, lo que sea. Las mismas acciones alimentan el control <strong>Botón de escaneo</strong> en la pantalla de bloqueo en iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone conectando una etiqueta NFC a bloques de automatización"
    platforms: "iOS"

  - title: "Sincronización con iCloud en iPhone, iPad y Mac"
    body: "<p>Los modelos escaneados viven en tu carpeta de Documentos de iCloud, así que el iPhone con el que escaneaste, el iPad en el que revisaste y el <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> en el que vas a editar ven todos la misma biblioteca. Captura sobre la marcha, termina en el escritorio.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool sincronizándose en iPhone, iPad y Mac"
    platforms: "iOS"

