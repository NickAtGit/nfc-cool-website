faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿Mi iPhone necesita LiDAR?"
    answer: "Sí. La sesión de Object Capture de Apple requiere un dispositivo equipado con LiDAR - es decir, un iPhone Pro (12 Pro y más recientes) o un iPad Pro a partir de 2020. Los iPhone no Pro no vienen con LiDAR."
  - question: "¿Cuánto tarda un escaneo?"
    answer: "Unos minutos dando vueltas alrededor del objeto, y después un par de minutos de reconstrucción en el dispositivo. Los objetos más grandes o con más textura tardan más."
  - question: "¿Puedo imprimir los resultados en 3D?"
    answer: "Puedes exportar a OBJ y convertirlo a STL en Blender, MeshLab o cualquier herramienta 3D estándar. La fidelidad del modelo es mejor para objetos de tamaño medio y bien texturados."
  - question: "¿Cuál es la diferencia entre esto y el escáner de habitaciones?"
    answer: "El Object Capture (esta función) crea un único modelo 3D de una cosa. El escáner de habitaciones usa LiDAR y el RoomPlan de Apple para crear un plano de un espacio - paredes, puertas, mobiliario. Ambos necesitan LiDAR; responden a preguntas distintas."

