faqTitle: "Questions fréquentes"
faq:
  - question: "Mon iPhone a-t-il besoin du LiDAR ?"
    answer: "Oui. La session Object Capture d'Apple nécessite un appareil équipé du LiDAR - c'est-à-dire un iPhone Pro (12 Pro et plus récents) ou un iPad Pro à partir de 2020. Les iPhone non Pro ne sont pas dotés du LiDAR."
  - question: "Combien de temps prend un scan ?"
    answer: "Quelques minutes pour tourner autour de l'objet, puis deux ou trois minutes de reconstruction sur l'appareil. Les objets plus grands ou plus texturés prennent plus de temps."
  - question: "Puis-je imprimer les résultats en 3D ?"
    answer: "Vous pouvez exporter en OBJ et convertir en STL dans Blender, MeshLab ou tout outil 3D courant. La fidélité du modèle est optimale pour les objets de taille moyenne et bien texturés."
  - question: "Quelle est la différence avec le scanner de pièces ?"
    answer: "Object Capture (cette fonctionnalité) construit un seul modèle 3D d'un objet. Le scanner de pièces utilise le LiDAR et RoomPlan d'Apple pour construire un plan d'un espace - murs, portes, meubles. Les deux nécessitent le LiDAR ; ils répondent à des besoins différents."

