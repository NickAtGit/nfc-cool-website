  platforms: "iOS uniquement"
  heroImagePath: "/assets/images/Webflow/3d-object.webp"

capabilitiesTitle: "Ce que vous pouvez faire"
capabilities:
  - title: "Capture par photogrammétrie"
    description: "Tournez autour d'un objet en prenant des dizaines de photos. Le pipeline Object Capture d'Apple, exécuté sur l'appareil, reconstruit un modèle 3D texturé à la géométrie réaliste."
  - title: "Aperçu et ajustements"
    description: "Examinez le modèle en 3D avant de l'exporter. Inspectez les images brutes capturées pendant la session si vous voulez voir ce que la caméra a vu."
  - title: "AR Quick Look"
    description: "Placez n'importe quel objet scanné dans votre salon via AR Quick Look. Partagez des fichiers USDZ avec vos amis - ils peuvent les visualiser directement dans Messages."
  - title: "Six formats d'export"
    description: "Exportez un USDZ texturé pour AR Quick Look, ou la géométrie brute en USD, OBJ, STL, PLY ou ABC pour Blender et le reste de la chaîne de production 3D."

subsectionsTitle: "De votre main à votre vue en réalité augmentée"
subsections:
  - title: "AR Quick Look dans Messages"
    body: "<p>USDZ est le format AR natif d'Apple. Partagez un objet scanné par iMessage ou AirDrop et le destinataire peut le faire pivoter, le placer dans son propre espace et le prendre en capture d'écran - le tout depuis l'aperçu du message, sans installer d'app. Idéal pour présenter un produit, documenter une sculpture ou simplement épater la galerie.</p>"
    platforms: "iOS"

  - title: "Raccourcis et App Intents"
    body: "<p>NFC.cool s'intègre directement à l'app Raccourcis d'iOS avec des actions intégrées : récupérer le dernier tag NFC scanné, écrire un message sur un tag, ouvrir le scanner ou récupérer le dernier QR code scanné. Enchaînez-les dans des raccourcis qui scannent un tag, analysent son contenu et lancent l'étape suivante de votre choix - automatisation, journalisation, prise de notes, tout ce que vous voulez. Ces mêmes actions alimentent la commande <strong>bouton de scan</strong> de l'écran verrouillé sur iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone reliant un tag NFC à des blocs d'automatisation"
    platforms: "iOS"

  - title: "Synchronisation iCloud entre iPhone, iPad et Mac"
    body: "<p>Les modèles scannés se trouvent dans votre dossier iCloud Documents : l'iPhone avec lequel vous avez scanné, l'iPad sur lequel vous avez révisé et le <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> sur lequel vous éditerez voient tous la même bibliothèque. Capturez en déplacement, terminez au bureau.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool synchronisé entre iPhone, iPad et Mac"
    platforms: "iOS"

