faqTitle: "Questions fréquentes"
faq:
  - question: "Pourquoi est-ce réservé à iOS ?"
    answer: "La version Android de NFC.cool se concentre pour l'instant sur le NFC et la carte de visite numérique. Le scan de codes-barres est prévu sur la feuille de route Android."
  - question: "Puis-je scanner plusieurs codes-barres à la fois ?"
    answer: "Oui - le mode par lots garde la caméra ouverte et met en file d'attente chaque code-barres détecté. Touchez n'importe quel élément de la file pour agir dessus."
  - question: "Puis-je enregistrer et partager mes scans ?"
    answer: "Oui - chaque scan reste dans l'historique avec son horodatage. Vous pouvez ajouter un scan aux favoris, lui donner un titre et le partager depuis là."
  - question: "Le scanner fonctionne-t-il hors ligne ?"
    answer: "Oui pour le scan lui-même. La recherche de produits nécessite une connexion internet (elle envoie le numéro du code-barres à un moteur de recherche), mais la lecture du code-barres se fait uniquement sur l'appareil."

