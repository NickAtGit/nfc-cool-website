capabilitiesTitle: "Was du tun kannst"
capabilities:
  - title: "Photogrammetrie-Aufnahme"
    description: "Umrunde ein Objekt mit Dutzenden Aufnahmen. Apples On-Device-Object-Capture-Pipeline rekonstruiert ein texturiertes 3D-Modell mit realistischer Geometrie."
  - title: "Vorschau & Verfeinerung"
    description: "Begutachte das Modell in 3D vor dem Export. Sieh dir die rohen Aufnahmen aus der Session an, wenn du sehen willst, was die Kamera sah."
  - title: "AR Quick Look"
    description: "Platziere jedes gescannte Objekt per AR Quick Look in deinem Wohnzimmer. Teile USDZ-Dateien mit Freunden - sie können sie direkt in Nachrichten anschauen."
  - title: "Sechs Exportformate"
    description: "Exportiere ein texturiertes USDZ für AR Quick Look oder reine Geometrie als USD, OBJ, STL, PLY oder ABC für Blender und den Rest deiner 3D-Content-Pipeline."

subsectionsTitle: "Von deiner Hand in deine AR-Welt"
subsections:
  - title: "AR Quick Look in Nachrichten"
    body: "<p>USDZ ist Apples natives AR-Format. Teile ein gescanntes Objekt in iMessage oder per AirDrop, und der Empfänger kann es drehen, in seinen eigenen Raum stellen und screenshotten - direkt aus der Nachrichtenvorschau, ohne App-Installation. Großartig für Produktvorschauen, Skulptur-Dokumentation oder einfach zum Angeben.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool klinkt sich mit eingebauten Aktionen direkt in die iOS-Kurzbefehle-App ein: den zuletzt gescannten NFC-Tag abrufen, eine Nachricht auf einen Tag schreiben, den Scanner öffnen oder den zuletzt gescannten QR-Code holen. Verkette sie zu Shortcuts, die einen Tag scannen, die Payload parsen und dann tun, was immer du willst - Automatisierung, Logging, Journaling, alles. Dieselben Aktionen treiben den <strong>Scan-Button</strong> auf dem Lockscreen unter iOS 17+ an.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone verbindet NFC-Tag mit Automationsblöcken"
    platforms: "iOS"

  - title: "iCloud-Sync über iPhone, iPad und Mac"
    body: "<p>Gescannte Modelle liegen in deinem iCloud-Dokumente-Ordner - das iPhone, mit dem du gescannt hast, das iPad zum Anschauen und der <a href=\"/de/blog/nfc-cool-comes-to-mac/\">Mac</a> zum Bearbeiten sehen dieselbe Bibliothek. Unterwegs aufnehmen, am Schreibtisch fertigstellen.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool synchronisiert über iPhone, iPad und Mac"
    platforms: "iOS"

