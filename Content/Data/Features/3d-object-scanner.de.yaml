hero:
  title: "3D-Objektscan"
  subtitle: "Umrunde ein reales Objekt mit deinem iPhone - NFC.cool führt On-Device-Photogrammetrie aus und rekonstruiert ein texturiertes 3D-Modell. Export als USDZ für AR Quick Look, STL für 3D-Druck oder OBJ/PLY für Blender."
  platforms: "Nur iOS"
  heroImagePath: "/assets/images/Webflow/3d-object.webp"

capabilitiesTitle: "Was du machen kannst"
capabilities:
  - title: "Photogrammetrie-Aufnahme"
    description: "Umrunde ein Objekt mit 30-100 Aufnahmen. Die On-Device-Photogrammetrie-Pipeline rekonstruiert ein texturiertes 3D-Modell mit realistischer Geometrie."
  - title: "Bearbeiten & verfeinern"
    description: "Rauschen entfernen, Meshes glätten, Geometrie vereinfachen oder Texturen abziehen. Vorschau in 3D vor dem Export."
  - title: "Überall exportieren"
    description: "USDZ für AR Quick Look, STL für 3D-Druck, OBJ/PLY für Blender, USD/ABC für Produktions-Pipelines. Wähle Vertex-Präzision und Textur-Auflösung."
  - title: "AR Quick Look"
    description: "Platziere jedes gescannte Objekt per AR Quick Look in deinem Wohnzimmer. Teile USDZ-Dateien mit Freunden - sie können sie direkt in Nachrichten anschauen."

screenshots:
  - path: "/assets/images/Webflow/3d-object.webp"
