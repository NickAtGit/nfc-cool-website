specsTitle: "Hardware & Export"
specs:
  - title: "Hardware-Anforderungen"
    items:
      - "Jedes iPhone mit iOS 17+"
      - "Ausreichend Leistung (A14 Bionic oder neuer empfohlen)"
      - "iPad Pro ab 2020 wird ebenfalls unterstützt"
  - title: "Export-Formate"
    items:
      - "USDZ (AR Quick Look)"
      - "OBJ + MTL mit Texturen"
      - "STL (binär oder ASCII)"
      - "PLY (Punktwolke + Mesh)"
      - "USD für Produktions-Pipelines"

faqTitle: "Häufige Fragen"
faq:
  - question: "Brauche ich LiDAR für Objektscans?"
    answer: "Nein - Photogrammetrie funktioniert auf jedem modernen iPhone. LiDAR wird nur für Raumscans (RoomPlan) benötigt."
  - question: "Wie lange dauert ein Scan?"
    answer: "Ein paar Minuten für 30-100 Fotos, dann 2-5 Minuten On-Device-Rekonstruktion."
  - question: "Kann ich die Ergebnisse 3D-drucken?"
    answer: "Ja - Export als STL und in deinen bevorzugten Slicer laden. Wir empfehlen vor dem Druck den Vereinfachen/Glätten-Schritt, um die Vertex-Anzahl zu reduzieren."

