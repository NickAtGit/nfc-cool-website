faqTitle: "Häufig gefragt"
faq:
  - question: "Braucht mein iPhone LiDAR?"
    answer: "Ja. Apples Object-Capture-Session braucht ein Gerät mit LiDAR - das heißt iPhone Pro (12 Pro und neuer) oder iPad Pro ab 2020. Non-Pro-iPhones haben kein LiDAR an Bord."
  - question: "Wie lange dauert ein Scan?"
    answer: "Ein paar Minuten Umrunden, dann ein paar Minuten On-Device-Rekonstruktion. Größere / stärker texturierte Objekte brauchen länger."
  - question: "Kann ich die Ergebnisse 3D-drucken?"
    answer: "Du kannst als OBJ exportieren und in Blender, MeshLab oder einem anderen 3D-Tool nach STL konvertieren. Die Modell-Qualität ist am besten für mittelgroße, gut texturierte Objekte."
  - question: "Was ist der Unterschied zum Raumscanner?"
    answer: "Object Capture (diese Funktion) baut ein einziges 3D-Modell eines Gegenstands. Der Raumscanner nutzt LiDAR und Apples RoomPlan, um einen Grundriss eines Raums zu bauen - Wände, Türen, Möbel. Beide brauchen LiDAR; sie beantworten unterschiedliche Fragen."
