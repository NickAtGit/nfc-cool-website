faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿Necesito LiDAR?"
    answer: "Sí. RoomPlan es una API exclusiva de LiDAR de Apple. (el escáner de objetos 3D también necesita LiDAR - la sesión de Object Capture de Apple lo comprueba.)"
  - question: "¿Cuánto tarda un escaneo?"
    answer: "Solo tienes que recorrer la habitación. El resultado se genera en tiempo real y queda listo cuando terminas."
  - question: "¿Puedo abrir el resultado en software CAD?"
    answer: "Sí - la mayoría de las herramientas CAD/3D modernas admiten USDZ. Para flujos de trabajo con SketchUp / Revit, conviértelo con Blender o con una herramienta gratuita de USD a OBJ."

