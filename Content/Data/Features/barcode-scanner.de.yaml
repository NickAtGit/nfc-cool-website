faqTitle: "Häufig gefragt"
faq:
  - question: "Warum nur auf iOS?"
    answer: "Die Android-Version von NFC.cool fokussiert sich derzeit auf NFC und die digitale Visitenkarte. Barcode-Scannen steht auf der Android-Roadmap."
  - question: "Kann ich mehrere Barcodes auf einmal scannen?"
    answer: "Ja – im Batch-Modus bleibt die Kamera offen und reiht jeden gefundenen Barcode in eine Warteschlange. Tippe auf einen Eintrag, um damit zu arbeiten."
  - question: "Kann ich den Scan-Verlauf exportieren?"
    answer: "Ja – die Verlaufsansicht exportiert nach CSV mit Zeitstempel, Format und Roh-Payload."
  - question: "Funktioniert der Scanner offline?"
    answer: "Das Scannen selbst ja. Die Produktsuche braucht Internet (sie fragt Amazon / Google Shopping / eBay), aber das Lesen des Barcodes passiert nur auf dem Gerät."
