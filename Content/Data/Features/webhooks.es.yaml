faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿Esto funciona en Android?"
    answer: "Sí - los webhooks están disponibles en las versiones de iOS y Android de NFC.cool Tools. La estructura del payload JSON es la misma en todas las plataformas. (Los otros cuatro disparadores de iOS - Atajo automático, voz, audio, apertura de enlaces - son solo para iOS.)"
  - question: "¿Cuántas URLs puedo configurar?"
    answer: "Una URL actualmente. La misma URL recibe todos los eventos de escaneo, distinguidos por los interruptores de fuente activados y por el tipo de payload."
  - question: "¿Qué autenticación se admite?"
    answer: "Autenticación HTTP Basic - nombre de usuario + contraseña, guardados cifrados en el Keychain de iOS. Los tokens Bearer, las cabeceras personalizadas y la firma HMAC no se admiten actualmente."
  - question: "¿Qué pasa si mi servidor está sin conexión?"
    answer: "El POST falla y el evento queda registrado en el dispositivo. Hoy no existe una cola de reintentos automática; si tu servidor puede ser inestable, diseña tu handler para que sea idempotente en el reintento y vuelve a dispararlo desde el historial de escaneos."
  - question: "¿Hay un límite de tamaño del payload?"
    answer: "Ningún límite estricto impuesto por NFC.cool. Los propios payloads de las etiquetas están limitados por el estándar NFC (unos pocos KB para las etiquetas NDEF típicas)."
  - question: "¿Dónde puedo verlo funcionar de verdad?"
    answer: "Clona el <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Servidor web en GitHub</a>, ejecútalo localmente, apunta la app hacia él y verás llegar cada escaneo en tiempo real."

