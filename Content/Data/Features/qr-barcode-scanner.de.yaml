slug: "qr-barcode-scanner"
appStoreURL: "https://ios.nfc.cool"
backLinkText: "← Alle Funktionen"

hero:
  title: "QR- & Barcode-Scanner"
  subtitle: "Scanne QR-Codes und über 25 Barcode-Formate im schnellen Batch-Modus. Erkenne QR-Codes in Fotos. Gestalte eigene QR-Codes mit Logos, Genmoji und Markenfarben im integrierten QR Code Studio."
  platforms: "Nur iOS"
  heroImagePath: "/assets/images/Webflow/qr-barcode.webp"

capabilitiesTitle: "Was du machen kannst"
capabilities:
  - title: "Universelles QR-Scannen"
    description: "URLs, vCards, WLAN-Zugangsdaten, Kalender-Events, Zahlungen, App-Store-Deep-Links - NFC.cool erkennt den Payload-Typ und schlägt die richtige Aktion vor."
  - title: "Alle gängigen Barcode-Formate"
    description: "Scanne EAN-13, UPC-A/E, Code 128, Code 39, ITF, PDF417, Aztec, Data Matrix und mehr. Suche Produkte über Web-Suche oder spezifische Händler."
  - title: "QR-Codes in Fotos erkennen"
    description: "Wähle einen Screenshot oder ein Foto aus der Mediathek - NFC.cool findet und dekodiert jeden QR-Code darin, sogar teilweise verdeckte."
  - title: "Batch-Modus"
    description: "Scanne eine Reihe von Barcodes hintereinander, ohne neu zu zielen. Praktisch für Inventur, Event-Check-ins oder Bibliotheks-Archivierung."
  - title: "QR Code Studio"
    description: "Gestalte QR-Codes mit eigenen Farben, abgerundeten Augenformen, Logos in der Mitte oder Genmoji auf iOS 18+. Exportiere als SVG oder PNG in druckreifer Auflösung."

screenshots:
  - path: "/assets/images/Webflow/qr-studio.webp"
    alt: "QR Code Studio Designer"
  - path: "/assets/images/Webflow/qr-barcode.webp"
    alt: "QR-Code oder Barcode scannen"

specsTitle: "Unterstützte Formate"
specs:
  - title: "2D-Codes"
    items:
      - "QR Code (M1–M4)"
      - "Micro QR"
      - "Aztec"
      - "Data Matrix"
      - "PDF417"
  - title: "1D-Barcodes"
    items:
      - "EAN-13, EAN-8"
      - "UPC-A, UPC-E"
      - "Code 128, Code 39, Code 93"
      - "Interleaved 2 of 5 (ITF)"
      - "Codabar"
  - title: "QR-Studio-Export"
    items:
      - "SVG (Vektor)"
      - "PNG bis 4096×4096"
      - "Logo-Überlagerung bis 30 % Fläche"
      - "Eigene Augenformen & Rahmen"

faqTitle: "Häufige Fragen"
faq:
  - question: "Warum nur auf iOS?"
    answer: "Die Android-Version von NFC.cool konzentriert sich derzeit auf NFC und die digitale Visitenkarte. QR- & Barcode-Scannen ist auf der Android-Roadmap."
  - question: "Kann ich mehrere Codes auf einmal scannen?"
    answer: "Ja - im Batch-Modus bleibt die Kamera offen und reiht jeden gefundenen Code in eine Warteschlange ein. Tippe auf einen Eintrag, um damit zu arbeiten."
  - question: "Sind die Studio-QR-Codes mit allen Readern kompatibel?"
    answer: "Ja - es sind standardisierte QR-Codes mit optionalem Styling. Jeder Standard-Reader (inklusive iOS-Kamera und Google Lens) kann sie dekodieren."

cta:
  title: "Scannen und gestalten mit einem Tipp."
  buttonText: "Für iOS herunterladen"
