slug: "barcode-scanner"
backLinkText: "← すべての機能"

hero:
  title: "バーコードスキャナー"
  subtitle: "19種類のコード形式に対応 - 13種類のリニアバーコード(EAN、UPC、Code 128、GS1 DataBarなど)と6種類の2次元コード(QR、PDF417、Aztec、Data Matrix、Microバリアント)。バッチモードでカメラを開いたままに - 棚卸しやイベント受付に最適です。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/qr-barcode.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "主要なバーコード形式すべてに対応"
    description: "EAN-13/8、UPC-E(UPC-AはEAN-13として読み取り)、Code 128、Code 39(Mod 43を含む)、Code 93、ITF、ITF-14、Codabar、GS1 DataBar、PDF417、Aztec、Data Matrixなど - 自動形式判定で、モード切替不要。"
  - title: "バッチモード"
    description: "再照準なしで連続してバーコードをスキャン。棚卸し、イベントの受付、図書館アーカイブなどに最適です。"
  - title: "商品検索"
    description: "小売バーコードをウェブ検索や事前設定された小売業者(Amazon、Google Shopping、eBay)でワンタップ検索。"
  - title: "スキャン履歴 & CSV書き出し"
    description: "すべてのスキャンが日時と形式とともに保存されます。CSV書き出しや個別コードのコピーが可能です。"
  - title: "読み取り時の自動アクション"
    description: "URLやショートカットコードはスキャン直後に自動で開き、Webhookを発火、読み上げも可能 - NFCやQRと同じ5つのフックです。"

subsectionsTitle: "カメラを片手に働く人のために"
subsections:
  - title: "棚卸しのための連続スキャン"
    body: "<p><strong>バッチモード</strong>と<strong>マルチスキャン</strong>を組み合わせると、カメラはハンズフリーのコンベアになります: 狙ってピッ、次を狙ってピッ、繰り返す。新しいコードは履歴リストに追加されます - 間にタップは不要です。CSV書き出しと組み合わせれば、ポケットのスマホが5万円の業務用スキャナーを置き換えます。</p>"
    platforms: "iOS"

  - title: "在庫管理とイベント受付のWebhook"
    body: "<p>バーコードスキャナーをバックオフィスシステムに向けましょう。読み取られた各バーコードがあなたのURLにWebhookを発火 - カメラが動いている間に在庫データベース、参加者CRM、図書館の蔵書目録がリアルタイムで更新されます。JSONペイロード形式と参照サーバーは<a href=\"/ja/features/webhooks/\">Webhookと自動化</a>を参照。</p>"
    platforms: "iOS"

specsTitle: "対応フォーマット(全19種)"
specs:
  - title: "1Dバーコード(13形式)"
    items:
      - "EAN-13、EAN-8"
      - "UPC-E(UPC-AはEAN-13として読み取り)"
      - "Code 39、Code 39 Mod 43"
      - "Code 93、Code 128"
      - "Codabar"
      - "Interleaved 2 of 5、ITF-14"
      - "GS1 DataBar(標準、Expanded、Limited)"
  - title: "2D・スタック型コード(6形式)"
    items:
      - "QRコード"
      - "Micro QR"
      - "PDF417"
      - "Micro PDF417"
      - "Aztec"
      - "Data Matrix"

