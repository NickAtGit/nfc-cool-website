slug: "barcode-scanner"
backLinkText: "← すべての機能"

card:
  title: "バーコードスキャナー"
  description: "13種類のバーコード形式と6種類の2次元コード - EAN、UPC、QR、PDF417、Data Matrixなど - をスキャン。バッチモードでカメラを開いたまま、棚卸しや受付に対応。"
  imagePath: "/assets/images/Webflow/qr-barcode.webp"
  platforms: "iOSのみ"

hero:
  title: "バーコードスキャナー"
  subtitle: "19種類のコード形式に対応 - 13種類のリニアバーコード(EAN、UPC、Code 128、GS1 DataBarなど)と6種類の2次元コード(QR、PDF417、Aztec、Data Matrix、Microバリアント)。バッチモードでカメラを開いたままに - 棚卸しやイベント受付に最適です。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/qr-barcode.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "主要なバーコード形式すべてに対応"
    description: "EAN-13/8、UPC-E(UPC-AはEAN-13として読み取り)、Code 128、Code 39(Mod 43を含む)、Code 93、ITF、ITF-14、Codabar、GS1 DataBar、PDF417、Aztec、Data Matrixなど - 自動形式判定で、モード切替不要。"
  - title: "バッチモード"
    description: "再照準なしで連続してバーコードをスキャン。棚卸し、イベントの受付、図書館アーカイブなどに最適です。"
  - title: "商品検索"
    description: "スキャンした小売バーコードをワンタップで照会 - バーコード番号が事前設定された検索エンジン(Google、Ecosia、DuckDuckGo、Bing、Startpage)に渡され、該当する結果が表示されます。"
  - title: "スキャン履歴 & 共有"
    description: "すべてのスキャンが日時とともに保存されます。重要なスキャンをお気に入り登録し、スキャンに独自のタイトルを付けて、履歴ビューから直接共有できます。"
  - title: "読み取り時の自動アクション"
    description: "URLやショートカットコードはスキャン直後に自動で開き、Webhookを発火、読み上げも可能 - NFCやQRと同じ5つのフックです。"

subsectionsTitle: "大量スキャンのために"
subsections:
  - title: "マルチスキャン、バッチ読み取り、必要時のフラッシュ"
    body: "<p>3つの設定がスキャナーを「1回限り」から「継続的なワークフロー」に変えます。<strong>マルチスキャン</strong>は1つのカメラセッションで複数のコードを取り込みます。<strong>バッチ読み取り</strong>は棚卸しやイベント受付向けにカメラを開いたままに。<strong>オートフラッシュ</strong>は暗所でLEDを自動オン - 懐中電灯ボタンを探す必要はありません。</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhoneがフラッシュライトで複数のQRコードとバーコードをスキャン"
    platforms: "iOS"

  - title: "在庫管理とイベント受付のWebhook"
    body: "<p>バーコードスキャナーをバックオフィスシステムに向けましょう。読み取られた各バーコードがあなたのURLにWebhookを発火 - カメラが動いている間に在庫データベース、参加者CRM、図書館の蔵書目録がリアルタイムで更新されます。JSONペイロード形式と参照サーバーは<a href=\"/ja/features/webhooks/\">Webhookと自動化</a>を参照。</p>"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>NFC.coolは組み込みアクションでiOSのショートカットアプリと直接つながります: 最後にスキャンしたNFCタグを取得、タグにメッセージを書き込み、スキャナーを開く、最後にスキャンしたQRコードを取得。これらをつなげて、タグをスキャンしてペイロードをパースし、その後何でも - 自動化、ロギング、ジャーナリング、思いつくものすべて - を実行するショートカットを作れます。同じアクションがiOS 17以降のロック画面<strong>スキャンボタン</strong>コントロールも支えています。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhoneがNFCタグを自動化ブロックにつなぐ"
    platforms: "iOS"

  - title: "iPhone・iPad・MacでiCloud同期"
    body: "<p>バーコードのスキャン履歴は、iCloudアカウント上のすべての端末で同期します。iPhoneで棚の商品をスキャン、iPadでリストを確認、<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Mac</a>からタイトル付けや共有 - 同じ履歴で、手動での移動は不要です。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

specsTitle: "対応フォーマット(全19種)"
specs:
  - title: "1Dバーコード(13形式)"
    items:
      - "EAN-13、EAN-8"
      - "UPC-E(UPC-AはEAN-13として読み取り)"
      - "Code 39、Code 39 Mod 43"
      - "Code 93、Code 128"
      - "Codabar"
      - "Interleaved 2 of 5、ITF-14"
      - "GS1 DataBar(標準、Expanded、Limited)"
  - title: "2D・スタック型コード(6形式)"
    items:
      - "QRコード"
      - "Micro QR"
      - "PDF417"
      - "Micro PDF417"
      - "Aztec"
      - "Data Matrix"

pricing:
  title: "FreeとPlatinumの比較"
  columns: ["Free", "Platinum"]
  rows:
    - label: "QRコードとバーコードを読み取る"
      values: ["✓", "✓"]
    - label: "QRとバーコードの一括読み取り"
      values: ["✗", "✓"]

faqTitle: "よくある質問"
faq:
  - question: "なぜiOS限定ですか？"
    answer: "現在のAndroid版NFC.coolはNFCとデジタル名刺に注力しています。バーコードスキャンはAndroidロードマップに含まれています。"
  - question: "複数のバーコードを一度にスキャンできますか？"
    answer: "はい - バッチモードはカメラを開いたままにし、見つけたすべてのバーコードをキューに溜めます。キューの項目をタップすると操作できます。"
  - question: "スキャンを保存して共有できますか？"
    answer: "はい - すべてのスキャンが日時付きで履歴ビューに残ります。スキャンをお気に入り登録し、タイトルを付けて、そこから共有できます。"
  - question: "スキャナーはオフラインで動作しますか？"
    answer: "スキャン自体ははい。商品検索はインターネットが必要です(バーコード番号をウェブ検索エンジンに渡すため)が、バーコードの読み取りはデバイス上のみで完結します。"
