faqTitle: "よくある質問"
faq:
  - question: "タグを読み取るにはiPhoneのロックを解除する必要がありますか?"
    answer: "ほとんどのスキャンではい、ただしiPhone XS以降はロック画面からバックグラウンドでNDEFタグを読み取れます - アプリの起動は不要です。"
  - question: "インターネット接続なしでもタグを読み取れますか?"
    answer: "はい。NFC読み取りはすべてデバイス上で行われます。NFC.coolがタグの内容をサーバーへアップロードすることはありません。"
  - question: "NFCタグへの書き込みは安全ですか?"
    answer: "標準では書き込みは安全で、後から取り消せます。ロック機能は確実なときだけ使用してください - 一度永続ロックされたタグは再書き込みできません。"

