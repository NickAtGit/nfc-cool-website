slug: "nfc-reader-writer"
backLinkText: "← すべての機能"

hero:
  title: "NFCリーダー & ライター"
  subtitle: "あらゆる一般的なNFCタグを読み取り、25種類以上のメッセージタイプを書き込みます。NFC Safe(AES-256-GCM)で秘密情報をタグ自体に暗号化。ロックとパスワード保護で改ざんを防ぎます。"
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "すべてのNDEFタグを読み取り"
    description: "NFCタグをタッチしてNDEFレコードを確認 - URL、連絡先、テキスト、MIMEデータ、アプリ起動、カスタムペイロード - 生バイトと技術タイプも一緒に。"
  - title: "25種類以上のメッセージタイプを書き込み"
    description: "ウェブサイト、電話番号、vCard、Wi-Fi、Apple Pay・PayPal、Spotify、Apple Music、YouTube、ショートカット、Instagram、X、Threads、LinkedIn、Mastodonなど。"
  - title: "ロック & パスワード保護"
    description: "タグを永久的に読み取り専用にしたり、許可されたデバイスだけが読み書きできるようにパスワード保護を設定。業務レベルのタグ強化に対応。"
  - title: "フォーマット、バッチ書き込み、クローン"
    description: "空のタグをフォーマットし、イベントや製品発売向けに同じペイロードを束ねて書き込み、あるタグの内容を別のタグへ複製できます。"
  - title: "読み取り時の自動アクション"
    description: "iOSショートカットの自動実行、結果の読み上げ、Webhookの発火、リンクの自動オープン - 1回のタップで5つのフックが動きます。"

subsectionsTitle: "ありふれたNFCアプリより、もっと深く"
subsections:
  - title: "NFC Safe — タグ自体に秘密を暗号化"
    body: "<p>ほとんどのNFCアプリはタグをハガキのように扱います - スマホを持つ誰もが読めてしまう。NFC Safeは封緘された封筒として扱います。あなたの秘密(パスワード、リカバリーフレーズ、ライセンスキー、任意のテキスト)は端末上で<strong>AES-256-GCM</strong>で暗号化され、鍵は<strong>PBKDF2-HMAC-SHA256で10万回反復</strong>してパスフレーズから導出され、External-Type NDEFレコードとしてタグに書き込まれます。タグが盗まれても、紛失しても、ブルートフォース攻撃に遭っても - パスフレーズなしではペイロードはただのノイズです。</p><p>iOSもAndroidも同じ暗号化方式。フォーマットは相互運用可能 - iPhoneで暗号化、Androidで復号、その逆もできます。</p>"
    imagePath: "/assets/images/Blog/nfc-safe-encrypted-secrets.webp"
    imageAlt: "タグ上のNFC Safe暗号化シークレット"
    platforms: "iOS · Android"

  - title: "タップカウンター — 各タグの利用回数が見える"
    body: "<p>NFC.coolはタッチしたすべてのタグについて静かに履歴を保ちます。タップカウンターは、特定のタグが何回読み書きされたか、いつ、何を運んだかを表示します。どのポスターが実際にスキャンされたか知りたいイベント主催者、倉庫の在庫管理、あるいは「冷蔵庫マグネットを誰か使ってる?」というささやかな好奇心にも便利です。</p>"
    platforms: "iOS"

  - title: "OpenPrintTag — 3Dプリンターのフィラメントをスプールに載せる"
    body: "<p>OpenPrintTagはフィラメント・スプールのメタデータ(素材、色、メーカー、UUID、残量)を小さなCBORエンコードされたNDEFレコードに埋め込むためのオープン規格です。NFC.coolはこのフォーマットを両プラットフォームでネイティブに読み書きします - Bambu、Prusa、あるいはNFCリーダーを備えたあらゆるプリンターが、スプールがセットされた瞬間に内容を識別できます。</p><p>同じフォーマットが<a href=\"/ja/features/webhooks/\">Webhookと自動化</a>ページの構造化Webhookペイロードを支えています - 新しいスプールが検出された瞬間にプリントファームへPOSTを発火できます。</p>"
    imagePath: "/assets/images/Blog/openprinttag-read-write-nfc-spools-phone.webp"
    imageAlt: "スマホでOpenPrintTagのNFCスプールを読み書き"
    platforms: "iOS · Android"

  - title: "ソニッケアー替えブラシをリセット"
    body: "<p>フィリップス・ソニッケアーの替えブラシにはNFCタグが組み込まれていて、使用状況を追跡しハンドルが交換を促します。NFC.coolはそのカウンターをリセットできます - タグの状態を読み取り、リセット手順を案内し、新しい状態を書き戻す。両プラットフォーム共通です。(替えブラシは作っていません - あなたのブラシにもう一ヶ月の尊厳を与えるだけです。)</p>"
    imagePath: "/assets/images/Blog/reset-sonicare-brush-head-nfc.webp"
    imageAlt: "NFCでフィリップス・ソニッケアー替えブラシをリセット"
    platforms: "iOS · Android"

  - title: "16進メモリダンプとタグ解析"
    body: "<p>「チップの中身を本当に知りたい」という方へ: NFC.coolはタグの全メモリを16進ダンプし、基盤となるチップモデル(NTAG213/215/216、NTAG424 DNA、MIFARE Classic/Ultralight、ISO 15693バリアント、FeliCaなど)を検出し、合計バイト、ユーザーバイト、ロックページ、Capabilityコンテナを報告します。開発者、メイカー、頑固なタグをデバッグする方に。</p>"
    platforms: "iOS · Android"

  - title: "タップで暗号通貨"
    body: "<p>Bitcoin、Ethereum、Solana、Lightning、あるいは任意のウォレットアドレスを支払いURIのNDEFレコードとして書き込めます。カンファレンスで静的ウォレットを共有したり、製品のステッカーに埋め込んだり、永続的なアドレスを刻んだメタルカードを手渡したり。読み取りも双方向 - 暗号通貨タグをスキャンすれば、お使いのウォレットアプリへディープリンクします。</p>"
    platforms: "iOS · Android"

  - title: "Wi-Fiパスワードを打たずに参加"
    body: "<p>Wi-FiのSSID、セキュリティタイプ、パスワードを一度だけタグに書き込みます。以降、タッチした人は誰でもネットワークに参加 - パスワードを口で説明する必要も、Airbnbの走り書きメモも不要です。逆もできる - 他人の家のWi-Fiタグを読み取れば、OSが参加するか尋ねます。</p>"
    platforms: "iOS · Android"

  - title: "声に出して読み上げ"
    body: "<p>アクセシビリティのため、ハンズフリーのワークフローのため、あるいは単に気持ちが良いから - 音声合成フックをオンにすれば、タップした瞬間に各タグのペイロードが読み上げられます。読み上げ速度は調整可能で、VoiceOverやその他の支援技術と並行して機能します。</p>"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>5つの組み込みIntentがNFC.coolをiOSの他の機能と結びつけます: <code>GetLastNfcTag</code>、<code>WriteNfcType</code>、<code>LaunchScan</code>、<code>ScanIntent</code>、<code>GetLastQrCode</code>。タグをスキャンしてペイロードをパースし、その後何でも - 自動化、ロギング、ジャーナリング、思いつくものすべて - を実行するショートカットを作れます。iOS 17以降のロック画面<strong>スキャンボタン</strong>コントロールも支えています。</p>"
    platforms: "iOS"

  - title: "iPhone・iPad・Macで同期"
    body: "<p>スキャン履歴、NFC Safeエントリー、書き込みテンプレートは、同じiCloudアカウントでサインインしたすべての端末でシームレスに同期します。ポケットのiPhoneでタグをタッチした次の瞬間、そのスキャンはiPadのライブラリに現れます。NFC.coolは<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Apple Silicon Macでも動作するようになり</a>、同じライブラリがそちらにも表示されます。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

  - title: "パワーユーザー・モード"
    body: "<p>iOS上の本格的なNFCオペレーター向けの2機能: <strong>CSVバッチ書き込み</strong> - ペイロードのスプレッドシートをアップロードし、スマホをアシスタントに渡せば、1セッションでタグの山すべてに書き込めます。そして<strong>エキスパートAPDUモード</strong> - 生のISO 7816コマンドをタグに送り応答を確認できます - 変わったリーダーや独自プロトコルへの統合、あるいはチップが何を返すかを純粋に確かめたいときに。</p>"
    platforms: "iOS"

specsTitle: "対応タグ & 技術"
specs:
  - title: "タグ・ファミリー"
    items:
      - "NFC Forum Type 1, 2, 3, 4, 5"
      - "NTAG 213, 215, 216, 424 DNA、NTAG-I²Cバリアント"
      - "MIFARE Classic 1K/4K、MIFARE Ultralight、MIFARE DESFire"
      - "ISO 14443 A/B、ISO 15693、FeliCa(iOS)"
  - title: "レコードタイプ"
    items:
      - "URI(web、mailto、tel、sms、geo、カスタムスキーム)"
      - "テキスト(言語タグ付き)"
      - "vCard / 連絡先"
      - "Wi-Fiクレデンシャル、Bluetoothペアリング"
      - "Smart Poster(複合)"
      - "アプリ起動"
      - "暗号通貨アドレス(URIベース)"
      - "OpenPrintTag(3Dプリンター・フィラメント・メタデータ)"
      - "NFC Safe(暗号化External-Type、urn:nfc:ext:crypto)"
      - "MIME、External、生バイト"
  - title: "プラットフォーム情報"
    items:
      - "iOS 16以降(iPhone XS以降はロック画面からのバックグラウンド読み取りに対応)"
      - "Android 8.0以降(API 26)、フォアグラウンドNFC読み取り"
      - "iOSからのタグ書き込みにはCore NFCエンタイトルメントが必要 - アプリに内蔵"
      - "AndroidでのバックグラウンドNFC読み取りはアプリのフォアグラウンド動作が必要"

