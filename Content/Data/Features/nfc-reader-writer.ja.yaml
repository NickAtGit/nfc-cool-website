slug: "nfc-reader-writer"
backLinkText: "← すべての機能"

hero:
  title: "NFCリーダー & ライター"
  subtitle: "どんなNFCタグもタップで読み取り、自分でも書き込めます - リンク、連絡先、Wi-Fiなど。パスワードや秘密の情報をタグに安全に保存し、ロックすれば他の誰にも書き換えられません。"
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "すべてのNDEFタグを読み取り"
    description: "NFCタグをタッチしてNDEFレコードを確認 - URL、連絡先、テキスト、MIMEデータ、アプリ起動、カスタムペイロード - 生バイトと技術タイプも一緒に。"
  - title: "25種類以上のメッセージタイプを書き込み"
    description: "ウェブサイト、電話番号、vCard、Wi-Fi、PayPal・Cash App・Venmo、Spotify、YouTube、ショートカット、Instagram、X、LinkedIn、TikTok、WhatsAppなど。"
  - title: "ロック & パスワード保護"
    description: "タグを永久的に読み取り専用にしたり、許可されたデバイスだけが読み書きできるようにパスワード保護を設定。業務レベルのタグ強化に対応。"
  - title: "フォーマット、バッチ書き込み、クローン"
    description: "空のタグをフォーマットし、イベントや製品発売向けに同じペイロードを束ねて書き込み、あるタグの内容を別のタグへ複製できます。"
  - title: "読み取り時の自動アクション"
    description: "iOSショートカットの自動実行、結果の読み上げ、Webhookの発火、リンクの自動オープン - 1回のタップで5つのフックが動きます。"

subsectionsTitle: "ありふれたNFCアプリより、もっと深く"
subsections:
  - title: "NFC Safe - タグ自体に秘密を暗号化"
    body: "<p>ほとんどのNFCアプリはタグをハガキのように扱います - スマホを持つ誰もが読めてしまう。NFC Safeは封緘された封筒として扱います。あなたの秘密(パスワード、リカバリーフレーズ、ライセンスキー、任意のテキスト)は、タグに届く前に端末上でAES-256で暗号化されます。タグを失くしても、盗まれても、見知らぬ人に渡しても - パスフレーズがなければペイロードはただのノイズです。</p><p>同じ暗号化が両プラットフォームで機能するので、iPhoneで秘密をロックし、Androidで解除できます。暗号化の仕組みを詳しく知りたい方は、<a href=\"/ja/blog/nfc-safe-encrypted-secrets/\">ブログのNFC Safe徹底解説</a>をどうぞ。</p>"
    imagePath: "/assets/images/Blog/nfc-safe-encrypted-secrets.webp"
    imageAlt: "タグ上のNFC Safe暗号化シークレット"
    platforms: "iOS · Android"

  - title: "NFC タップカウンター - 各タグをIDとカウントで追跡"
    body: "<p>一部のNFCチップは、自分のスキャン回数をハードウェアで数えます。NFCタップカウンターはそれを活用します。タグを設定し、読み取りのたびに、その時点のタップカウント - および/または固有のタグID - を、タグが運ぶ内容(URL、メール、SMS、ショートカット)に付加させます。サーバーもインターネットも、維持すべきバックエンドも不要 - チップ自身がカウントと置き換えを行います。</p><p>これにより、1枚のタグが、どの物理ステッカーが何回タップされたかを教えてくれます。そしてそれに応じて動けます。最初の100回のスキャンをデモに限定する、名刺のエンゲージメントを追跡する、増える一方のカウンターで真正性を証明する、といったことです。詳しい手順は<a href=\"/ja/blog/count-nfc-tag-scans/\">ブログのNFCタップカウンターガイド</a>をご覧ください。<a href=\"/ja/tap-counter/\">ライブデモ</a>でタグをタップしてページが数える様子も試せます。</p>"
    imagePath: "/assets/images/Blog/count-nfc-tag-scans.webp"
    imageAlt: "スマートフォンでタップされるNFCタグと、増えていくスキャン回数"
    platforms: "iOS · Android"

  - title: "OpenPrintTag - 3Dプリンターのフィラメントをスプールに載せる"
    body: "<p>OpenPrintTagはフィラメント・スプールのメタデータ(素材、色、メーカー、UUID、残量)を小さなCBORエンコードされたNDEFレコードに埋め込むためのオープン規格です。NFC.coolはこのフォーマットを両プラットフォームでネイティブに読み書きします - 対応プリンターが、スプールがセットされた瞬間に内容を識別できます。フォーマットについて詳しく知りたい方は、<a href=\"/ja/blog/openprinttag-read-write-nfc-spools-phone/\">OpenPrintTagスプールの読み書きガイド</a>をどうぞ。</p><p>同じフォーマットが<a href=\"/ja/features/webhooks/\">Webhookと自動化</a>ページの構造化Webhookペイロードを支えています - 新しいスプールが検出された瞬間にプリントファームへPOSTを発火できます。</p>"
    imagePath: "/assets/images/Blog/openprinttag-read-write-nfc-spools-phone.webp"
    imageAlt: "スマホでOpenPrintTagのNFCスプールを読み書き"
    platforms: "iOS · Android"

  - title: "歯ブラシヘッドのリセット"
    body: "<p>フィリップス・ソニッケアーの替えブラシにはNFCタグが組み込まれていて、使用状況を追跡しハンドルが交換を促します。NFC.coolはそのカウンターをリセットできます - タグの状態を読み取り、リセット手順を案内し、新しい状態を書き戻す。両プラットフォーム共通です。チップが何を記録しているか詳しく知りたい方は、<a href=\"/ja/blog/reset-sonicare-brush-head-nfc/\">ブログのソニッケアー替えブラシガイド</a>をどうぞ。(替えブラシは作っていません - あなたのブラシにもう一ヶ月の尊厳を与えるだけです。)</p>"
    imagePath: "/assets/images/Blog/reset-sonicare-brush-head-nfc.webp"
    imageAlt: "NFCでフィリップス・ソニッケアー替えブラシをリセット"
    platforms: "iOS · Android"

  - title: "パワーユーザー・モード"
    body: "<p>「チップの中身を本当に知りたい」という方へ: NFC.coolはタグの全メモリを16進ダンプし、基盤となるチップモデル(NTAG213/215/216、NTAG424 DNA、MIFARE Classic/Ultralight、ISO 15693バリアント、FeliCaなど)を検出し、合計バイト、ユーザーバイト、ロックページ、Capabilityコンテナを報告します。開発者、メイカー、タグをデバッグする方に。</p><p>iOSでは<strong>エキスパートAPDUモード</strong>がさらに踏み込みます - 生のISO 7816コマンドをタグに送り応答を確認できます。変わったリーダーや独自プロトコルへの統合、あるいはチップが何を返すかを純粋に確かめたいときに。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-power-user-mode.webp"
    imageAlt: "iPhoneが診断パネルでNFCタグメモリを解析"
    platforms: "iOS · Android"

  - title: "タップで暗号通貨"
    body: "<p>Bitcoin、Ethereum、Solana、Lightning、あるいは任意のウォレットアドレスを支払いURIのNDEFレコードとして書き込めます。カンファレンスで静的ウォレットを共有したり、製品のステッカーに埋め込んだり、永続的なアドレスを刻んだメタルカードを手渡したり。読み取りも双方向 - 暗号通貨タグをスキャンすれば、お使いのウォレットアプリへディープリンクします。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-cryptocurrency-tap.webp"
    imageAlt: "iPhoneとNFCタグで暗号資産ウォレットを共有"
    platforms: "iOS · Android"

  - title: "Wi-Fiパスワードを打たずに参加"
    body: "<p>Wi-FiのSSID、セキュリティタイプ、パスワードを一度だけタグに書き込みます。以降、タッチした人は誰でもネットワークに参加 - パスワードを口で説明する必要も、Airbnbの走り書きメモも不要です。逆もできる - 他人の家のWi-Fiタグを読み取れば、OSが参加するか尋ねます。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-wifi-onboarding.webp"
    imageAlt: "iPhoneがNFCタグからWi-Fiに接続"
    platforms: "iOS · Android"

  - title: "声に出して読み上げ"
    body: "<p>アクセシビリティのため、ハンズフリーのワークフローのため、あるいは単に気持ちが良いから - 音声合成フックをオンにすれば、タップした瞬間に各タグのペイロードが読み上げられます。読み上げ速度は調整可能で、VoiceOverやその他の支援技術と並行して機能します。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-speak-aloud.webp"
    imageAlt: "iPhoneが音声波形とともにNFCタグを読み上げ"
    platforms: "iOS"

  - title: "CSVバッチ書き込み"
    body: "<p>iOS上の本格的なNFCオペレーター向け: ペイロードのスプレッドシートをアップロードし、スマホをアシスタントに渡せば、1セッションでタグの山すべてに書き込めます。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-csv-batch-write.webp"
    imageAlt: "iPhoneが表から複数のNFCタグに一括書き込み"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>NFC.coolは組み込みアクションでiOSのショートカットアプリと直接つながります: 最後にスキャンしたNFCタグを取得、タグにメッセージを書き込み、スキャナーを開く、最後にスキャンしたQRコードを取得。これらをつなげて、タグをスキャンしてペイロードをパースし、その後何でも - 自動化、ロギング、ジャーナリング、思いつくものすべて - を実行するショートカットを作れます。同じアクションがiOS 17以降のロック画面<strong>スキャンボタン</strong>コントロールも支えています。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhoneがNFCタグを自動化ブロックにつなぐ"
    platforms: "iOS"

  - title: "iPhone・iPad・Macで同期"
    body: "<p>スキャン履歴、NFC Safeエントリー、書き込みテンプレートは、同じiCloudアカウントでサインインしたすべての端末でシームレスに同期します。ポケットのiPhoneでタグをタッチした次の瞬間、そのスキャンはiPadのライブラリに現れます。NFC.coolは<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Apple Silicon Macでも動作するようになり</a>、同じライブラリがそちらにも表示されます。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

specsTitle: "対応タグ & 技術"
specs:
  - title: "タグ・ファミリー"
    items:
      - "NFC Forum Type 1, 2, 3, 4, 5"
      - "NTAG 213, 215, 216, 424 DNA、NTAG-I²Cバリアント"
      - "MIFARE Classic 1K/4K、MIFARE Ultralight、MIFARE DESFire"
      - "ISO 14443 A/B、ISO 15693、FeliCa(iOS)"
  - title: "レコードタイプ"
    items:
      - "URI(web、mailto、tel、sms、geo、カスタムスキーム)"
      - "テキスト(言語タグ付き)"
      - "vCard / 連絡先"
      - "Wi-Fiクレデンシャル、Bluetoothペアリング"
      - "Smart Poster(複合)"
      - "アプリ起動"
      - "暗号通貨アドレス(URIベース)"
      - "OpenPrintTag(3Dプリンター・フィラメント・メタデータ)"
      - "NFC Safe(暗号化External-Type、urn:nfc:ext:crypto)"
      - "MIME、External、生バイト"
  - title: "プラットフォーム情報"
    items:
      - "iOS 16以降(iPhone XS以降はロック画面からのバックグラウンド読み取りに対応)"
      - "Android 8.0以降(API 26)、フォアグラウンドNFC読み取り"
      - "iOSからのタグ書き込みにはCore NFCエンタイトルメントが必要 - アプリに内蔵"
      - "AndroidでのバックグラウンドNFC読み取りはアプリのフォアグラウンド動作が必要"

