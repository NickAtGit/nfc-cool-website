backLinkText: "← すべての機能"

hero:
  title: "NFCリーダー & ライター"
  subtitle: "あらゆるNFCタグを読み取り、25種類以上のメッセージタイプを書き込み。NFC Safe(256ビットAES)で機密情報を暗号化。タグをロックしたりパスワード保護したりして改ざんを防げます。"
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "すべてのNDEFタグを読み取り"
    description: "NFCタグをタッチしてNDEFレコードを読み取り - URL、連絡先、テキスト、MIMEデータ、アプリ起動、カスタムペイロード。技術タイプや生バイトも確認できます。"
  - title: "25種類以上のメッセージタイプを書き込み"
    description: "ウェブサイト、電話番号、vCard、Wi-Fi設定、Apple PayとPayPalのリンク、Spotify、Apple Music、YouTube、ショートカット、Instagram、X、Threads、LinkedIn、Mastodonなど。"
  - title: "NFC Safe(暗号化)"
    description: "パスワードやリカバリーフレーズなどの機密情報を256ビットAES暗号化でタグに保存。あなたのパスフレーズだけがペイロードを解除できる - 盗まれたタグも読み取れません。"
  - title: "ロック & パスワード保護"
    description: "タグを読み取り専用にして上書きできないようにしたり、パスワードで保護して許可されたデバイスだけが読み書きできるように設定。業務レベルのタグ管理に対応します。"
  - title: "フォーマット & バッチ書き込み"
    description: "空のタグをフォーマットしたり、イベントや製品発売向けに同じペイロードをまとめて書き込んだり、あるタグの内容を別のタグへ複製できます。"

