faqTitle: "よくある質問"
faq:
  - question: "タグを読み取るにはiPhoneのロックを解除する必要がありますか?"
    answer: "ほとんどのスキャンではいいえ - iPhone XS以降はロック画面からバックグラウンドでNDEFタグを読み取れます、アプリの起動は不要です。Androidではアプリがフォアグラウンドで動作している必要があります。"
  - question: "インターネット接続なしでもタグを読み取れますか?"
    answer: "はい。NFCの読み取りと書き込みはすべてデバイス上で完結します。NFC.coolがタグの内容をサーバーへアップロードすることはありません。"
  - question: "NFCタグへの書き込みは安全ですか?"
    answer: "標準では書き込みは安全で取り消し可能です - タグは何度でも書き直せます。ロック機能は確実なときだけ使ってください - 一度永久ロックされたタグは再書き込みできません。"
  - question: "NFC Safeはどれくらい安全ですか?"
    answer: "NFC SafeはAES-256-GCMでペイロードを暗号化し、パスフレーズから10万回反復のPBKDF2-HMAC-SHA256で鍵を導出します - レコードごとに16バイトのランダム・ソルトと12バイトのナンスを使用。パスフレーズなしでは、タグ上のペイロードはランダムなバイト列と区別がつきません。"
  - question: "同じNFC SafeタグはiOSとAndroidで動きますか?"
    answer: "はい。フォーマットは相互運用可能です。一方のプラットフォームで暗号化し、もう一方で復号 - 同じパスフレーズ、同じペイロードです。"
  - question: "ソニッケアー替えブラシのリセットで何か失われますか?"
    answer: "タグ上の使用カウンターをリセットするので、ハンドルが交換を促さなくなります。替えブラシ自体はリセットされたことを知らず、ただ磨き続けます。ブラシ毛の実際の交換時期はご自身で判断してください。"
