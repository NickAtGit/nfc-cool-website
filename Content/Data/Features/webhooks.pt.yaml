faqTitle: "Perguntas Frequentes"
faq:
  - question: "Isto funciona no Android?"
    answer: "Sim - os webhooks estão disponíveis nas versões iOS e Android da NFC.cool Tools. A estrutura do payload JSON é a mesma em todas as plataformas. (Os outros quatro gatilhos do iOS - Atalho automático, voz, áudio, abertura de ligações - são apenas para iOS.)"
  - question: "Quantos URLs posso configurar?"
    answer: "Um URL atualmente. O mesmo URL recebe todos os eventos de leitura, distinguidos pelos interruptores de fonte ativados e pelo tipo de payload."
  - question: "Que autenticação é suportada?"
    answer: "Autenticação HTTP Basic - nome de utilizador + palavra-passe, guardados encriptados no Keychain do iOS. Tokens Bearer, cabeçalhos personalizados e assinatura HMAC não são atualmente suportados."
  - question: "O que acontece se o meu servidor estiver offline?"
    answer: "O POST falha e o evento fica registado no dispositivo. Hoje não existe fila de repetição automática; se o seu servidor puder ser instável, conceba o seu handler para ser idempotente na repetição e volte a disparar a partir do histórico de leituras."
  - question: "Existe um limite de tamanho do payload?"
    answer: "Nenhum limite rígido imposto pela NFC.cool. Os próprios payloads das tags estão limitados pelo padrão NFC (alguns KB para tags NDEF típicas)."
  - question: "Onde posso vê-lo a funcionar de verdade?"
    answer: "Clone o <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Servidor Web no GitHub</a>, execute-o localmente, aponte a app para ele e verá cada leitura a chegar em tempo real."

