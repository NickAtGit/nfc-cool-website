hero:
  title: "Pemindai ruangan"
  subtitle: "RoomPlan bertenaga LiDAR mengubah jalan-jalan melalui ruangan Anda menjadi denah lantai parametrik yang bersih - dinding, pintu, jendela, dan furnitur yang dikenali, diekspor sebagai satu adegan USDZ."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "Yang bisa Anda lakukan"
capabilities:
  - title: "Pengambilan RoomPlan"
    description: "Jalan melalui sebuah ruangan dengan sensor LiDAR iPhone Anda. NFC.cool membangun model parametrik secara real-time - dinding, pintu, jendela, dan bukaan."
  - title: "Furnitur yang dikenali"
    description: "Tempat tidur, sofa, meja, kursi, lemari, kompor, wastafel, toilet, bathtub, dan TV terdeteksi dan diberi label di dalam adegan."
  - title: "Luas lantai & dimensi"
    description: "Setiap ruangan melaporkan luas lantai, tinggi langit-langit, dan dimensi per dinding. Baca dari model atau sertakan dalam USDZ yang diekspor."
  - title: "AR Quick Look"
    description: "Buka ruangan yang sudah dipindai di AR Quick Look atau bagikan USDZ - penerima dapat berjalan mengelilingi model langsung di dalam Messages."

subsectionsTitle: "Dari jalan-jalan hingga denah lantai yang siap pakai"
subsections:
  - title: "Tempatkan ruangan Anda dalam AR"
    body: "<p>Setelah pemindaian selesai, tempatkan ke AR Quick Look dan berjalan secara fisik mengelilingi kembaran digitalnya. Berguna untuk memeriksa penempatan furnitur sebelum membeli, atau untuk merasakan skala yang tidak bisa disampaikan oleh gambar di tablet.</p>"
    imagePath: "/assets/images/Blog/mac-3d-detail.webp"
    imageAlt: "Tampilan detail pemindaian ruangan"
    platforms: "iOS"

  - title: "Alur kerja multi-ruangan"
    body: "<p>Setiap pemindaian adalah satu ruangan. Rekam dapur, rekam ruang tamu, rekam kamar tidur - semuanya tersimpan berdampingan di perpustakaan Anda, dan editor 3D pilihan Anda dapat menyatukannya menjadi USDZ multi-ruangan. Sangat berguna untuk listing properti, perencanaan renovasi, atau dokumentasi asuransi.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool terhubung langsung ke aplikasi Shortcuts iOS dengan tindakan bawaan: ambil tag NFC terakhir yang dipindai, tulis pesan ke tag, buka pemindai, atau ambil kode QR terakhir yang dipindai. Rangkai menjadi Shortcuts yang memindai tag, mengurai payload-nya, dan memulai apa pun yang Anda inginkan selanjutnya - otomatisasi, pencatatan, journaling, apa saja. Tindakan yang sama menggerakkan kontrol <strong>Tombol Pindai</strong> di layar kunci pada iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone menghubungkan tag NFC ke blok otomatisasi"
    platforms: "iOS"

  - title: "Sinkronisasi iCloud di iPhone, iPad, dan Mac"
    body: "<p>Ruangan yang dipindai tersimpan di folder iCloud Documents Anda, sehingga iPhone yang Anda gunakan untuk memindai, iPad yang Anda gunakan untuk meninjau, dan <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> yang akan Anda gunakan untuk mengedit semuanya melihat perpustakaan yang sama. Rekam ruangannya sekali, sempurnakan denah lantainya nanti di meja kerja Anda.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool tersinkronisasi di iPhone, iPad, dan Mac"
    platforms: "iOS"

