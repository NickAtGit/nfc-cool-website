faqTitle: "Pertanyaan yang sering diajukan"
faq:
  - question: "Apakah saya memerlukan LiDAR?"
    answer: "Ya. RoomPlan adalah API khusus LiDAR dari Apple. (Pemindai Objek 3D juga membutuhkan LiDAR - sesi Object Capture Apple memeriksanya.)"
  - question: "Berapa lama pemindaian berlangsung?"
    answer: "Cukup jalan melalui ruangan. Hasilnya dihasilkan secara langsung dan siap saat Anda selesai."
  - question: "Bisakah saya membuka hasilnya di perangkat lunak CAD?"
    answer: "Ya - USDZ didukung oleh sebagian besar alat CAD/3D modern. Untuk alur kerja SketchUp / Revit, konversi melalui Blender atau alat USD-ke-OBJ gratis."

