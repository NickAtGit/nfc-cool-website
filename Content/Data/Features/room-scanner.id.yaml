  title: "Pemindai ruangan"
  description: "Jalan melalui sebuah ruangan dan RoomPlan membangun denah lantai yang bersih - dinding, pintu, jendela, dan furnitur - lengkap dengan pengukuran ruangan dan perhitungan luas."
  imagePath: "/assets/images/Webflow/scan-room.webp"
