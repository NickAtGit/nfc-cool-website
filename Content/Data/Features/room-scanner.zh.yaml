faqTitle: "常见问题"
faq:
  - question: "我需要 LiDAR 吗？"
    answer: "需要。RoomPlan 是 Apple 仅支持 LiDAR 的 API。（3D 物体扫描同样需要 LiDAR，Apple 的 Object Capture 会话会进行检查。）"
  - question: "一次扫描需要多久？"
    answer: "只需走过房间即可。结果会实时生成，走完后即可使用。"
  - question: "我可以在 CAD 软件中打开结果吗？"
    answer: "可以，大多数现代 CAD/3D 工具都支持 USDZ。对于 SketchUp / Revit 工作流，可通过 Blender 或免费的 USD 转 OBJ 工具进行转换。"

