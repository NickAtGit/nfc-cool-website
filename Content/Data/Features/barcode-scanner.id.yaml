faqTitle: "Pertanyaan yang sering diajukan"
faq:
  - question: "Mengapa ini hanya untuk iOS?"
    answer: "Versi Android NFC.cool saat ini berfokus pada NFC dan Kartu Nama Digital. Pemindaian barcode ada dalam peta jalan Android."
  - question: "Bisakah saya memindai beberapa barcode sekaligus?"
    answer: "Ya - mode batch membuat kamera tetap terbuka dan mengantrekan setiap barcode yang ditemukan. Ketuk item mana pun dalam antrian untuk bertindak atasnya."
  - question: "Bisakah saya menyimpan dan berbagi pemindaian saya?"
    answer: "Ya - setiap pemindaian tetap ada di tampilan riwayat beserta cap waktunya. Anda dapat memfavoritkan pemindaian, memberinya judul, dan membagikannya dari sana."
  - question: "Apakah pemindai bekerja secara offline?"
    answer: "Ya untuk pemindaian itu sendiri. Pencarian produk membutuhkan internet (karena menjalankan nomor barcode melalui mesin pencari), tetapi pembacaan barcode hanya di perangkat."

