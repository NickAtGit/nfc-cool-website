capabilitiesTitle: "Yang bisa Anda lakukan"
capabilities:
  - title: "Semua format barcode utama"
    description: "Memindai EAN-13/8, UPC-E (UPC-A dibaca sebagai EAN-13), Code 128, Code 39 (termasuk Mod 43), Code 93, ITF, ITF-14, Codabar, GS1 DataBar, PDF417, Aztec, Data Matrix dan lainnya - deteksi format otomatis, tanpa perlu beralih mode."
  - title: "Mode batch"
    description: "Memindai sekumpulan barcode secara berurutan tanpa perlu mengarahkan ulang. Berguna untuk penghitungan inventaris, check-in acara, atau pengarsipan perpustakaan."
  - title: "Pencarian produk"
    description: "Ketuk barcode ritel yang dipindai untuk mencarinya - nomor barcode dijalankan melalui mesin pencari yang sudah dikonfigurasi (Google, Ecosia, DuckDuckGo, Bing, atau Startpage) dan hasil yang sesuai langsung muncul."
  - title: "Riwayat pemindaian & berbagi"
    description: "Setiap pemindaian disimpan dengan cap waktu. Favorit kan pemindaian yang penting, beri judul, dan bagikan langsung dari tampilan riwayat."
  - title: "Tindakan otomatis saat dibaca"
    description: "URL dan kode pintasan dapat terbuka otomatis seketika dipindai, memicu webhook, atau dibacakan dengan suara - otomatisasi lima kait yang sama yang menggerakkan NFC dan QR."

subsectionsTitle: "Dirancang untuk pemindaian volume tinggi"
subsections:
  - title: "Multi-pindai, batch read, dan senter sesuai kebutuhan"
    body: "<p>Tiga pengaturan mengubah pemindai dari sekali pakai menjadi alur kerja berkelanjutan. <strong>Multi-scan</strong> memungkinkan Anda memindai beberapa kode dalam satu sesi kamera. <strong>Batch read</strong> membuat kamera tetap terbuka untuk inventaris atau check-in acara. <strong>Senter otomatis</strong> mengaktifkan LED dalam kondisi cahaya rendah sehingga Anda tidak perlu mencari tombol lampu kilat.</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhone memindai beberapa kode QR dan barcode dengan cahaya senter"
    platforms: "iOS"

  - title: "Webhook untuk penghitungan stok & check-in acara"
    body: "<p>Arahkan pemindai barcode ke sistem back-office Anda. Setiap barcode yang dibaca memicu webhook ke URL Anda, sehingga basis data inventaris, CRM peserta, atau katalog perpustakaan Anda diperbarui secara real-time seiring kamera bergerak. Lihat <a href=\"/features/webhooks/\">Webhook & Otomatisasi</a> untuk bentuk payload JSON dan server referensi.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool terhubung langsung ke aplikasi Shortcuts iOS dengan tindakan bawaan: ambil tag NFC terakhir yang dipindai, tulis pesan ke tag, buka pemindai, atau ambil kode QR terakhir yang dipindai. Rangkai menjadi Shortcuts yang memindai tag, mengurai payload-nya, dan memulai apa pun yang Anda inginkan selanjutnya - otomatisasi, pencatatan, journaling, apa saja. Tindakan yang sama menggerakkan kontrol <strong>Tombol Pindai</strong> di layar kunci pada iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone menghubungkan tag NFC ke blok otomatisasi"
    platforms: "iOS"

  - title: "Sinkronisasi iCloud di iPhone, iPad, dan Mac"
    body: "<p>Riwayat pemindaian barcode Anda tersinkronisasi di semua perangkat pada akun iCloud Anda. Pindai rak produk di iPhone, tinjau daftar di iPad, beri judul dan bagikan pemindaian dari <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - satu riwayat tersinkronisasi, tidak perlu memindahkan apa pun secara manual.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool tersinkronisasi di iPhone, iPad, dan Mac"
    platforms: "iOS"

