card:
  title: "3Dオブジェクト・スキャナー"
  description: "オブジェクトの周りを歩くと、AppleのObject Captureがテクスチャ付き3Dモデルを構築。AR用のUSDZ、3DプリントのSTL、Blender用のOBJに書き出せます。LiDAR搭載のiPhone ProまたはiPad Proが必要です。"
  imagePath: "/assets/images/Webflow/3d-object.webp"
  platforms: "iOSのみ"

hero:
  title: "3Dオブジェクト・スキャナー"
  subtitle: "iPhoneでオブジェクトの周りを歩くだけ - NFC.coolがAppleのオンデバイスObject Captureを使い、テクスチャ付き3Dモデルを再構成します。完成したモデルをARや好みの3Dツールに書き出せます。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/3d-object.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "フォトグラメトリ撮影"
    description: "オブジェクトの周りを歩きながら数十枚の写真を撮影。Appleのオンデバイス・Object Captureパイプラインが、リアルなジオメトリを持つテクスチャ付き3Dモデルを再構成します。"
  - title: "プレビュー & 仕上げ"
    description: "書き出し前にモデルを3Dで確認。セッションで撮影された生の画像も確認でき、カメラが何を見たかが分かります。"
  - title: "AR Quick Look"
    description: "AR Quick Lookでスキャンしたオブジェクトをリビングに配置。USDZファイルを友人と共有 - メッセージ内でそのまま表示できます。"
  - title: "6つの書き出し形式"
    description: "テクスチャ付きのUSDZをAR Quick Lookに、ジオメトリのみのUSD・OBJ・STL・PLY・ABCをBlenderやその他の3Dコンテンツパイプラインに書き出せます。"

subsectionsTitle: "あなたの手からARの中へ"
subsections:
  - title: "メッセージで使えるAR Quick Look"
    body: "<p>USDZはAppleのネイティブAR形式。スキャンしたオブジェクトをiMessageやAirDropで共有すると、受信者は回転、自分の空間に配置、スクリーンショットができます - メッセージのプレビューから、アプリインストール不要で。プロダクトプレビュー、彫刻のドキュメント、あるいはちょっとした自慢にも最適。</p>"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>NFC.coolは組み込みアクションでiOSのショートカットアプリと直接つながります: 最後にスキャンしたNFCタグを取得、タグにメッセージを書き込み、スキャナーを開く、最後にスキャンしたQRコードを取得。これらをつなげて、タグをスキャンしてペイロードをパースし、その後何でも - 自動化、ロギング、ジャーナリング、思いつくものすべて - を実行するショートカットを作れます。同じアクションがiOS 17以降のロック画面<strong>スキャンボタン</strong>コントロールも支えています。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhoneがNFCタグを自動化ブロックにつなぐ"
    platforms: "iOS"

  - title: "iPhone・iPad・MacでiCloud同期"
    body: "<p>スキャンしたモデルはiCloud Documentsフォルダに保管されるので、スキャンしたiPhone、確認したiPad、編集する<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Mac</a> - すべてが同じライブラリを見ます。外で撮って、机で仕上げる。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

