slug: "3d-object-scanner"
appStoreURL: "https://apps.apple.com/app/apple-store/id1249686798?pt=106913804&ct=web_ja&mt=8"
backLinkText: "← すべての機能"

hero:
  title: "3Dオブジェクト・スキャン"
  subtitle: "iPhoneでオブジェクトの周りを歩くだけ — NFC.coolがオンデバイスのフォトグラメトリでテクスチャ付き3Dモデルを再構成します。AR Quick Look用のUSDZ、3D印刷用のSTL、Blender用のOBJ/PLY形式に書き出せます。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/3d-object.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "フォトグラメトリ撮影"
    description: "オブジェクトの周りを歩きながら30〜100枚の写真を撮影。オンデバイスのフォトグラメトリ・パイプラインが、リアルなジオメトリを持つテクスチャ付き3Dモデルを再構成します。"
  - title: "編集 & 仕上げ"
    description: "ノイズの削除、メッシュのスムージング、ジオメトリの簡略化、テクスチャの除去。書き出し前に3Dでプレビューできます。"
  - title: "どこへでも書き出し"
    description: "AR Quick Look用にUSDZ、3D印刷用にSTL、Blender用にOBJ/PLY、プロダクション用にUSD/ABC。頂点精度とテクスチャ解像度を選択可能です。"
  - title: "AR Quick Look"
    description: "AR Quick Lookでスキャンしたオブジェクトをリビングに配置。USDZファイルを友人と共有 — メッセージ内でそのまま表示できます。"

screenshots:
  - path: "/assets/images/Webflow/3d-object.webp"
    alt: "フォトグラメトリでオブジェクトをキャプチャ"

specsTitle: "ハードウェア & 書き出し"
specs:
  - title: "ハードウェア要件"
    items:
      - "iOS 17以降の任意のiPhone"
      - "十分なパフォーマンス(A14 Bionic以降を推奨)"
      - "iPad Pro 2020以降にも対応"
  - title: "書き出し形式"
    items:
      - "USDZ(AR Quick Look)"
      - "OBJ + MTL(テクスチャ付き)"
      - "STL(バイナリまたはASCII)"
      - "PLY(点群 + メッシュ)"
      - "USD(プロダクション・パイプライン向け)"

faqTitle: "よくある質問"
faq:
  - question: "オブジェクト・スキャンにLiDARは必要ですか?"
    answer: "いいえ — フォトグラメトリは任意の最新iPhoneで動作します。LiDARが必要なのはルーム・スキャン(RoomPlan)のみです。"
  - question: "スキャンにはどのくらい時間がかかりますか?"
    answer: "30〜100枚の撮影に数分、その後オンデバイスの再構成に2〜5分です。"
  - question: "結果を3D印刷できますか?"
    answer: "はい — STL形式で書き出し、お好みのスライサーに読み込んでください。印刷前に簡略化/スムージング処理を行い、頂点数を抑えることをおすすめします。"

cta:
  title: "世界を3Dでキャプチャしよう。"
  buttonText: "iOS版をダウンロード"
