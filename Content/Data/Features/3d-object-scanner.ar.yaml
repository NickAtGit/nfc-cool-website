faqTitle: "الأسئلة الشائعة"
faq:
  - question: "هل يحتاج iPhone الخاص بي إلى LiDAR؟"
    answer: "نعم. تتطلّب جلسة Object Capture من Apple جهازًا مزوّدًا بـLiDAR - أي iPhone Pro (12 Pro وأحدث) أو iPad Pro من 2020 فصاعدًا. لا تأتي طرازات iPhone غير Pro مزوّدة بـLiDAR."
  - question: "كم يستغرق المسح؟"
    answer: "بضع دقائق من التجوّل حول الجسم، ثم دقيقتان من إعادة البناء على الجهاز. تستغرق الأجسام الأكبر أو الأكثر تفصيلًا وقتًا أطول."
  - question: "هل يمكنني طباعة النتائج بتقنية ثلاثية الأبعاد؟"
    answer: "يمكنك التصدير إلى OBJ والتحويل إلى STL في Blender أو MeshLab أو أي أداة ثلاثية الأبعاد قياسية. تكون دقة النموذج في أفضل حالاتها مع الأجسام متوسطة الحجم وذات الملمس الجيد."
  - question: "ما الفرق بين هذا وماسح الغرف؟"
    answer: "يبني Object Capture (هذه الميزة) نموذجًا ثلاثي الأبعاد واحدًا لشيء ما. يستخدم ماسح الغرف تقنية LiDAR وRoomPlan من Apple لبناء مخطط أرضي لمساحة - جدران وأبواب وأثاث. كلاهما يحتاج إلى LiDAR؛ لكنهما يجيبان عن أسئلة مختلفة."

