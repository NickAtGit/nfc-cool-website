capabilitiesTitle: "ما يمكنك فعله"
capabilities:
  - title: "الالتقاط بالقياس التصويري"
    description: "تجوّل حول الجسم ملتقطًا عشرات الصور. تعيد سلسلة معالجة Object Capture من Apple على الجهاز بناء نموذج ثلاثي الأبعاد بملمس واقعي وهندسة واقعية."
  - title: "المعاينة والتحسين"
    description: "راجع النموذج ثلاثي الأبعاد قبل التصدير. افحص الصور الأولية الملتقطة أثناء الجلسة إن أردت أن ترى ما رأته الكاميرا."
  - title: "AR Quick Look"
    description: "ضع أي جسم ممسوح في غرفة معيشتك عبر AR Quick Look. شارك ملفات USDZ مع أصدقائك - يمكنهم عرضها مباشرة داخل Messages."
  - title: "ست صيغ تصدير"
    description: "صدّر ملف USDZ بملمس واقعي لـAR Quick Look، أو هندسة مجرّدة بصيغ USD أو OBJ أو STL أو PLY أو ABC لبرنامج Blender وبقية سلسلة إنتاج المحتوى ثلاثي الأبعاد."

subsectionsTitle: "من يدك إلى مشهد الواقع المعزّز"
subsections:
  - title: "AR Quick Look في Messages"
    body: "<p>USDZ هو صيغة الواقع المعزّز الأصلية من Apple. شارك جسمًا ممسوحًا عبر iMessage أو AirDrop، ويمكن للمستلم تدويره ووضعه في مساحته الخاصة والتقاط صورة له - كل ذلك من معاينة الرسالة، دون تثبيت أي تطبيق. رائع لمعاينات المنتجات أو توثيق المنحوتات أو مجرد التباهي.</p>"
    platforms: "iOS"

  - title: "الاختصارات وApp Intents"
    body: "<p>يتكامل NFC.cool مباشرة مع تطبيق الاختصارات على iOS عبر إجراءات مدمجة: احصل على آخر وسم NFC ممسوح، أو اكتب رسالة إلى وسم، أو افتح الماسح، أو استرجع آخر رمز QR ممسوح. اربطها معًا في اختصارات تمسح وسمًا، وتحلّل حمولته، وتُطلق ما تشاء بعد ذلك - الأتمتة أو التسجيل أو التدوين، سمِّ ما شئت. تُشغّل الإجراءات نفسها عنصر التحكم <strong>زر المسح</strong> على شاشة القفل في iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone يربط وسم NFC بكتل الأتمتة"
    platforms: "iOS"

  - title: "مزامنة iCloud عبر iPhone وiPad وMac"
    body: "<p>تعيش النماذج الممسوحة في مجلد iCloud Documents، فيرى iPhone الذي مسحت به، وiPad الذي راجعت عليه، و<a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> الذي ستحرّر عليه، المكتبةَ نفسها. التقط وأنت في الطريق، وأنجِز على المكتب.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool يزامن عبر iPhone وiPad وMac"
    platforms: "iOS"

