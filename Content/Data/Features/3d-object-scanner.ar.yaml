card:
  title: "ماسح الأجسام ثلاثية الأبعاد"
  description: "تجوّل حول الجسم ليبني Object Capture من Apple نموذجًا ثلاثي الأبعاد بملمس واقعي. صدّر إلى USDZ للواقع المعزّز، أو STL للطباعة ثلاثية الأبعاد، أو OBJ لبرنامج Blender. يتطلّب iPhone Pro أو iPad Pro مزوّدًا بـLiDAR."
  imagePath: "/assets/images/Webflow/3d-object.webp"
  platforms: "iOS فقط"

hero:
  title: "ماسح الأجسام ثلاثية الأبعاد"
  subtitle: "تجوّل حول جسم حقيقي بواسطة iPhone - يُشغّل NFC.cool تقنية Object Capture من Apple على الجهاز لإعادة بناء نموذج ثلاثي الأبعاد بملمس واقعي. صدّر النموذج المكتمل إلى الواقع المعزّز أو أي أداة ثلاثية الأبعاد."
  platforms: "iOS فقط"
