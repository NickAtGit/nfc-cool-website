card:
  title: "3D Object Scanner"
  description: "Walk around an object and Apple's Object Capture builds a textured 3D model. Export to USDZ for AR, STL for 3D printing, or OBJ for Blender. Requires an iPhone Pro or iPad Pro with LiDAR."
  imagePath: "/assets/images/Webflow/3d-object.webp"
  platforms: "iOS only"

hero:
  title: "3D Object Scanner"
  subtitle: "Walk around a real-world object with your iPhone - NFC.cool runs Apple's on-device Object Capture to reconstruct a textured 3D model. Export the finished model into AR or any 3D tool."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/3d-object.webp"

capabilitiesTitle: "What You Can Do"
capabilities:
  - title: "Photogrammetry Capture"
    description: "Walk around an object capturing dozens of photos. Apple's on-device Object Capture pipeline reconstructs a textured 3D model with realistic geometry."
  - title: "Preview & Refine"
    description: "Review the model in 3D before exporting. Inspect the raw images captured during the session if you want to see what the camera saw."
  - title: "AR Quick Look"
    description: "Drop any scanned object into your living room via AR Quick Look. Share USDZ files with friends - they can view them right inside Messages."
  - title: "Six Export Formats"
    description: "Export a textured USDZ for AR Quick Look, or plain geometry as USD, OBJ, STL, PLY, or ABC for Blender and the rest of the 3D content pipeline."

subsectionsTitle: "From your Hand to your AR View"
subsections:
  - title: "AR Quick Look in Messages"
    body: "<p>USDZ is Apple's native AR format. Share a scanned object in iMessage or AirDrop and the recipient can spin it, place it in their own space, and screenshot it - all from the message preview, no app install. Great for product previews, sculpture documentation, or just showing off.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool plugs straight into the iOS Shortcuts app with built-in actions: grab the last scanned NFC tag, write a message to a tag, open the scanner, or pull the last scanned QR code. Chain them into Shortcuts that scan a tag, parse its payload, and kick off whatever you want next - automation, logging, journaling, you name it. The same actions power the lock-screen <strong>Scan Button</strong> control on iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone connecting an NFC tag to automation blocks"
    platforms: "iOS"

  - title: "iCloud Sync across iPhone, iPad, and Mac"
    body: "<p>Scanned models live in your iCloud Documents folder, so the iPhone you scanned with, the iPad you reviewed on, and the <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> you'll edit on all see the same library. Snap on the go, finish on the desk.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

