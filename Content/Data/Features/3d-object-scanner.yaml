faqTitle: "Frequently asked"
faq:
  - question: "Does my iPhone need LiDAR?"
    answer: "Yes. Apple's Object Capture session requires a LiDAR-equipped device — that means iPhone Pro (12 Pro and newer) or iPad Pro from 2020 onwards. Non-Pro iPhones don't ship with LiDAR."
  - question: "How long does a scan take?"
    answer: "A few minutes of walking around the object, then a couple of minutes of on-device reconstruction. Larger / more textured objects take longer."
  - question: "Can I 3D-print the results?"
    answer: "You can export to OBJ and convert to STL in Blender, MeshLab, or any standard 3D tool. The model fidelity is best for medium-sized, well-textured objects."
  - question: "What's the difference between this and Room Scanning?"
    answer: "Object Capture (this feature) builds a single 3D model of a thing. Room Scanning uses LiDAR and Apple's RoomPlan to build a floor plan of a space — walls, doors, furniture. Both need LiDAR; they answer different questions."
