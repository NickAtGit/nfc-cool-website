slug: "room-scanner"
backLinkText: "← All features"

hero:
  title: "Room Scanner"
  subtitle: "LiDAR-powered RoomPlan turns a walk through your space into a clean parametric floor plan - walls, doors, windows, and recognised furniture, exported as a single USDZ scene."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "What You Can Do"
capabilities:
  - title: "RoomPlan Capture"
    description: "Walk through a room with your iPhone's LiDAR sensor. NFC.cool builds a parametric model in real time - walls, doors, windows, and openings."
  - title: "Recognised Furniture"
    description: "Beds, sofas, tables, chairs, storage, stoves, sinks, toilets, bathtubs and TVs are detected and labelled inside the scene."
  - title: "Floor Area & Dimensions"
    description: "Every room reports floor area, ceiling height, and per-wall dimensions. Read them off the model or embed them in the exported USDZ."
  - title: "AR Quick Look"
    description: "Open the finished room in AR Quick Look or share the USDZ - recipients can walk around the model right inside Messages."

subsectionsTitle: "From a Walk-Through to a Working Floor Plan"
subsections:
  - title: "Place your Room in AR"
    body: "<p>Once a scan is finished, drop it into AR Quick Look and physically walk around the digital twin. Useful for sanity-checking furniture placement before you buy, or for getting a sense of scale that drawings on a tablet just don't convey.</p>"
    imagePath: "/assets/images/Blog/mac-3d-detail.webp"
    imageAlt: "Room scan detail view"
    platforms: "iOS"

  - title: "Multi-Room Workflows"
    body: "<p>Each scan is one room. Capture the kitchen, capture the living room, capture the bedrooms - they live side-by-side in your library, and a 3D editor of your choice can stitch them into a multi-room USDZ. Particularly useful for real-estate listings, renovation planning, or insurance documentation.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool plugs straight into the iOS Shortcuts app with built-in actions: grab the last scanned NFC tag, write a message to a tag, open the scanner, or pull the last scanned QR code. Chain them into Shortcuts that scan a tag, parse its payload, and kick off whatever you want next - automation, logging, journaling, you name it. The same actions power the lock-screen <strong>Scan Button</strong> control on iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone connecting an NFC tag to automation blocks"
    platforms: "iOS"

  - title: "iCloud Sync across iPhone, iPad, and Mac"
    body: "<p>Scanned rooms live in your iCloud Documents folder, so the iPhone you scanned with, the iPad you reviewed on, and the <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> you'll edit on all see the same library. Walk the space once, refine the floor plan later at your desk.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

