faqTitle: "Frequently Asked"
faq:
  - question: "Do I need LiDAR?"
    answer: "Yes. RoomPlan is a LiDAR-only API from Apple. (the 3D Object Scanner needs LiDAR too - Apple's Object Capture session checks for it.)"
  - question: "How long does a scan take?"
    answer: "Just walk through the room. The result is generated live and is ready when you finish."
  - question: "Can I open the result in CAD software?"
    answer: "Yes - USDZ is supported by most modern CAD/3D tools. For SketchUp / Revit workflows, convert via Blender or a free USD-to-OBJ tool."
