hero:
  title: "NFC Reader & Writer"
  subtitle: "Read every common NFC tag and write 25+ message types. Encrypt secrets on the tag itself with NFC Safe (AES-256-GCM). Lock and password-protect tags so they can't be tampered with."
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

capabilitiesTitle: "What you can do"
capabilities:
  - title: "Read every NDEF tag"
    description: "Tap any NFC tag and inspect its NDEF records — URLs, contacts, plain text, MIME data, app launches, custom payloads — plus raw bytes and tech type."
  - title: "Write 25+ message types"
    description: "Websites, phone numbers, vCards, Wi-Fi credentials, Apple Pay & PayPal, Spotify, Apple Music, YouTube, Shortcuts, Instagram, X, Threads, LinkedIn, Mastodon, and more."
  - title: "Lock & password-protect"
    description: "Make a tag permanently read-only, or password-protect it so only authorised devices can read or write. Industrial-grade tag hardening."
  - title: "Format, batch-write, clone"
    description: "Format empty tags, batch-write the same payload to a stack of tags for events or product launches, and clone the contents of one tag to another."
  - title: "Auto-actions on read"
    description: "Auto-run iOS Shortcuts, speak the result aloud, fire a webhook, or open links automatically when a tag is tapped. Five hooks, one tap."

subsectionsTitle: "Deeper than your average NFC app"
subsections:
  - title: "NFC Safe — encrypt secrets on the tag itself"
    body: "<p>Most NFC apps treat the tag like a postcard — anyone with a phone can read it. NFC Safe treats it like a sealed envelope. Your secret (password, recovery phrase, license key, anything text) gets encrypted on-device with <strong>AES-256-GCM</strong>, derived from your passphrase via <strong>PBKDF2-HMAC-SHA256 over 100,000 iterations</strong>, then written to the tag as an external-type NDEF record. Stolen tag, lost tag, brute-forced tag — without the passphrase, the payload is noise.</p><p>Same crypto on both platforms. The format is interoperable: encrypt on iPhone, decrypt on Android, and vice-versa.</p>"
    imagePath: "/assets/images/Blog/nfc-safe-encrypted-secrets.webp"
    imageAlt: "NFC Safe encrypted-secret on a tag"
    platforms: "iOS · Android"

  - title: "Tap counter — see how often each tag is used"
    body: "<p>NFC.cool keeps a quiet history of every tag you tap. The tap counter shows how many times a specific tag has been read or written, when, and what it carried each time. Useful for the event organiser who wants to know which posters actually got scanned, the warehouse tagging inventory, or the curious person wondering whether anyone's actually using that fridge magnet.</p>"
    platforms: "iOS"

  - title: "OpenPrintTag — your 3D-printer filament, on the spool"
    body: "<p>OpenPrintTag is an open standard for embedding filament spool metadata (material, color, manufacturer, UUID, remaining length) into a small CBOR-encoded NDEF record. NFC.cool reads and writes the format natively on both platforms — so Bambu, Prusa, or any printer that wires up an NFC reader can identify your spool the moment it's loaded.</p><p>The same format powers the structured webhook payloads on the <a href=\"/features/webhooks/\">Webhooks & Automation</a> page — fire a POST to your print farm the second a fresh spool is detected.</p>"
    imagePath: "/assets/images/Blog/openprinttag-read-write-nfc-spools-phone.webp"
    imageAlt: "Reading and writing OpenPrintTag NFC spools with a phone"
    platforms: "iOS · Android"

  - title: "Sonicare brush-head reset"
    body: "<p>Philips Sonicare brush heads carry an NFC tag that tracks usage so the handle nags you to replace it. NFC.cool can reset that counter — read the tag's state, walk you through the reset, write the new state back. Same on both platforms. (We don't make brush heads; we just give yours another month of dignity.)</p>"
    imagePath: "/assets/images/Blog/reset-sonicare-brush-head-nfc.webp"
    imageAlt: "Resetting a Philips Sonicare brush head with NFC"
    platforms: "iOS · Android"

  - title: "Hex memory dump & tag analysis"
    body: "<p>For the people who want to know what's actually on the chip: NFC.cool can dump a tag's full memory as hex, detect the underlying chip model (NTAG213/215/216, NTAG424 DNA, MIFARE Classic/Ultralight, ISO 15693 variants, FeliCa, etc.), and report total bytes, user bytes, lock pages, and capability containers. Built for developers, makers, and anyone debugging a stubborn tag.</p>"
    platforms: "iOS · Android"

  - title: "Cryptocurrency on a tap"
    body: "<p>Encode Bitcoin, Ethereum, Solana, Lightning, or any wallet address as a payment-URI NDEF record. Tap to share a static wallet at conferences, embed in a sticker on your product, or hand someone a metal card with a permanent address. Reading is reciprocal — scan a crypto tag, deep-link straight into your wallet app.</p>"
    platforms: "iOS · Android"

  - title: "Wi-Fi onboarding without typing the password"
    body: "<p>Write your Wi-Fi SSID, security type, and password to a tag once. From then on, anyone who taps it joins the network — no spelling out the password, no scribbled sticky note in the AirBnB. Reverse it: read a Wi-Fi tag from someone else's house and let the OS prompt to join.</p>"
    platforms: "iOS · Android"

  - title: "Speak it aloud"
    body: "<p>For accessibility, for hands-free workflows, or just because it's nice — flip the speech-synthesis hook on and every tag's payload gets read aloud the moment you tap it. Speech rate is configurable; works with VoiceOver and other assistive tech in parallel.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>Five built-in Intents wire NFC.cool into the rest of iOS: <code>GetLastNfcTag</code>, <code>WriteNfcType</code>, <code>LaunchScan</code>, <code>ScanIntent</code>, and <code>GetLastQrCode</code>. Build Shortcuts that scan a tag, parse its payload, kick off whatever you want next — automation, logging, journaling, you name it. Powers the lock-screen <strong>Scan Button</strong> control on iOS 17+ too.</p>"
    platforms: "iOS"

  - title: "iCloud sync across iPhone, iPad, and Mac"
    body: "<p>Scan history, NFC Safe entries, and write templates sync seamlessly across every device signed in to your iCloud account. Tap a tag on the iPhone in your pocket and the scan is in your iPad library a moment later. NFC.cool now <a href=\"/blog/nfc-cool-comes-to-mac/\">runs on Apple Silicon Macs</a> too, so the same library shows up there.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

  - title: "Power-user mode"
    body: "<p>Two features for serious NFC operators on iOS: <strong>CSV batch write</strong> — upload a spreadsheet of payloads, hand the phone to an assistant, write the whole stack of tags in one session. And <strong>Expert APDU mode</strong> — send raw ISO 7816 commands to the tag and inspect the responses, for when you're integrating with an unusual reader, a custom protocol, or just want to see what the chip will admit to.</p>"
    platforms: "iOS"

specsTitle: "Supported tags & technologies"
specs:
  - title: "Tag families"
    items:
      - "NFC Forum Type 1, 2, 3, 4, 5"
      - "NTAG 213, 215, 216, 424 DNA, NTAG I²C variants"
      - "MIFARE Classic 1K/4K, MIFARE Ultralight, MIFARE DESFire"
      - "ISO 14443 A/B, ISO 15693, FeliCa (iOS)"
  - title: "Record types"
    items:
      - "URI (web, mailto, tel, sms, geo, custom schemes)"
      - "Text (language-tagged)"
      - "vCard / contact"
      - "Wi-Fi credentials, Bluetooth pairing"
      - "Smart Poster (composite)"
      - "Application launch"
      - "Cryptocurrency address (URI-based)"
      - "OpenPrintTag (3D-printer filament metadata)"
      - "NFC Safe (encrypted external type, urn:nfc:ext:crypto)"
      - "MIME, External, raw bytes"
  - title: "Platform notes"
    items:
      - "iOS 16+ (background tag reading from the lock screen on iPhone XS and newer)"
      - "Android 8.0+ (API 26), foreground NFC reading"
      - "Tag writes from iOS require Core NFC entitlements — built into the app"
      - "Background NFC reading on Android requires the app to be in the foreground"

