faqTitle: "Frequently asked"
faq:
  - question: "Does my iPhone need to be unlocked to read a tag?"
    answer: "For most tag scans, no — iPhone XS and newer can read NDEF tags from the lock screen in the background, no app launch required. On Android, the app needs to be in the foreground to read a tag."
  - question: "Can I read a tag without an internet connection?"
    answer: "Yes. NFC reads and writes happen entirely on-device. NFC.cool never uploads tag content to any server."
  - question: "Is writing NFC tags safe?"
    answer: "Writing is safe and reversible by default — you can re-write a tag as many times as you like. Use the lock feature only when you're sure: once a tag is permanently locked, it cannot be rewritten."
  - question: "How secure is NFC Safe?"
    answer: "NFC Safe encrypts payloads with AES-256-GCM, deriving the key from your passphrase via PBKDF2-HMAC-SHA256 over 100,000 iterations with a 16-byte random salt and a 12-byte nonce per record. Without the passphrase, the payload on the tag is indistinguishable from random bytes."
  - question: "Does the same NFC Safe tag work on iOS and Android?"
    answer: "Yes. The format is interoperable. Encrypt on one platform, decrypt on the other — same passphrase, same payload."
  - question: "Will resetting a Sonicare brush head void anything?"
    answer: "It resets the on-tag usage counter so the handle stops nagging you. The brush head itself doesn't know it's been reset; it just keeps brushing. Use your own judgment on when bristles need replacing."
