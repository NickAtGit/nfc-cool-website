capabilitiesTitle: "What You Can Do"
capabilities:
  - title: "Read Every NDEF Tag"
    description: "Tap any NFC tag and inspect its NDEF records - URLs, contacts, plain text, MIME data, app launches, custom payloads - plus raw bytes and tech type."
  - title: "Write 25+ Message Types"
    description: "Websites, phone numbers, vCards, Wi-Fi credentials, PayPal, Cash App & Venmo, Spotify, YouTube, Shortcuts, Instagram, X, LinkedIn, TikTok, WhatsApp, and more."
  - title: "Lock & Password-Protect"
    description: "Make a tag permanently read-only, or password-protect it so only authorised devices can read or write. Industrial-grade tag hardening."
  - title: "Format, Batch-Write, Clone"
    description: "Format empty tags, batch-write the same payload to a stack of tags for events or product launches, and clone the contents of one tag to another."
  - title: "Auto-Actions on Read"
    description: "Auto-run iOS Shortcuts, speak the result aloud, fire a webhook, or open links automatically when a tag is tapped. Five hooks, one tap."

subsectionsTitle: "Deeper than your Average NFC App"
subsections:
  - title: "NFC Safe - Encrypt Secrets on the Tag Itself"
    body: "<p>Most NFC apps treat the tag like a postcard - anyone with a phone can read it. NFC Safe treats it like a sealed envelope. Your secret (a password, recovery phrase, license key, or any text) is encrypted on your device with AES-256 before it ever reaches the tag. Lose the tag, have it stolen, hand it to a stranger - without your passphrase, the payload is just noise.</p><p>The same encryption works on both platforms, so you can lock a secret on iPhone and unlock it on Android. Want the full breakdown of how it's encrypted? <a href=\"/blog/nfc-safe-encrypted-secrets/\">Read the NFC Safe deep dive on the blog</a>.</p>"
    imagePath: "/assets/images/Blog/nfc-safe-encrypted-secrets.webp"
    imageAlt: "NFC Safe encrypted-secret on a tag"
    platforms: "iOS · Android"

  - title: "NFC Tap Counter - Track Each Tag by Its ID and Count"
    body: "<p>Some NFC chips count their own scans in hardware. NFC Tap Counter puts that to work: it sets up a tag so it appends its live tap count - and/or its unique tag ID - to whatever it carries (a URL, email, SMS, or Shortcut) on every single read. No server, no internet, no backend to maintain - the chip does the counting and the substituting itself.</p><p>That makes one tag tell you which physical sticker was tapped and how many times, and lets you act on it: limit the first 100 scans to a demo, track engagement on a business card, or prove authenticity with a counter that only ever goes up. Want the full walkthrough? <a href=\"/blog/count-nfc-tag-scans/\">Read the NFC Tap Counter guide on the blog</a>, or <a href=\"/tap-counter/\">try the live demo</a> - tap a tag and watch the page count.</p>"
    imagePath: "/assets/images/Blog/count-nfc-tag-scans.webp"
    imageAlt: "An NFC tag tapped by a phone with its scan count rising"
    platforms: "iOS · Android"

  - title: "OpenPrintTag - your 3D-Printer Filament, on the Spool"
    body: "<p>OpenPrintTag is an open standard for embedding filament spool metadata (material, color, manufacturer, UUID, remaining length) into a small CBOR-encoded NDEF record. NFC.cool reads and writes the format natively on both platforms - so compatible printers can identify your spool the moment it's loaded. New to the format? <a href=\"/blog/openprinttag-read-write-nfc-spools-phone/\">Our blog guide walks through reading and writing OpenPrintTag spools</a>.</p><p>The same format powers the structured webhook payloads on the <a href=\"/features/webhooks/\">Webhooks & Automation</a> page - fire a POST to your print farm the second a fresh spool is detected.</p>"
    imagePath: "/assets/images/Blog/openprinttag-read-write-nfc-spools-phone.webp"
    imageAlt: "Reading and writing OpenPrintTag NFC spools with a phone"
    platforms: "iOS · Android"

  - title: "Toothbrush Head Reset"
    body: "<p>Philips Sonicare brush heads carry an NFC tag that tracks usage so the handle nags you to replace it. NFC.cool can reset that counter - read the tag's state, walk you through the reset, write the new state back. Same on both platforms. Want to know exactly what the chip tracks? <a href=\"/blog/reset-sonicare-brush-head-nfc/\">Read the Sonicare brush head guide on the blog</a>. (We don't make brush heads; we just give yours another month of dignity.)</p>"
    imagePath: "/assets/images/Blog/reset-sonicare-brush-head-nfc.webp"
    imageAlt: "Resetting a Philips Sonicare brush head with NFC"
    platforms: "iOS · Android"

  - title: "Power-User Mode"
    body: "<p>For the people who want to know what's actually on the chip: NFC.cool can dump a tag's full memory as hex, detect the underlying chip model (NTAG213/215/216, NTAG424 DNA, MIFARE Classic/Ultralight, ISO 15693 variants, FeliCa, etc.), and report total bytes, user bytes, lock pages, and capability containers. Built for developers, makers, and anyone debugging a tag.</p><p>On iOS, <strong>Expert APDU mode</strong> goes a level deeper - send raw ISO 7816 commands to the tag and inspect the responses, for when you're integrating with an unusual reader, a custom protocol, or just want to see what the chip will admit to.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-power-user-mode.webp"
    imageAlt: "iPhone inspecting NFC tag memory with diagnostic panels"
    platforms: "iOS · Android"

  - title: "Cryptocurrency on a Tap"
    body: "<p>Encode Bitcoin, Ethereum, Solana, Lightning, or any wallet address as a payment-URI NDEF record. Tap to share a static wallet at conferences, embed in a sticker on your product, or hand someone a metal card with a permanent address. Reading is reciprocal - scan a crypto tag, deep-link straight into your wallet app.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-cryptocurrency-tap.webp"
    imageAlt: "iPhone sharing a crypto wallet through an NFC tag"
    platforms: "iOS · Android"

  - title: "Wi-Fi Onboarding Without Typing the Password"
    body: "<p>Write your Wi-Fi SSID, security type, and password to a tag once. From then on, anyone who taps it joins the network - no spelling out the password, no scribbled sticky note in the AirBnB. Reverse it: read a Wi-Fi tag from someone else's house and let the OS prompt to join.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-wifi-onboarding.webp"
    imageAlt: "iPhone joining Wi-Fi from an NFC tag"
    platforms: "iOS · Android"

  - title: "Speak It Aloud"
    body: "<p>For accessibility, for hands-free workflows, or just because it's nice - flip the speech-synthesis hook on and every tag's payload gets read aloud the moment you tap it. Speech rate is configurable; works with VoiceOver and other assistive tech in parallel.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-speak-aloud.webp"
    imageAlt: "iPhone reading an NFC tag aloud with audio waves"
    platforms: "iOS"

  - title: "CSV Batch Write"
    body: "<p>For serious NFC operators on iOS: upload a spreadsheet of payloads, hand the phone to an assistant, and write the whole stack of tags in one session.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-csv-batch-write.webp"
    imageAlt: "iPhone batch-writing NFC tags from a spreadsheet"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool plugs straight into the iOS Shortcuts app with built-in actions: grab the last scanned NFC tag, write a message to a tag, open the scanner, or pull the last scanned QR code. Chain them into Shortcuts that scan a tag, parse its payload, and kick off whatever you want next - automation, logging, journaling, you name it. The same actions power the lock-screen <strong>Scan Button</strong> control on iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone connecting an NFC tag to automation blocks"
    platforms: "iOS"

  - title: "iCloud Sync across iPhone, iPad, and Mac"
    body: "<p>Scan history, NFC Safe entries, and write templates sync seamlessly across every device signed in to your iCloud account. Tap a tag on the iPhone in your pocket and the scan is in your iPad library a moment later. NFC.cool now <a href=\"/blog/nfc-cool-comes-to-mac/\">runs on Apple Silicon Macs</a> too, so the same library shows up there.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

