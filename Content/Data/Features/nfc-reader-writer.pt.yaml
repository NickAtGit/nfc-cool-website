      - "MIFARE Classic 1K/4K, MIFARE Ultralight, MIFARE DESFire"
      - "ISO 14443 A/B, ISO 15693, FeliCa (iOS)"
  - title: "Tipos de Registo"
    items:
      - "URI (web, mailto, tel, sms, geo, esquemas personalizados)"
      - "Texto (com etiqueta de idioma)"
      - "vCard / contacto"
      - "Credenciais de Wi-Fi, emparelhamento Bluetooth"
      - "Smart Poster (composto)"
      - "Lançamento de aplicação"
      - "Endereço de criptomoeda (baseado em URI)"
      - "OpenPrintTag (metadados de filamento de impressora 3D)"
      - "NFC Safe (tipo externo encriptado, urn:nfc:ext:crypto)"
      - "MIME, Externo, bytes em bruto"
  - title: "Notas de Plataforma"
    items:
      - "iOS 16+ (leitura de tags em segundo plano a partir do ecrã de bloqueio no iPhone XS e mais recentes)"
      - "Android 8.0+ (API 26), leitura NFC em primeiro plano"
      - "As gravações de tags no iOS requerem direitos de acesso Core NFC - já integrados na app"
      - "A leitura NFC em segundo plano no Android requer que a app esteja em primeiro plano"

