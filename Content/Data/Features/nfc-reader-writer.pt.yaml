faqTitle: "Perguntas Frequentes"
faq:
  - question: "O meu iPhone precisa de estar desbloqueado para ler uma tag?"
    answer: "Para a maioria das leituras de tags, não - o iPhone XS e mais recentes conseguem ler tags NDEF a partir do ecrã de bloqueio em segundo plano, sem ser preciso abrir a app. No Android, a app precisa de estar em primeiro plano para ler uma tag."
  - question: "Posso ler uma tag sem ligação à internet?"
    answer: "Sim. As leituras e gravações NFC acontecem inteiramente no dispositivo. A NFC.cool nunca carrega o conteúdo das tags para qualquer servidor."
  - question: "É seguro gravar tags NFC?"
    answer: "A gravação é segura e reversível por predefinição - pode regravar uma tag tantas vezes quantas quiser. Use a funcionalidade de bloqueio apenas quando tiver a certeza: assim que uma tag for permanentemente bloqueada, não pode ser regravada."
  - question: "Quão seguro é o NFC Safe?"
    answer: "O NFC Safe encripta os payloads com AES-256-GCM, derivando a chave da sua frase-passe através de PBKDF2-HMAC-SHA256 ao longo de 100 000 iterações, com um salt aleatório de 16 bytes e um nonce de 12 bytes por registo. Sem a frase-passe, o payload na tag é indistinguível de bytes aleatórios."
  - question: "A mesma tag NFC Safe funciona no iOS e no Android?"
    answer: "Sim. O formato é interoperável. Encripte numa plataforma, desencripte na outra - mesma frase-passe, mesmo payload."
  - question: "Reiniciar uma cabeça de escova Sonicare anula alguma coisa?"
    answer: "Reinicia o contador de utilização na tag para que o cabo deixe de o incomodar. A própria cabeça da escova não sabe que foi reiniciada; continua simplesmente a escovar. Use o seu próprio critério para saber quando as cerdas precisam de ser substituídas."

