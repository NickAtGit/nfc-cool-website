faqTitle: "常见问题"
faq:
  - question: "这项功能在 Android 上能用吗？"
    answer: "可以。Webhook 在 NFC.cool Tools 的 iOS 和 Android 版本上都可用，JSON 负载格式在各平台之间保持一致。（另外四种 iOS 联动：自动运行快捷指令、语音、音频、打开链接，仅限 iOS。）"
  - question: "我可以配置多少个 URL？"
    answer: "目前只能配置一个 URL。所有扫描事件都会发送到这同一个 URL，并通过已启用的来源开关和负载类型加以区分。"
  - question: "支持哪些认证方式？"
    answer: "HTTP Basic 认证：用户名 + 密码，以加密形式存储在 iOS 钥匙串中。目前暂不支持 Bearer 令牌、自定义请求头和 HMAC 签名。"
  - question: "如果我的服务器离线了会怎样？"
    answer: "POST 会失败，该事件会被记录在设备上。目前还没有自动重试队列；如果你的服务器可能不稳定，请把处理逻辑设计为可在重试时幂等执行，并从扫描历史中重新触发。"
  - question: "负载大小有限制吗？"
    answer: "NFC.cool 不施加硬性限制。标签负载本身则受 NFC 标准约束（典型的 NDEF 标签为几 KB）。"
  - question: "在哪里能看到它的实际运行效果？"
    answer: "克隆 <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">GitHub 上的 Web 服务器</a>，在本地运行，把应用对准它，你就能实时看到每一次扫描到达。"

