faqTitle: "الأسئلة الشائعة"
faq:
  - question: "هل يعمل هذا على Android؟"
    answer: "نعم - الـwebhooks متوفّرة على نسختي iOS وAndroid من NFC.cool Tools. شكل حمولة JSON نفسه عبر المنصّات. (الخطّافات الأربعة الأخرى في iOS - الاختصار التلقائي، والنطق، والصوت، وفتح الروابط - حصرية لـiOS.)"
  - question: "كم عدد عناوين URL التي يمكنني ضبطها؟"
    answer: "URL واحد اليوم. يستقبل الـURL نفسه جميع أحداث المسح، ويُميَّز بينها عبر مفاتيح المصادر المُفعّلة ونوع الحمولة."
  - question: "ما نوع المصادقة المدعوم؟"
    answer: "مصادقة HTTP Basic - اسم المستخدم + كلمة المرور، مخزّنة مشفّرة في iOS Keychain. أما رموز Bearer، والترويسات المخصّصة، وتوقيع HMAC فغير مدعومة حاليًا."
  - question: "ماذا يحدث إذا كان خادمي غير متصل؟"
    answer: "يفشل طلب POST ويُسجَّل الحدث على الجهاز. لا يوجد اليوم طابور إعادة محاولة تلقائي؛ فإذا كان خادمك عرضة للتذبذب، فصمّم معالجك ليكون آمنًا عند التكرار (idempotent)، وأعد إطلاقه من سجل عمليات المسح."
  - question: "هل هناك حد لحجم الحمولة؟"
    answer: "لا حد صارم يفرضه NFC.cool. حمولات الوسوم نفسها محدودة بمعيار NFC (بضعة كيلوبايت للوسوم NDEF النموذجية)."
  - question: "أين يمكنني رؤيته يعمل فعليًا؟"
    answer: "استنسخ <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">خادم الويب على GitHub</a>، وشغّله محليًا، ووجّه التطبيق نحوه، وسترى كل عملية مسح تصل في الوقت الفعلي."

