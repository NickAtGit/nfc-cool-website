faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿El OCR funciona sin conexión?"
    answer: "Sí. Vision de iOS se encarga del OCR por completo en el dispositivo. Puedes escanear y aplicar OCR a documentos en un avión, en el campo, en cualquier sitio."
  - question: "¿Qué idiomas admite el OCR?"
    answer: "Vision de iOS reconoce actualmente inglés, francés, italiano, alemán, español, portugués y chino simplificado. Además admite el reconocimiento de escritura a mano."
  - question: "¿Qué precisión tiene el OCR?"
    answer: "Muy alta para texto impreso. La precisión con la escritura a mano depende de la claridad y el contraste. Puedes editar cualquier texto reconocido después del escaneo."
  - question: "¿Dónde se guardan los documentos escaneados?"
    answer: "Plan gratis: en la sandbox de la app en el dispositivo. Platinum: opcionalmente exportados de forma automática a los Documentos de iCloud, para que aparezcan en la app Archivos y en todos los dispositivos con sesión iniciada en tu iCloud."

