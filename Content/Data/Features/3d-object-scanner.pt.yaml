faqTitle: "Perguntas Frequentes"
faq:
  - question: "O meu iPhone precisa de LiDAR?"
    answer: "Sim. A sessão de Object Capture da Apple requer um dispositivo equipado com LiDAR - ou seja, um iPhone Pro (12 Pro e mais recentes) ou um iPad Pro a partir de 2020. Os iPhones não-Pro não vêm com LiDAR."
  - question: "Quanto tempo demora uma digitalização?"
    answer: "Alguns minutos a andar à volta do objeto, depois um par de minutos de reconstrução no dispositivo. Objetos maiores / com mais textura demoram mais."
  - question: "Posso imprimir os resultados em 3D?"
    answer: "Pode exportar para OBJ e converter para STL no Blender, no MeshLab ou em qualquer ferramenta 3D padrão. A fidelidade do modelo é melhor para objetos de tamanho médio e bem texturados."
  - question: "Qual é a diferença entre isto e o Digitalizador de Divisões?"
    answer: "O Object Capture (esta funcionalidade) cria um único modelo 3D de uma coisa. O Digitalizador de Divisões usa LiDAR e o RoomPlan da Apple para criar uma planta de um espaço - paredes, portas, mobiliário. Ambos precisam de LiDAR; respondem a perguntas diferentes."

