capabilitiesTitle: "O Que Pode Fazer"
capabilities:
  - title: "Captura por Fotogrametria"
    description: "Ande à volta de um objeto a captar dezenas de fotos. O pipeline de Object Capture da Apple no dispositivo reconstrói um modelo 3D com textura e geometria realista."
  - title: "Pré-visualizar e Refinar"
    description: "Reveja o modelo em 3D antes de exportar. Inspecione as imagens em bruto captadas durante a sessão se quiser ver o que a câmara viu."
  - title: "AR Quick Look"
    description: "Coloque qualquer objeto digitalizado na sua sala de estar através do AR Quick Look. Partilhe ficheiros USDZ com amigos - podem vê-los diretamente nas Mensagens."
  - title: "Seis Formatos de Exportação"
    description: "Exporte um USDZ com textura para o AR Quick Look, ou geometria simples como USD, OBJ, STL, PLY ou ABC para o Blender e o resto do pipeline de conteúdos 3D."

subsectionsTitle: "Da sua Mão para a sua Vista de AR"
subsections:
  - title: "AR Quick Look nas Mensagens"
    body: "<p>O USDZ é o formato de AR nativo da Apple. Partilhe um objeto digitalizado no iMessage ou por AirDrop e o destinatário pode girá-lo, colocá-lo no seu próprio espaço e fazer uma captura de ecrã - tudo a partir da pré-visualização da mensagem, sem instalar a aplicação. Ótimo para pré-visualizações de produtos, documentação de esculturas ou simplesmente para mostrar.</p>"
    platforms: "iOS"

  - title: "Atalhos e App Intents"
    body: "<p>O NFC.cool integra-se diretamente na aplicação Atalhos do iOS com ações incorporadas: obter a última tag NFC lida, gravar uma mensagem numa tag, abrir o digitalizador ou obter o último código QR lido. Encadeie-as em Atalhos que leem uma tag, analisam o seu conteúdo e desencadeiam o que quiser a seguir - automação, registo, diário, o que imaginar. As mesmas ações alimentam o controlo <strong>Botão de Digitalização</strong> no ecrã bloqueado no iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone a ligar uma tag NFC a blocos de automação"
    platforms: "iOS"

  - title: "Sincronização iCloud entre iPhone, iPad e Mac"
    body: "<p>Os modelos digitalizados ficam na sua pasta de Documentos no iCloud, por isso o iPhone com que digitalizou, o iPad em que reviu e o <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> em que vai editar veem todos a mesma biblioteca. Capture em movimento, termine na secretária.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool a sincronizar entre iPhone, iPad e Mac"
    platforms: "iOS"

