hero:
  title: "QR-Code-Scanner & Studio"
  subtitle: "Scanne jeden QR-Code mit der Kamera oder finde ihn in einem Screenshot. Gestalte eigene QR-Codes mit Logos, Genmoji und Markenfarben im integrierten QR Code Studio."
  platforms: "Nur iOS"
  heroImagePath: "/assets/images/Webflow/qr-studio.webp"

capabilitiesTitle: "Was du tun kannst"
capabilities:
  - title: "Universelles QR-Scannen"
    description: "URLs, vCards, WLAN-Daten, Kalender-Events, Zahlungen, App-Store-Deeplinks – NFC.cool erkennt den Payload-Typ und schlägt die richtige Aktion vor."
  - title: "QR-Codes in Screenshots erkennen"
    description: "Wähle ein beliebiges Bild aus deiner Mediathek – NFC.cool findet und dekodiert jeden QR-Code darin, sogar teilweise verdeckte oder kontrastarme."
  - title: "QR Code Studio"
    description: "Gestalte QR-Codes mit eigenen Farben, abgerundeten Augenformen, eigenen Pixel-Formen sowie Logo oder Genmoji in der Mitte. Export als SVG-Vektor oder PNG bis 4096×4096."
  - title: "Verlauf & Wiederfreigabe"
    description: "Jeder Scan wird lokal gespeichert – Payload erneut öffnen, kopieren, teilen oder direkt zur Aktion zurückspringen."
  - title: "Automatische Aktionen beim Lesen"
    description: "URLs öffnen, Shortcuts ausführen, Webhook abfeuern oder das Ergebnis vorlesen – sobald ein Code gescannt wird. Dieselben fünf Hooks wie bei NFC."

subsectionsTitle: "Mehr als ein Scanner"
subsections:
  - title: "Widgets – dein QR auf dem Homescreen"
    body: "<p>Lege deine meistgeteilten QR-Codes als <strong>QR-Image-Widget</strong> auf den Homescreen von iPhone oder iPad. WLAN fürs Büro, der Link zu deiner Visitenkarte, die Speisekarte deiner Bar – auf einen Blick sichtbar und vom Handy daneben scannbar, ohne dass du etwas öffnen musst. Das <strong>Last-Scan-Widget</strong> zeigt den zuletzt gescannten Code, sodass du ihn sofort wieder teilen kannst. Und das <strong>Scan-Button-Widget</strong> öffnet den Scanner direkt vom Homescreen oder Lockscreen – ein Tap, unter iOS 17+ sogar über interaktive Controls.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>Drei Intents binden den QR-Scanner in die iOS-Automatisierung ein: <code>ScanIntent</code> (Scanner aus einem Shortcut starten), <code>GetLastQrCode</code> (den zuletzt gescannten Code abrufen), <code>LaunchScan</code> (App im Scan-Modus öffnen). Baue Shortcuts, die einen Code scannen, die URL parsen, eine Zeile in Numbers ergänzen, an Slack posten – alles, was iOS skripten lässt.</p>"
    platforms: "iOS"

  - title: "QR Code Studio: Pixel-Formen, Farben, Augen, Logos"
    body: "<p>Im QR Code Studio bleibt die Scanbarkeit erhalten, aber die corporate-eckige Ästhetik geht. Wähle Pixel-Formen (rund, Punkt, Raute), Augen-Stile, Vorder- und Hintergrundfarben, ein Logo oder Genmoji in der Mitte. Export in sechs Pixelgrößen – 512, 1024, 1536, 2048, 3072 oder 4096 – oder als sauberer SVG-Vektor für den Druck.</p>"
    imagePath: "/assets/images/Webflow/qr-studio.webp"
    imageAlt: "QR Code Studio mit eigenem Logo"
    platforms: "iOS"

  - title: "iCloud-Sync über iPhone, iPad und Mac"
    body: "<p>Scan-Verlauf und QR-Studio-Designs synchronisieren über jedes Gerät an deiner iCloud. Entwirf einen QR auf dem iPad, teile ihn vom iPhone, bearbeite ihn auf dem <a href=\"/de/blog/nfc-cool-comes-to-mac/\">Mac</a> – gleiche Bibliothek, gleiche Edits, kein Hin-und-her-Exportieren.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool synchronisiert über iPhone, iPad und Mac"
    platforms: "iOS"

  - title: "Multi-Scan, Batch-Read und Taschenlampe bei Bedarf"
    body: "<p>Drei Einstellungen verwandeln den Scanner von Einmal-Scan in einen kontinuierlichen Workflow. <strong>Multi-Scan</strong> nimmt mehrere Codes in einer Kamera-Session auf. <strong>Batch-Read</strong> hält die Kamera offen für Inventur oder Event-Check-ins. <strong>Auto-Taschenlampe</strong> schaltet die LED bei schlechtem Licht ein. Es gibt auch einen Schalter zwischen iOS 16's VisionKit-DataScanner und der klassischen AVFoundation-Kamera – falls du das ältere Verhalten bevorzugst.</p>"
    platforms: "iOS"

