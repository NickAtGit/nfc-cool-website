faqTitle: "Häufig gefragt"
faq:
  - question: "Warum nur auf iOS?"
    answer: "Die Android-Version von NFC.cool fokussiert sich derzeit auf NFC und die digitale Visitenkarte. QR-Scannen steht auf der Android-Roadmap."
  - question: "Sind die Studio-QR-Codes mit allen Readern kompatibel?"
    answer: "Ja. Es sind Standard-QR-Codes mit optionalem kosmetischem Styling. Jeder Standard-Reader (iOS-Kamera, Google Lens, Android-Standardscanner) kann sie dekodieren."
  - question: "Kann ich einen QR-Code aus einem Screenshot scannen?"
    answer: "Ja. Wähle ein beliebiges Bild aus der Mediathek und NFC.cool findet jeden QR-Code darin - auch teilweise verdeckte."
  - question: "Hat das Studio ein Wasserzeichen oder NFC.cool-Branding?"
    answer: "Free-Codes tragen einen kleinen Hinweis. Platinum-Codes sind wasserzeichenfrei - rein dein Design."
