featuredReviewsTitle: "ما يقوله الناس عن NFC"
featuredReviews:
  - quote: "تجربة استخدام جميلة وتنفيذ يكاد يكون خاليًا من العيوب، بخلاف تطبيقات NFC الأخرى."
    author: "garretthoyos"
    location: "App Store · مارس 2023"
  - quote: "أحبّ هذا التطبيق كثيرًا. إنه رائع لأشخاص مثلي لا يعرفون سوى القليل جدًا عن وسوم NFC أو لا يعرفون شيئًا!"
    author: "Dallasg479"
    location: "App Store · أكتوبر 2020"

faqTitle: "الأسئلة الشائعة"
faq:
  - question: "هل يجب أن يكون iPhone غير مقفل لقراءة وسم؟"
    answer: "بالنسبة لمعظم عمليات مسح الوسوم، لا - يستطيع iPhone XS والأحدث قراءة وسوم NDEF من شاشة القفل في الخلفية، دون الحاجة إلى تشغيل التطبيق. على Android، يحتاج التطبيق إلى أن يكون في المقدّمة لقراءة وسم."
  - question: "هل يمكنني قراءة وسم دون اتصال بالإنترنت؟"
    answer: "نعم. تجري عمليات قراءة وكتابة NFC بالكامل على الجهاز. لا يرفع NFC.cool محتوى الوسوم إلى أي خادم أبدًا."
  - question: "هل الكتابة على وسوم NFC آمنة؟"
    answer: "الكتابة آمنة وقابلة للتراجع افتراضيًا - يمكنك إعادة الكتابة على الوسم بقدر ما تشاء. لا تستخدم ميزة القفل إلا حين تكون متأكدًا: فبمجرد قفل الوسم نهائيًا، لا يمكن إعادة الكتابة عليه."
  - question: "ما مدى أمان NFC Safe؟"
    answer: "يشفّر NFC Safe الحمولات بـAES-256-GCM، مشتقًّا المفتاح من عبارة المرور عبر PBKDF2-HMAC-SHA256 على مدى 100,000 تكرار مع ملح عشوائي بحجم 16-byte وقيمة nonce بحجم 12-byte لكل سجل. دون عبارة المرور، تكون الحمولة على الوسم غير قابلة للتمييز عن بايتات عشوائية."
  - question: "هل يعمل وسم NFC Safe نفسه على iOS وAndroid؟"
    answer: "نعم. الصيغة قابلة للتشغيل البيني. شفّر على منصّة وفكّ التشفير على الأخرى - عبارة المرور نفسها، والحمولة نفسها."
  - question: "هل تُبطل إعادة ضبط رأس فرشاة Sonicare أي شيء؟"
    answer: "تعيد ضبط عدّاد الاستخدام الموجود على الوسم فيتوقّف المقبض عن تذكيرك. رأس الفرشاة نفسه لا يعلم أنه أُعيد ضبطه؛ فهو يواصل التنظيف فحسب. اعتمد على تقديرك الخاص لتحديد متى تحتاج الشعيرات إلى الاستبدال."

