slug: "room-scanner"
backLinkText: "← すべての機能"

hero:
  title: "ルーム・スキャナー"
  subtitle: "LiDAR搭載のRoomPlanで、部屋を歩くだけ - 壁、ドア、窓、認識された家具まで含めた美しいパラメトリックな間取り図を、ひとつのUSDZシーンとして書き出せます。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "RoomPlanキャプチャ"
    description: "iPhoneのLiDARセンサーで部屋を歩くだけ。NFC.coolが壁、ドア、窓、開口部を含むパラメトリックモデルをリアルタイムに構築します。"
  - title: "家具の認識"
    description: "ベッド、ソファ、テーブル、椅子、収納、コンロ、シンク、トイレ、バスタブ、テレビをシーン内で認識し、ラベル付けします。"
  - title: "床面積 & 寸法"
    description: "各部屋ごとに床面積、天井高、壁の長さを出力。モデルから直接読み取るか、書き出されたUSDZに埋め込めます。"
  - title: "AR Quick Look"
    description: "完成した部屋をAR Quick Lookで開いたり、USDZを共有 - 受け取った相手はメッセージ内でモデルの中を歩けます。"

subsectionsTitle: "ウォークスルーから本物の間取り図へ"
subsections:
  - title: "ARで部屋に入る"
    body: "<p>スキャンが終わったら、AR Quick Lookに入れて、デジタルツインの中を物理的に歩き回ってください。家具を買う前の配置確認、あるいはタブレットの図面では伝わらないスケール感をつかむのに便利です。</p>"
    imagePath: "/assets/images/Blog/mac-3d-detail.webp"
    imageAlt: "ルームスキャン詳細表示"
    platforms: "iOS"

  - title: "複数の部屋のワークフロー"
    body: "<p>各スキャンは1つの部屋。キッチン、リビング、寝室をそれぞれ取り込み - すべてがライブラリに並び、お好みの3DエディターでマルチルームのUSDZに統合できます。不動産のリスティング、リノベーション計画、保険ドキュメントに特に有用です。</p>"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>NFC.coolは組み込みアクションでiOSのショートカットアプリと直接つながります: 最後にスキャンしたNFCタグを取得、タグにメッセージを書き込み、スキャナーを開く、最後にスキャンしたQRコードを取得。これらをつなげて、タグをスキャンしてペイロードをパースし、その後何でも - 自動化、ロギング、ジャーナリング、思いつくものすべて - を実行するショートカットを作れます。同じアクションがiOS 17以降のロック画面<strong>スキャンボタン</strong>コントロールも支えています。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhoneがNFCタグを自動化ブロックにつなぐ"
    platforms: "iOS"

  - title: "iPhone・iPad・MacでiCloud同期"
    body: "<p>スキャンした部屋はiCloud Documentsフォルダに保管されるので、スキャンしたiPhone、確認したiPad、編集する<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Mac</a> - すべてが同じライブラリを見ます。一度部屋を歩いて、間取り図は後から机で仕上げる。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

specsTitle: "ハードウェア & 出力"
specs:
  - title: "ハードウェア要件"
    items:
      - "LiDAR搭載iPhone(12 Pro以降のProモデル)"
      - "iPad Pro(2020)以降にも対応"
      - "RoomPlanはiOS 16以降で利用可能 - 最新の改善はiOS 17以降"
  - title: "出力"
    items:
      - "名前付きエンティティを含むUSDZシーン"
      - "壁、ドア、窓、開口部"
      - "認識された家具カテゴリ"
      - "床面積と寸法"

