faqTitle: "Questions fréquentes"
faq:
  - question: "Pourquoi cette fonctionnalité est-elle réservée à iOS ?"
    answer: "La version Android de NFC.cool se concentre pour l'instant sur le NFC et la carte de visite numérique. Le scan de QR codes est prévu dans la feuille de route Android."
  - question: "Les QR codes créés dans le studio sont-ils compatibles avec tous les lecteurs ?"
    answer: "Oui. Ce sont des QR codes standard avec un habillage esthétique facultatif. Tous les lecteurs standard (appareil photo iOS, Google Lens, scanners Android d'origine) peuvent les décoder."
  - question: "Puis-je scanner un QR code depuis une capture d'écran ?"
    answer: "Oui. Choisissez une image dans votre photothèque et NFC.cool y trouve tous les QR codes, même partiellement masqués."
  - question: "Le studio ajoute-t-il un filigrane ou une mention NFC.cool ?"
    answer: "Les codes gratuits portent une petite attribution. Les codes Platinum sont sans filigrane - uniquement votre création."

