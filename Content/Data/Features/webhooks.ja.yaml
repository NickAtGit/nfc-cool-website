faqTitle: "よくある質問"
faq:
  - question: "Androidで動きますか?"
    answer: "はい - WebhookはNFC.cool ToolsのiOS版とAndroid版の両方で利用できます。JSONペイロードの形はプラットフォーム間で共通です。(他の4つのiOSフック - 自動ショートカット、音声合成、オーディオ、リンクオープン - はiOSのみです。)"
  - question: "URLは何個まで設定できますか?"
    answer: "今のところ1つです。同じURLがすべてのスキャンイベントを受信し、有効化されたソーストグルとペイロードタイプで識別されます。"
  - question: "どんな認証に対応していますか?"
    answer: "HTTP Basic認証 - ユーザー名 + パスワード、iOS Keychainに暗号化保存。Bearerトークン、カスタムヘッダー、HMAC署名は現在サポートされていません。"
  - question: "サーバーがオフラインだった場合は?"
    answer: "POSTは失敗し、イベントは端末上にログされます。今のところ自動リトライキューはありません - ハンドラーをidempotentに設計し、スキャン履歴から再トリガーできるようにしてください。"
  - question: "ペイロードサイズの制限は?"
    answer: "NFC.cool側からのハード制限はありません。タグ自体のペイロードはNFC規格(典型的なNDEFタグで数KB)で制限されます。"
  - question: "実際に動くのを見られますか?"
    answer: "<a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">GitHub上のWebサーバー</a>をクローンしてローカルで起動、アプリをそこに向ければ、すべてのスキャンがリアルタイムで届くのが見えます。"
