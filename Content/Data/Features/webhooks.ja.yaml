faqTitle: "よくある質問"
faq:
  - question: "Androidでも使えますか?"
    answer: "はい - Webhookは NFC.cool ToolsのiOS版とAndroid版の両方で利用できます。"
  - question: "1回のスキャンで複数のエンドポイントを起動できますか?"
    answer: "はい。有効化された各Webhookが独立してイベントを受け取ります。フィルタールールで、どのペイロードをどのエンドポイントに送るかを決められます。"
  - question: "レート制限はありますか?"
    answer: "NFC.cool自体にレート制限はありませんが、受信側のサービスにはほぼ必ずあります。Webhookのフィルタリングを使って、無関係なスキャンでエンドポイントを溢れさせないようにしてください。"
  - question: "サーバーがオフラインのときはどうなりますか?"
    answer: "失敗したPOSTはデバイス上のローカルキューに溜まり、指数バックオフで再試行されます。履歴ビューから過去のスキャンをいつでも手動で再送信できます。"

cta:
  title: "スキャンをワークフローに組み込もう。"
  buttonText: "NFC.coolを入手"
