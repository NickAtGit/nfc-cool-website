slug: "webhooks"
backLinkText: "← すべての機能"

hero:
  title: "Webhook & オートメーション"
  subtitle: "5つの組み込みフックが、NFCタグ・QRコード・バーコードをスキャンした瞬間に動きます - サーバーへPOST、URLを自動オープン、ショートカット実行、結果を読み上げ、サウンド再生。NFC.coolはスキャナー、アクションはあなたのものです。"
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/webhook.webp"

capabilitiesTitle: "5つのフック"
capabilities:
  - title: "Webhook(あなたのURLへPOST)"
    description: "スキャン成功の瞬間に、構造化JSONのボディでHTTP POST。1つのURLとオプションのHTTP Basic認証を設定すれば完了です。iOSとAndroidの両方で利用可能。"
  - title: "ショートカット(iOS)"
    description: "スキャンされたURLが <code>shortcuts://</code> スキームの場合、対応するiOSショートカットを自動実行 - 余分なタップは不要。Shortcutsが届くものすべてにスキャンデータを流せます。"
  - title: "リンクを開く(iOS)"
    description: "ペイロードが通常のURLの場合、Safari(または対応するディープリンク先)が自動で開きます。「タップして開く」のステップを省略します。"
  - title: "音声合成(iOS)"
    description: "ペイロードをハンズフリーで読み上げます。読み上げ速度は調整可能。アクセシビリティ、両手がふさがった作業、あるいは満足感のある確認に。"
  - title: "オーディオ再生(iOS)"
    description: "スキャン時に確認音を再生 - 任意のオーディオファイルか、組み込みのトーンから選べます。"

subsectionsTitle: "Webhookの仕組み"
subsections:
  - title: "トリガー - NFC・QR・バーコード"
    body: "<p>Webhookは3つのイベントソースで発火します: <strong>NFCスキャン</strong>、<strong>QRスキャン</strong>、<strong>バーコードスキャン</strong>。それぞれに有効/無効のトグルがあり、たとえばNFCの読み取りだけを在庫システムへ流し、カメラスキャナーで同じエンドポイントを連打しないようにできます。Webhook自体はすべて同じ - 1つのURL、1つのJSONペイロード、1つのPOSTです。</p>"
    platforms: "iOS · Android"

  - title: "ペイロードの形"
    body: "<p>各POSTはこの形のJSONボディを送ります:</p><pre><code>{\n  \"identifier\": \"04:A3:B2:81:C5:6E:80\",\n  \"date\": \"2026-05-15T10:42:18Z\",\n  \"content\": \"https://example.com/product/42\",\n  \"tagType\": \"openPrintTag\",\n  \"structured\": {\n    \"material\": \"PLA\",\n    \"color\": \"#FF6F4C\",\n    \"manufacturer\": \"Prusament\",\n    \"uuid\": \"5e8a-…\"\n  }\n}</code></pre><p><code>identifier</code> はタグUIDまたはスキャンされたコード。<code>date</code> はISO 8601。<code>content</code> はデコードされたペイロード。<code>tagType</code> と <code>structured</code> は <a href=\"/ja/features/nfc-reader-writer/\">OpenPrintTag</a> のような特殊形式の時のみ含まれます - 他のスキャンでは省略されます。</p>"
    platforms: "iOS · Android"

  - title: "curlの例"
    body: "<p>サーバー側で受け取るものはこんな感じです - 通常のURLペイロードの <code>curl</code> 相当:</p><pre><code>curl -X POST https://your-server.example.com/scans \\\n  -H \"Content-Type: application/json\" \\\n  -u \"username:password\" \\\n  -d '{\n    \"identifier\": \"04:A3:B2:81:C5:6E:80\",\n    \"date\": \"2026-05-15T10:42:18Z\",\n    \"content\": \"https://example.com/menu\"\n  }'</code></pre><p><code>-u</code> フラグは、設定でHTTP Basic認証を構成した時にNFC.coolが送るものに対応します - ユーザー名とパスワードはiOS Keychainに暗号化保存されます。</p>"
    platforms: "iOS · Android"

  - title: "GitHub上のリファレンスサーバー"
    body: "<p>ループ全体を端から端まで見る一番速い方法: <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">GitHub上のWebサーバー</a>。NFC.coolのWebhookペイロードを受信し、ログを出し、構造をライブで表示する最小限のサンプルサーバー。クローンして起動し、iPhoneを向ければ、スキャンが届くのが見えます。</p>"
    platforms: "iOS · Android"

specsTitle: "技術的な詳細"
specs:
  - title: "トランスポート"
    items:
      - "HTTPS推奨; 開発時はHTTPも可"
      - "POST、`Content-Type: application/json`"
      - "オプションのHTTP Basic認証(ユーザー名 + パスワード)"
      - "認証情報はiOS Keychainに暗号化保存"
  - title: "ペイロード"
    items:
      - "`identifier` - タグUIDまたはスキャンされたコード"
      - "`date` - ISO 8601タイムスタンプ"
      - "`content` - デコードされたペイロード(URL文字列、テキストなど)"
      - "`tagType` - 構造化タグの時のみ存在(例: `openPrintTag`)"
      - "`structured` - 構造化タグタイプのネストされたJSON"
  - title: "ソース"
    items:
      - "NFCスキャン(NDEF読み取り)"
      - "QRスキャン"
      - "バーコードスキャン"
      - "各ソースは独立して有効化可能"

