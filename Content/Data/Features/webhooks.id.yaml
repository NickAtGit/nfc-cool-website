faqTitle: "Pertanyaan Umum"
faq:
  - question: "Apakah ini berfungsi di Android?"
    answer: "Ya - webhook tersedia di versi iOS dan Android dari NFC.cool Tools. Bentuk payload JSON sama di semua platform. (Empat kait iOS lainnya - Shortcut otomatis, suara, audio, buka tautan - hanya untuk iOS.)"
  - question: "Berapa banyak URL yang bisa saya konfigurasikan?"
    answer: "Satu URL saat ini. URL yang sama menerima semua acara pemindaian, dibedakan oleh sakelar sumber yang diaktifkan dan jenis payload."
  - question: "Autentikasi apa yang didukung?"
    answer: "HTTP Basic auth - nama pengguna + kata sandi, tersimpan terenkripsi di iOS Keychain. Bearer token, header khusus, dan penandatanganan HMAC saat ini tidak didukung."
  - question: "Apa yang terjadi jika server saya offline?"
    answer: "POST gagal dan acara dicatat di perangkat. Saat ini tidak ada antrean percobaan ulang otomatis; jika server Anda mungkin tidak stabil, rancang handler Anda agar idempoten saat percobaan ulang dan picu ulang dari riwayat pemindaian."
  - question: "Apakah ada batas ukuran payload?"
    answer: "Tidak ada batas keras yang diterapkan oleh NFC.cool. Payload tag itu sendiri dibatasi oleh standar NFC (beberapa KB untuk tag NDEF tipikal)."
  - question: "Di mana saya bisa melihatnya bekerja?"
    answer: "Clone <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Server Web di GitHub</a>, jalankan secara lokal, arahkan aplikasi ke sana, dan Anda akan melihat setiap pemindaian tiba secara real time."

