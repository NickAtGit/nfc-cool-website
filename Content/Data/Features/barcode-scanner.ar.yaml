faqTitle: "الأسئلة الشائعة"
faq:
  - question: "لماذا يقتصر هذا على iOS؟"
    answer: "يركّز إصدار NFC.cool على Android حاليًا على NFC وبطاقة العمل الرقمية. ومسح الباركود مُدرَج في خارطة طريق Android."
  - question: "هل يمكنني مسح عدة رموز باركود دفعة واحدة؟"
    answer: "نعم - يُبقي الوضع المجمّع الكاميرا مفتوحة ويصفّ كل باركود يعثر عليه في قائمة انتظار. المس أي عنصر في القائمة للتعامل معه."
  - question: "هل يمكنني حفظ عمليات المسح ومشاركتها؟"
    answer: "نعم - تبقى كل عملية مسح في عرض السجل مع طابعها الزمني. يمكنك تمييز عملية مسح بالمفضّلة ومنحها عنوانًا ومشاركتها من هناك."
  - question: "هل يعمل الماسح دون اتصال بالإنترنت؟"
    answer: "نعم بالنسبة إلى المسح نفسه. يحتاج البحث عن المنتجات إلى الإنترنت (إذ يمرّر رقم الباركود عبر محرك بحث)، لكن قراءة الباركود تتم على الجهاز فقط."

