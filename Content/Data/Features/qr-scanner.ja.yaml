slug: "qr-scanner"
backLinkText: "← すべての機能"

card:
  title: "QRコードスキャナー & スタジオ"
  description: "カメラからQRコードをスキャン、または写真から抽出。組み込みのQRコードスタジオで、アイコンやGenmojiを使ってオリジナルをデザインできます。"
  imagePath: "/assets/images/Webflow/qr-studio.webp"
  platforms: "iOSのみ"

hero:
  title: "QRコードスキャナー & スタジオ"
  subtitle: "カメラからQRコードをスキャン、スクリーンショットからの抽出にも対応。組み込みのQRコードスタジオでロゴ、Genmoji、ブランドカラーを使ったオリジナルデザインを作れます。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/qr-studio.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "万能QRスキャン"
    description: "URL、vCard、Wi-Fi設定、カレンダーイベント、決済、アプリストアのディープリンク - NFC.coolがペイロードの種類を判定し、最適なアクションを提案します。"
  - title: "スクリーンショットからQRを検出"
    description: "ライブラリの任意の画像を選ぶと、NFC.coolが内部のQRコードを検出してデコード - 一部が隠れていても、コントラストが低くても認識します。"
  - title: "QRコードスタジオ"
    description: "カスタムカラー、丸みのある目パターン、独自のピクセル形状、中央のロゴまたはGenmojiでQRコードをデザイン。最大4096×4096のPNGで書き出せます。"
  - title: "履歴と再共有"
    description: "すべてのスキャンは端末内に保存されます - ペイロードを再表示、コピー、共有、または直接アクションへ。"
  - title: "読み取り時の自動アクション"
    description: "URLを開く、ショートカットを実行、Webhookを発火、結果を読み上げ - コードがスキャンされた瞬間に動きます。NFCスキャンと同じ5つのフック。"

subsectionsTitle: "ただのスキャナーじゃない"
subsections:
  - title: "ウィジェット - ホーム画面上のあなたのQR"
    body: "<p>よく共有するQRコードを<strong>QR画像ウィジェット</strong>としてiPhoneやiPadのホーム画面に貼り付けましょう。オフィスのWi-Fi、名刺リンク、お店のメニュー - 一目で見えて、隣の人のスマホからもあなたが何も開かずにスキャンできます。<strong>最後のスキャン</strong>ウィジェットは直近にスキャンしたコードを表示し、すぐに再共有できます。<strong>スキャンボタン</strong>ウィジェットは、ホーム画面やロック画面から直接スキャナーを起動 - 1タップ、iOS 17以降ではインタラクティブコントロールにも対応します。</p>"
    imagePath: "/assets/images/Features/qr-scanner-widgets-home-screen.webp"
    imageAlt: "QRコードウィジェットとスキャンボタンを表示したiPhoneホーム画面"
    platforms: "iOS"

  - title: "QRコードスタジオ: ピクセル形状、色、目、ロゴ"
    body: "<p>QRコードスタジオは読み取りやすさを保ちつつ、企業っぽい四角いデザインから自由になれます。ピクセル形状(角丸、ドット、ダイヤ)、目のスタイル、前景・背景色、中央のロゴ画像またはGenmojiを選択。6つのピクセルサイズ - 512、1024、1536、2048、3072、4096 - で書き出せます。</p>"
    imagePath: "/assets/images/Features/qr-scanner-studio-card.webp"
    imageAlt: "カスタムロゴ付きのQRコードスタジオ"
    platforms: "iOS"

  - title: "マルチスキャン、バッチ読み取り、必要時のフラッシュ"
    body: "<p>3つの設定がスキャナーを「1回限り」から「継続的なワークフロー」に変えます。<strong>マルチスキャン</strong>は1つのカメラセッションで複数のコードを取り込みます。<strong>バッチ読み取り</strong>は棚卸しやイベント受付向けにカメラを開いたままに。<strong>オートフラッシュ</strong>は暗所でLEDを自動オン - 懐中電灯ボタンを探す必要はありません。</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhoneがフラッシュライトで複数のQRコードとバーコードをスキャン"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>NFC.coolは組み込みアクションでiOSのショートカットアプリと直接つながります: 最後にスキャンしたNFCタグを取得、タグにメッセージを書き込み、スキャナーを開く、最後にスキャンしたQRコードを取得。これらをつなげて、タグをスキャンしてペイロードをパースし、その後何でも - 自動化、ロギング、ジャーナリング、思いつくものすべて - を実行するショートカットを作れます。同じアクションがiOS 17以降のロック画面<strong>スキャンボタン</strong>コントロールも支えています。</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhoneがNFCタグを自動化ブロックにつなぐ"
    platforms: "iOS"

  - title: "iPhone・iPad・MacでiCloud同期"
    body: "<p>スキャン履歴とQRスタジオのデザインは、iCloudアカウント上のすべての端末で同期します。iPadでデザインしてiPhoneから共有、<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Mac</a>で編集 - 同じライブラリ、同じ編集、エクスポートの往復は不要です。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

