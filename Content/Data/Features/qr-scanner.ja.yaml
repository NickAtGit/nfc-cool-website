faqTitle: "よくある質問"
faq:
  - question: "なぜiOS限定ですか?"
    answer: "現在のAndroid版NFC.coolはNFCとデジタル名刺に注力しています。QRスキャンはAndroidロードマップに含まれています。"
  - question: "スタジオで作ったQRコードはすべてのリーダーで読めますか?"
    answer: "はい。標準のQRコードに任意の装飾スタイルを加えているだけです。標準のリーダー(iOSカメラ、Google Lens、Android標準スキャナー)で問題なくデコードできます。"
  - question: "スクリーンショットからQRコードをスキャンできますか?"
    answer: "はい。ライブラリの任意の画像を選ぶと、NFC.coolが含まれるすべてのQRコードを検出します - 一部が隠れていても。"
  - question: "スタジオの生成コードに透かしやNFC.coolのブランディングは入りますか?"
    answer: "Freeで生成したコードには小さなクレジットが付きます。Platinumのコードは透かしなし - 純粋にあなたのデザインです。"
