slug: "qr-scanner"
backLinkText: "← すべての機能"

hero:
  title: "QRコードスキャナー & スタジオ"
  subtitle: "カメラからQRコードをスキャン、スクリーンショットからの抽出にも対応。組み込みのQRコードスタジオでロゴ、Genmoji、ブランドカラーを使ったオリジナルデザインを作れます。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/qr-studio.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "万能QRスキャン"
    description: "URL、vCard、Wi-Fi設定、カレンダーイベント、決済、アプリストアのディープリンク - NFC.coolがペイロードの種類を判定し、最適なアクションを提案します。"
  - title: "スクリーンショットからQRを検出"
    description: "ライブラリの任意の画像を選ぶと、NFC.coolが内部のQRコードを検出してデコード - 一部が隠れていても、コントラストが低くても認識します。"
  - title: "QRコードスタジオ"
    description: "カスタムカラー、丸みのある目パターン、独自のピクセル形状、中央のロゴまたはGenmojiでQRコードをデザイン。SVGベクターまたは最大4096×4096のPNGで書き出せます。"
  - title: "履歴と再共有"
    description: "すべてのスキャンは端末内に保存されます - ペイロードを再表示、コピー、共有、または直接アクションへ。"
  - title: "読み取り時の自動アクション"
    description: "URLを開く、ショートカットを実行、Webhookを発火、結果を読み上げ - コードがスキャンされた瞬間に動きます。NFCスキャンと同じ5つのフック。"

subsectionsTitle: "ただのスキャナーじゃない"
subsections:
  - title: "ウィジェット — ホーム画面上のあなたのQR"
    body: "<p>よく共有するQRコードを<strong>QR画像ウィジェット</strong>としてiPhoneやiPadのホーム画面に貼り付けましょう。オフィスのWi-Fi、名刺リンク、お店のメニュー - 一目で見えて、隣の人のスマホからもあなたが何も開かずにスキャンできます。<strong>最後のスキャン</strong>ウィジェットは最も最近スキャンしたコードを表示し、すぐに再共有できます。<strong>スキャンボタン</strong>ウィジェットは、ホーム画面やロック画面から直接スキャナーを起動 - 1タップ、iOS 17以降ではインタラクティブコントロールにも対応します。</p>"
    platforms: "iOS"

  - title: "ショートカット & App Intent"
    body: "<p>3つのIntentがQRスキャナーをiOSの自動化と結びつけます: <code>ScanIntent</code>(ショートカットからスキャナーを起動)、<code>GetLastQrCode</code>(最後にスキャンしたコードを取得)、<code>LaunchScan</code>(アプリをスキャンモードで開く)。コードをスキャンしてURLを解析し、Numbersに行を追加、Slackに投稿 - iOSでスクリプト可能なものすべてが対象です。</p>"
    platforms: "iOS"

  - title: "QRコードスタジオ: ピクセル形状、色、目、ロゴ"
    body: "<p>QRコードスタジオはスキャン可能性を保ちつつ、企業っぽい四角いデザインから自由になれます。ピクセル形状(角丸、ドット、ダイヤ)、目のスタイル、前景・背景色、中央のロゴ画像またはGenmojiを選択。6つのピクセルサイズ - 512、1024、1536、2048、3072、4096 - で書き出すか、印刷用のクリーンなSVGベクターで書き出せます。</p>"
    imagePath: "/assets/images/Webflow/qr-studio.webp"
    imageAlt: "カスタムロゴ付きのQRコードスタジオ"
    platforms: "iOS"

  - title: "iPhone・iPad・MacでiCloud同期"
    body: "<p>スキャン履歴とQRスタジオのデザインは、iCloudアカウント上のすべての端末で同期します。iPadでデザインしてiPhoneから共有、<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Mac</a>で編集 - 同じライブラリ、同じ編集、エクスポートの往復は不要です。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

  - title: "マルチスキャン、バッチ読み取り、必要時のフラッシュ"
    body: "<p>3つの設定がスキャナーを「1回限り」から「継続的なワークフロー」に変えます。<strong>マルチスキャン</strong>は1つのカメラセッションで複数のコードを取り込みます。<strong>バッチ読み取り</strong>は棚卸しやイベント受付向けにカメラを開いたままに。<strong>オートフラッシュ</strong>は暗所でLEDを自動オン - 懐中電灯ボタンを探す必要はありません。iOS 16のVisionKit DataScannerとレガシーAVFoundationカメラの切り替えもあり、古い挙動を好む方にも対応します。</p>"
    platforms: "iOS"

specsTitle: "対応コードとスタジオ書き出し"
specs:
  - title: "QRバリアント(カメラ + 写真ライブラリ)"
    items:
      - "QRコード(バージョン 1-40)"
      - "Micro QR(M1-M4)"
      - "1枚の画像から複数コード検出"
  - title: "スタジオ書き出しサイズ"
    items:
      - "SVG(ベクター、印刷品質)"
      - "PNG: 512、1024、1536、2048、3072、4096ピクセル四方"
  - title: "スタジオのカスタマイズ"
    items:
      - "前景色と背景色"
      - "独自のピクセル形状(角丸、ドット、ダイヤなど)"
      - "目ごとのスタイルと形状"
      - "中央のロゴ(任意の画像、Appleステッカー、iOS 18以降のGenmoji)"

