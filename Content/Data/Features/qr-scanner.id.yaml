  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/qr-studio.webp"

capabilitiesTitle: "Yang bisa Anda lakukan"
capabilities:
  - title: "Pemindaian kode QR universal"
    description: "URL, vCard, kredensial Wi-Fi, acara kalender, pembayaran, deep-link app store - NFC.cool mendeteksi jenis payload dan menawarkan aksi yang tepat."
  - title: "Deteksi kode QR dalam tangkapan layar"
    description: "Pilih gambar apa pun dari perpustakaan foto Anda dan NFC.cool menemukan serta mendekode setiap kode QR di dalamnya - bahkan yang sebagian terhalang atau kontras rendah."
  - title: "QR Code Studio"
    description: "Rancang kode QR dengan warna kustom, pola eye yang membulat, bentuk piksel kustom, dan logo atau Genmoji di tengah. Ekspor sebagai PNG hingga 4096x4096."
  - title: "Riwayat & berbagi ulang"
    description: "Setiap pemindaian disimpan secara lokal - buka kembali payload, salin, bagikan, atau langsung kembali ke aksinya."
  - title: "Aksi otomatis saat dibaca"
    description: "Buka URL, jalankan Shortcuts, kirim webhook, atau ucapkan hasilnya keras-keras saat kode dipindai - otomasi lima-hook yang sama yang menggerakkan pemindaian NFC."

subsectionsTitle: "Lebih dari sekadar pemindai"
subsections:
  - title: "Widget - kode QR Anda di layar utama"
    body: "<p>Letakkan kode QR yang paling sering Anda bagikan di layar utama iPhone atau iPad dengan <strong>QR Image Widget</strong>. Wi-Fi kantor, tautan kartu nama Anda, menu bar Anda - terlihat sekilas, bisa dipindai dari ponsel orang berikutnya tanpa Anda membuka apa pun. <strong>Last Scan Widget</strong> menampilkan kode yang terakhir dipindai sehingga Anda bisa membagikannya kembali seketika. Dan <strong>Scan Button Widget</strong> meluncurkan pemindai langsung dari layar utama atau layar kunci - satu ketukan, bahkan di iOS 17+ melalui kontrol interaktif.</p>"
    imagePath: "/assets/images/Features/qr-scanner-widgets-home-screen.webp"
    imageAlt: "Layar utama iPhone dengan widget kode QR dan tombol pindai"
    platforms: "iOS"

  - title: "QR Code Studio: bentuk piksel, warna, eye, dan logo kustom"
    body: "<p>QR Code Studio memungkinkan Anda mempertahankan kemampuan pindai sambil meninggalkan estetika kotak perusahaan. Pilih bentuk piksel (membulat, titik, berlian), gaya per-eye, warna latar depan/belakang, gambar logo atau Genmoji di tengah. Ekspor dalam enam ukuran piksel - 512, 1024, 1536, 2048, 3072, atau 4096.</p>"
    imagePath: "/assets/images/Features/qr-scanner-studio-card.webp"
    imageAlt: "QR Code Studio dengan logo kustom"
    platforms: "iOS"

  - title: "Multi-scan, batch read, dan senter sesuai kebutuhan"
    body: "<p>Tiga pengaturan mengubah pemindai dari sekali-selesai menjadi alur kerja berkelanjutan. <strong>Multi-scan</strong> memungkinkan Anda memindai beberapa kode dalam satu sesi kamera. <strong>Batch read</strong> membiarkan kamera terbuka untuk inventaris atau check-in acara. <strong>Auto-torch</strong> menyalakan LED dalam cahaya rendah sehingga Anda tidak perlu mencari tombol senter.</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhone memindai beberapa kode QR dan barcode dengan cahaya senter"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool terhubung langsung ke aplikasi iOS Shortcuts dengan aksi bawaan: ambil tag NFC yang terakhir dipindai, tulis pesan ke tag, buka pemindai, atau ambil kode QR yang terakhir dipindai. Rangkai ke dalam Shortcuts yang memindai tag, mem-parsing payload-nya, dan memulai apa pun yang Anda inginkan berikutnya - otomasi, pencatatan, jurnal, apa saja. Aksi yang sama menggerakkan kontrol <strong>Scan Button</strong> layar kunci di iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone menghubungkan tag NFC ke blok otomasi"
    platforms: "iOS"

  - title: "Sinkronisasi iCloud di iPhone, iPad, dan Mac"
    body: "<p>Riwayat pemindaian dan desain QR Studio Anda tersinkronisasi di setiap perangkat pada akun iCloud Anda. Rancang kode QR di iPad, bagikan dari iPhone, edit di <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - perpustakaan yang sama, pengeditan yang sama, tanpa ekspor bolak-balik.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool tersinkronisasi di iPhone, iPad, dan Mac"
    platforms: "iOS"

