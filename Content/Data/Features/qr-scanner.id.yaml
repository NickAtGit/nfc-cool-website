faqTitle: "Pertanyaan yang sering diajukan"
faq:
  - question: "Mengapa ini hanya iOS?"
    answer: "Versi Android NFC.cool saat ini berfokus pada NFC dan Kartu Nama Digital. Pemindaian kode QR ada dalam peta jalan Android."
  - question: "Apakah kode QR dari Studio kompatibel dengan semua pembaca?"
    answer: "Ya. Mereka adalah kode QR standar dengan gaya kosmetik opsional. Setiap pembaca standar (kamera iOS, Google Lens, pemindai stok Android) dapat mendekodenya."
  - question: "Bisakah saya memindai kode QR dari tangkapan layar?"
    answer: "Ya. Pilih gambar apa pun dari perpustakaan foto Anda dan NFC.cool menemukan setiap kode QR di dalamnya - bahkan yang sebagian tertutup."
  - question: "Apakah Studio menyematkan watermark atau merek NFC.cool?"
    answer: "Kode gratis membawa atribusi kecil. Kode Platinum bebas watermark - murni desain Anda."

