faqTitle: "常见问题"
faq:
  - question: "读取标签时，我的 iPhone 需要解锁吗？"
    answer: "对于大多数标签扫描，不需要。iPhone XS 及更新机型可以在锁屏状态下后台读取 NDEF 标签，无需启动应用。在 Android 上，应用需要处于前台才能读取标签。"
  - question: "没有网络连接也能读取标签吗？"
    answer: "可以。NFC 的读取和写入都完全在设备本地进行。NFC.cool 绝不会把标签内容上传到任何服务器。"
  - question: "写入 NFC 标签安全吗？"
    answer: "默认情况下写入是安全且可逆的，你可以随心所欲地重复写入同一枚标签。只有在确定之后再使用锁定功能：标签一旦被永久锁定，就无法再写入。"
  - question: "NFC Safe 的安全性如何？"
    answer: "NFC Safe 使用 AES-256-GCM 加密负载，并通过 PBKDF2-HMAC-SHA256 从你的口令派生密钥，迭代 100,000 次，每条记录配以 16 字节随机盐值和 12 字节 nonce。没有口令，标签上的负载与随机字节别无二致。"
  - question: "同一枚 NFC Safe 标签在 iOS 和 Android 上都能用吗？"
    answer: "可以。这一格式具有互操作性。在一个平台上加密，在另一个平台上解密：同样的口令，同样的负载。"
  - question: "重置 Sonicare 刷头会让什么失效吗？"
    answer: "它只是重置标签上的使用计数器，让手柄不再提醒你更换。刷头本身并不知道自己被重置过，它只会照常刷牙。刷毛何时该换，请自行判断。"

