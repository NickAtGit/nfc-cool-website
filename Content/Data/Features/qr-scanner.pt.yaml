faqTitle: "Perguntas Frequentes"
faq:
  - question: "Porque é que isto é apenas para iOS?"
    answer: "A versão Android da NFC.cool foca-se atualmente no NFC e no Cartão de Visita Digital. A leitura de códigos QR está no roteiro do Android."
  - question: "Os códigos QR do Estúdio são compatíveis com todos os leitores?"
    answer: "Sim. São códigos QR padrão com estilo cosmético opcional. Todos os leitores padrão (Câmara do iOS, Google Lens, leitores nativos do Android) os conseguem descodificar."
  - question: "Posso ler um código QR a partir de uma captura de ecrã?"
    answer: "Sim. Escolha qualquer imagem da sua biblioteca de fotografias e a NFC.cool encontra todos os códigos QR no seu interior - mesmo os parcialmente tapados."
  - question: "O Estúdio incorpora alguma marca de água ou identificação da NFC.cool?"
    answer: "Os códigos gratuitos trazem uma pequena atribuição. Os códigos Platinum não têm marca de água - são puramente o seu desenho."

