capabilitiesTitle: "O Que Pode Fazer"
capabilities:
  - title: "Leitura Universal de Códigos QR"
    description: "URLs, vCards, credenciais de Wi-Fi, eventos de calendário, pagamentos, ligações diretas à App Store - a NFC.cool deteta o tipo de payload e oferece a ação correta."
  - title: "Detetar Códigos QR em Capturas de Ecrã"
    description: "Escolha qualquer imagem da sua biblioteca de fotografias e a NFC.cool encontra e descodifica qualquer código QR no seu interior - mesmo os parcialmente tapados ou de baixo contraste."
  - title: "Estúdio de Códigos QR"
    description: "Desenhe códigos QR com cores personalizadas, padrões de olhos arredondados, formas de pixéis personalizadas e um logótipo ou Genmoji no centro. Exporte como PNG até 4096×4096."
  - title: "Histórico e Repartilha"
    description: "Cada leitura é guardada localmente - reabra o payload, copie-o, partilhe-o, ou volte diretamente para a ação."
  - title: "Ação Automática na Leitura"
    description: "Abra URLs, execute Atalhos, dispare um webhook ou leia o resultado em voz alta no momento em que um código é lido - a mesma automação de cinco gatilhos que alimenta as leituras NFC."

subsectionsTitle: "Mais Do Que um Leitor"
subsections:
  - title: "Widgets - o seu QR no Ecrã Principal"
    body: "<p>Coloque os seus códigos QR mais partilhados no ecrã principal do iPhone ou do iPad com o <strong>Widget de Imagem QR</strong>. O Wi-Fi do escritório, a ligação do seu cartão de visita, o menu do seu bar - visíveis num relance, prontos a serem lidos pelo telemóvel da pessoa ao lado sem que você abra o que quer que seja. O <strong>Widget da Última Leitura</strong> mostra o código lido mais recentemente para que o possa repartilhar instantaneamente. E o <strong>Widget do Botão de Leitura</strong> abre o leitor diretamente a partir do ecrã principal ou do ecrã de bloqueio - um único toque, mesmo no iOS 17+ através de controlos interativos.</p>"
    imagePath: "/assets/images/Features/qr-scanner-widgets-home-screen.webp"
    imageAlt: "Ecrã principal do iPhone com widgets de códigos QR e botão de leitura"
    platforms: "iOS"

  - title: "Estúdio de Códigos QR: Formas de Pixéis, Cores, Olhos e Logótipos Personalizados"
    body: "<p>O Estúdio de Códigos QR permite-lhe manter a legibilidade sem a estética de quadrado corporativo. Escolha formas de pixéis (arredondadas, pontos, losangos), estilos por olho, cores de primeiro plano / de fundo, uma imagem de logótipo ou um Genmoji no centro. Exporte em seis tamanhos de pixéis - 512, 1024, 1536, 2048, 3072 ou 4096.</p>"
    imagePath: "/assets/images/Features/qr-scanner-studio-card.webp"
    imageAlt: "Estúdio de Códigos QR com um logótipo personalizado"
    platforms: "iOS"

  - title: "Multi-Leitura, Leitura em Lote e Lanterna a Pedido"
    body: "<p>Três definições transformam o leitor de algo pontual num fluxo de trabalho contínuo. A <strong>multi-leitura</strong> permite-lhe ler vários códigos numa só sessão de câmara. A <strong>leitura em lote</strong> mantém a câmara aberta para inventários ou registos de entrada em eventos. A <strong>lanterna automática</strong> liga o LED com pouca luz para que não tenha de procurar o botão da lanterna.</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhone a ler vários códigos QR e códigos de barras com a luz da lanterna"
    platforms: "iOS"

  - title: "Atalhos e App Intents"
    body: "<p>A NFC.cool integra-se diretamente na app Atalhos do iOS com ações incorporadas: obter a última tag NFC lida, gravar uma mensagem numa tag, abrir o leitor, ou obter o último código QR lido. Encadeie-as em Atalhos que leem uma tag, analisam o seu payload e iniciam o que quer que pretenda a seguir - automação, registo, diário, o que quiser. As mesmas ações alimentam o controlo <strong>Botão de Leitura</strong> no ecrã de bloqueio no iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone a ligar uma tag NFC a blocos de automação"
    platforms: "iOS"

  - title: "Sincronização iCloud no iPhone, iPad e Mac"
    body: "<p>O histórico de leituras e os seus desenhos do Estúdio QR sincronizam-se em todos os dispositivos da sua conta iCloud. Desenhe um QR no iPad, partilhe-o a partir do iPhone, edite-o no <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - mesma biblioteca, mesmas edições, sem exportar de um lado para o outro.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool a sincronizar no iPhone, iPad e Mac"
    platforms: "iOS"

