slug: "document-scanner"
backLinkText: "← すべての機能"

hero:
  title: "OCR付き書類スキャナー"
  subtitle: "自動エッジ検出とパース補正で書類をキャプチャ。オンデバイスOCRがすべてのスキャンを検索可能なテキストに - アップロードなし、登録なし。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/document-scan.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "自動エッジ検出"
    description: "ページに向けるだけ。NFC.coolが角を認識し自動でシャッターを切ります。マルチページスキャンで一度に束ごと取り込めます。"
  - title: "パース補正"
    description: "斜めから撮影しても、NFC.coolがページをきれいな長方形に変形し、影を取り除いてコントラストを強調 - フラットスキャンのような仕上がりに。"
  - title: "オンデバイスOCR"
    description: "テキスト認識はiPhone上で完結 - 書類もテキストも端末から出ません。各ページの認識テキストは画像と一緒に保存され、アプリ内で検索できます。"
  - title: "テキスト埋め込みのPDF書き出し"
    description: "OCRしたテキスト層を埋め込んだマルチページPDFを生成 - どのPDFリーダーでも単語の選択・コピー・検索が可能になります。"
  - title: "ワンタッチ共有 & 保存"
    description: "メール、メッセージ、AirDropで送信、またはファイルAppに保存。透かしも登録もNFC.coolブランディングもありません。"

subsectionsTitle: "スクリーンショットより賢く"
subsections:
  - title: "マルチページスキャンと自動タイトル"
    body: "<p>書類は1ページとは限りません。NFC.coolは撮影の合間にカメラを開いたままにし、ページの並び替え、失敗の削除、すべてを1つの書類にまとめます。組み込みのタイトル提案サービスが最初のページを読み、合理的なファイル名を提案 - 毎回のリネーム儀式から解放されます。</p>"
    imagePath: "/assets/images/Webflow/document-scan-detail.webp"
    imageAlt: "マルチページ書類の詳細表示"
    platforms: "iOS"

  - title: "写真ライブラリから取り込み"
    body: "<p>普通のカメラで撮ったレシートはすでにある? ライブラリから画像を(複数も可)選ぶと、NFC.coolが新しい撮影と同じエッジ検出・パース補正・OCRを適用します。何ヶ月も散らばっていた写真をまとめて整理するのに便利です。</p>"
    platforms: "iOS"

  - title: "iPhone・iPad・MacでiCloud同期"
    body: "<p>書類はiCloud経由でアカウント上のすべての端末にシームレスに同期。iPhoneで契約書をスキャン、iPadで確認、<a href=\"/ja/blog/nfc-cool-comes-to-mac/\">Mac</a>で署名 - 同じライブラリで、エクスポートの往復は不要。元画像と認識テキストも一緒に持ち運ばれます。</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "iPhone・iPad・MacでNFC.coolが同期"
    platforms: "iOS"

  - title: "圧縮はあなたが制御"
    body: "<p>気をつけないとスマホからのPDFは肥大化します。NFC.coolは圧縮率を設定として公開しています - 再スキャンせずに、アーカイブ品質とメール向きのサイズを選べます。</p>"
    platforms: "iOS"

specsTitle: "機能 & 制限"
specs:
  - title: "認識"
    items:
      - "iOS VisionフレームワークOCR"
      - "ラテン、キリル、ギリシャ文字"
      - "手書き認識"
      - "多言語自動判別"
      - "認識テキストはスキャン後に編集可能"
  - title: "出力"
    items:
      - "テキストレイヤー付きPDF"
      - "1ページあたりJPEG / HEIC画像"
      - "マルチページ書類"
      - "オプションの白黒モード"
      - "圧縮率を調整可能"
  - title: "プライバシー"
    items:
      - "OCRはすべてデバイス上で実行"
      - "書類もテキストもNFC.coolにアップロードされません"
      - "書類はiCloudかアプリのサンドボックスに - あなたが選択"

