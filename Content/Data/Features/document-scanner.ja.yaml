faqTitle: "よくある質問"
faq:
  - question: "OCRはオフラインで使えますか？"
    answer: "はい。iOS VisionはOCRを完全にデバイス上で処理します。飛行機の中、藪の中、どこでも。"
  - question: "OCRはどの言語に対応していますか？"
    answer: "iOS Visionは現在、英語、フランス語、イタリア語、ドイツ語、スペイン語、ポルトガル語、中国語(簡体字)を認識します。手書き認識も加えて対応しています。"
  - question: "OCRの精度はどのくらいですか？"
    answer: "印刷文字は非常に高精度です。手書きの精度は文字の丁寧さとコントラストに左右されます。スキャン後に認識テキストを編集することもできます。"
  - question: "スキャンした書類はどこに保存されますか？"
    answer: "Free: 端末のアプリ・サンドボックス内。Platinum: 任意でiCloud Documentsに自動エクスポート - ファイルAppから、そしてiCloudにサインインしたすべての端末から見られます。"
