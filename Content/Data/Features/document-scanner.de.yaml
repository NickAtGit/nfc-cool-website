faqTitle: "Häufig gefragt"
faq:
  - question: "Funktioniert OCR offline?"
    answer: "Ja. iOS Vision macht OCR vollständig auf dem Gerät. Im Flugzeug, im Wald, überall."
  - question: "Welche Sprachen unterstützt OCR?"
    answer: "iOS Vision erkennt derzeit Englisch, Französisch, Italienisch, Deutsch, Spanisch, Portugiesisch und vereinfachtes Chinesisch. Handschrift-Erkennung kommt zusätzlich dazu."
  - question: "Wie genau ist die OCR?"
    answer: "Sehr genau bei gedrucktem Text. Handschrift-Genauigkeit hängt von Sauberkeit und Kontrast ab. Du kannst jeden erkannten Text nach dem Scan bearbeiten."
  - question: "Wo werden gescannte Dokumente gespeichert?"
    answer: "Free: in der App-Sandbox auf dem Gerät. Platinum: optional auto-exportiert nach iCloud Dokumente - sichtbar in Dateien und auf allen Geräten an deinem iCloud-Account."
