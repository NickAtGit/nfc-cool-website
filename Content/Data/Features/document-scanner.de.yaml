slug: "document-scanner"
backLinkText: "← Alle Funktionen"

hero:
  title: "Dokumenten-Scanner mit OCR"
  subtitle: "Erfasse Dokumente mit automatischer Kantenerkennung und Perspektiv-Korrektur. On-Device-OCR macht jeden Scan zu durchsuchbarem Text."
  platforms: "Nur iOS"
  heroImagePath: "/assets/images/Webflow/document-scan.webp"

capabilitiesTitle: "Was du tun kannst"
capabilities:
  - title: "Automatische Kantenerkennung"
    description: "Richte auf eine Seite - NFC.cool findet die Ecken und löst automatisch aus. Mehrseitige Scans erfassen einen ganzen Stapel in einer Session."
  - title: "Perspektiv-Korrektur"
    description: "Schiefer Schuss? NFC.cool richtet die Seite zu einem sauberen Rechteck aus, entfernt Schatten und verstärkt den Kontrast - das Ergebnis sieht wie ein Flachbett-Scan aus."
  - title: "On-Device-OCR"
    description: "Texterkennung läuft lokal auf deinem iPhone - kein Dokument, kein Text verlässt das Gerät. Der erkannte Text jeder Seite wird neben dem Bild gespeichert und ist in der App durchsuchbar."
  - title: "PDF-Export mit eingebettetem Text"
    description: "Erstelle mehrseitige PDFs mit eingebetteter OCR-Textebene, sodass jedes Wort in jedem PDF-Reader markier-, kopier- und durchsuchbar ist."
  - title: "Schnelles Teilen & Speichern"
    description: "Versende per Mail, Nachrichten, AirDrop oder speichere in Dateien. Kein Wasserzeichen, keine Anmeldung, kein NFC.cool-Branding."

subsectionsTitle: "Smarter als ein Screenshot"
subsections:
  - title: "Mehrseitige Scans + Auto-Titel"
    body: "<p>Dokumente sind selten nur eine Seite. NFC.cool hält die Kamera zwischen den Aufnahmen offen, lässt dich Seiten umsortieren, schlechte verwerfen und bündelt alles in ein Dokument. Ein eingebauter Titel-Vorschlagsdienst liest die erste Seite und schlägt einen sinnvollen Dateinamen vor - spart dir das Umbenennen-Ritual.</p>"
    imagePath: "/assets/images/Webflow/document-scan-detail.webp"
    imageAlt: "Detailansicht eines mehrseitigen Dokuments"
    platforms: "iOS"

  - title: "Aus der Foto-Mediathek importieren"
    body: "<p>Hast du den Beleg schon mit der normalen Kamera fotografiert? Wähle das Bild (oder mehrere) aus der Mediathek - NFC.cool wendet dieselbe Kantenerkennung, Perspektiv-Korrektur und OCR auf importierte Fotos an wie auf frische Aufnahmen. Praktisch, um Monate verstreuter Handyfotos rückwirkend in Ordnung zu bringen.</p>"
    platforms: "iOS"

  - title: "Kompression, die du kontrollierst"
    body: "<p>PDFs vom Handy können aufgebläht ausfallen, wenn man nicht aufpasst. NFC.cool macht die Kompressionsrate zur Einstellung - wähle zwischen Archiv-Qualität und mailbarem Format, ohne neu scannen zu müssen.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool klinkt sich mit eingebauten Aktionen direkt in die iOS-Kurzbefehle-App ein: den zuletzt gescannten NFC-Tag abrufen, eine Nachricht auf einen Tag schreiben, den Scanner öffnen oder den zuletzt gescannten QR-Code holen. Verkette sie zu Shortcuts, die einen Tag scannen, die Payload parsen und dann tun, was immer du willst - Automatisierung, Logging, Journaling, alles. Dieselben Aktionen treiben den <strong>Scan-Button</strong> auf dem Lockscreen unter iOS 17+ an.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone verbindet NFC-Tag mit Automationsblöcken"
    platforms: "iOS"

  - title: "iCloud-Sync über iPhone, iPad und Mac"
    body: "<p>Dokumente synchronisieren nahtlos über iCloud auf alle Geräte deines Accounts. Scanne einen Vertrag auf dem iPhone, prüfe ihn auf dem iPad, unterschreibe ihn auf dem <a href=\"/de/blog/nfc-cool-comes-to-mac/\">Mac</a> - gleiche Bibliothek, kein Hin-und-her-Exportieren. Originalbilder und erkannter Text fahren mit.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool synchronisiert über iPhone, iPad und Mac"
    platforms: "iOS"

