card:
  title: "ماسح المستندات مع OCR"
  description: "امسح المستندات على iPhone أو iPad مع اكتشاف تلقائي للحواف وOCR - كل ذلك على جهازك، دون رفع أي شيء. صدّر ملفات PDF متعددة الصفحات قابلة للبحث."
  imagePath: "/assets/images/Webflow/document-scan.webp"
  platforms: "iOS فقط"

hero:
  title: "ماسح المستندات مع OCR"
  subtitle: "التقط المستندات مع اكتشاف تلقائي للحواف وتصحيح المنظور. يحوّل OCR على الجهاز كل عملية مسح إلى نص قابل للبحث لا يغادر جهازك أبدًا."
  platforms: "iOS فقط"
  heroImagePath: "/assets/images/Webflow/document-scan.webp"

capabilitiesTitle: "ما يمكنك فعله"
capabilities:
  - title: "اكتشاف تلقائي للحواف"
    description: "وجّه الكاميرا نحو الصفحة؛ يعثر NFC.cool على الزوايا ويلتقط تلقائيًا. يلتقط المسح متعدد الصفحات كومة كاملة في جلسة واحدة."
  - title: "تصحيح المنظور"
    description: "لقطة مائلة؟ يعيد NFC.cool تشكيل الصفحة إلى مستطيل نظيف، ويزيل الظلال، ويعزّز التباين لتبدو النتيجة كأنها مسح مسطّح."
  - title: "OCR على الجهاز"
    description: "يجري التعرّف على النص محليًا على iPhone - لا يغادر أي مستند أو نص الجهاز. يُخزَّن النص المُتعرَّف عليه لكل صفحة إلى جانب الصورة ويكون قابلًا للبحث داخل التطبيق."
  - title: "تصدير PDF مع نص مضمّن"
    description: "أنشئ ملف PDF متعدد الصفحات مع تضمين طبقة النص المُعالَجة بـOCR، بحيث تكون كل كلمة قابلة للتحديد والنسخ والبحث في أي قارئ PDF."
  - title: "مشاركة وحفظ سريعان"
    description: "أرسِل عبر Mail أو Messages أو AirDrop، أو احفظ في Files. دون علامة مائية، دون تسجيل، دون أي علامة تجارية لـNFC.cool."

subsectionsTitle: "أذكى من لقطة الشاشة"
subsections:
  - title: "مسح متعدد الصفحات + عنوان تلقائي"
    body: "<p>ليست المستندات دائمًا صفحة واحدة. يُبقي NFC.cool الكاميرا مفتوحة بين اللقطات، ويتيح لك إعادة ترتيب الصفحات، والتخلّص من غير الصالحة، ودمج كل شيء في مستند واحد. تقرأ خدمة مدمجة لاقتراح العناوين الصفحةَ الأولى وتقترح اسم ملف مناسبًا - توفّر عليك عناء إعادة التسمية في كل مرة.</p>"
    imagePath: "/assets/images/Webflow/document-scan-detail.webp"
    imageAlt: "عرض تفصيلي لمستند متعدد الصفحات"
    platforms: "iOS"

  - title: "استيراد من مكتبة الصور"
    body: "<p>هل التقطت الإيصال بالفعل بالكاميرا العادية؟ اختر الصورة (أو عدة صور) من مكتبة الصور - يُطبّق NFC.cool اكتشاف الحواف وتصحيح المنظور وOCR ذاته على الصور المستوردة كما على اللقطات الجديدة. مفيد لتنظيم أشهر من لقطات الهاتف المتناثرة بأثر رجعي.</p>"
    platforms: "iOS"

  - title: "ضغط تتحكّم فيه"
    body: "<p>قد تتضخّم ملفات PDF من الهاتف إن لم تنتبه. يُتيح NFC.cool ضبط معدّل الضغط عبر إعداد مخصّص، فتختار بين جودة أرشيفية عالية الدقة وحجم ملف مناسب للبريد الإلكتروني - دون إعادة المسح.</p>"
    platforms: "iOS"

  - title: "الاختصارات وApp Intents"
    body: "<p>يتكامل NFC.cool مباشرة مع تطبيق الاختصارات على iOS عبر إجراءات مدمجة: احصل على آخر وسم NFC ممسوح، أو اكتب رسالة إلى وسم، أو افتح الماسح، أو استرجع آخر رمز QR ممسوح. اربطها معًا في اختصارات تمسح وسمًا، وتحلّل حمولته، وتُطلق ما تشاء بعد ذلك - الأتمتة أو التسجيل أو التدوين، سمِّ ما شئت. تُشغّل الإجراءات نفسها عنصر التحكم <strong>زر المسح</strong> على شاشة القفل في iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone يربط وسم NFC بكتل الأتمتة"
    platforms: "iOS"

  - title: "مزامنة iCloud عبر iPhone وiPad وMac"
    body: "<p>تتزامن المستندات بسلاسة عبر iCloud على كل جهاز في حسابك. امسح عقدًا على iPhone، وراجعه على iPad، ووقّعه على <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - المكتبة نفسها، دون تصدير ذهابًا وإيابًا. تنتقل معها الصور الأصلية والنص المُتعرَّف عليه معًا.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool يزامن عبر iPhone وiPad وMac"
    platforms: "iOS"

