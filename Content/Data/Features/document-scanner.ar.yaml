faqTitle: "الأسئلة الشائعة"
faq:
  - question: "هل يعمل OCR دون اتصال بالإنترنت؟"
    answer: "نعم. يتولّى iOS Vision عملية OCR بالكامل على الجهاز. يمكنك مسح المستندات ومعالجتها بـOCR في الطائرة، أو في البرّية، أو في أي مكان."
  - question: "ما اللغات التي يدعمها OCR؟"
    answer: "يتعرّف iOS Vision حاليًا على الإنجليزية والفرنسية والإيطالية والألمانية والإسبانية والبرتغالية والصينية المبسّطة. كما يُدعَم التعرّف على الكتابة اليدوية."
  - question: "ما مدى دقة OCR؟"
    answer: "عالية جدًا للنص المطبوع. تعتمد دقة الكتابة اليدوية على وضوحها والتباين. يمكنك تحرير أي نص مُتعرَّف عليه بعد المسح."
  - question: "أين تُخزَّن المستندات الممسوحة؟"
    answer: "في الباقة المجانية: في صندوق عزل التطبيق على الجهاز. في Platinum: تُصدَّر تلقائيًا بشكل اختياري إلى iCloud Documents لتظهر في تطبيق Files وعلى كل جهاز مسجَّل الدخول إلى iCloud الخاص بك."

