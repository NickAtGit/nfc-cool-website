capabilitiesTitle: "Les cinq actions"
capabilities:
  - title: "Webhook (POST vers votre URL)"
    description: "Un POST HTTP avec un corps JSON structuré dès qu'un scan réussit. Configurez une URL, une authentification HTTP Basic facultative, et c'est prêt. iOS et Android."
  - title: "Raccourci (iOS)"
    description: "Lorsqu'une URL scannée utilise le schéma `shortcuts://`, le Raccourci iOS correspondant se lance automatiquement - sans appui supplémentaire. Transmettez les données de scan à tout ce que l'app Raccourcis peut atteindre."
  - title: "Ouverture de liens (iOS)"
    description: "Lorsque le contenu est une URL classique, elle s'ouvre automatiquement dans Safari (ou la cible du lien profond correspondant). Fini l'étape « appuyer pour ouvrir »."
  - title: "Synthèse vocale (iOS)"
    description: "Faites lire le contenu scanné à voix haute, sans les mains. Débit de parole réglable. Pratique pour l'accessibilité, les situations où vous avez les mains occupées, ou simplement pour une confirmation agréable."
  - title: "Lecture audio (iOS)"
    description: "Jouez un son de confirmation à chaque scan - votre propre fichier audio ou l'une des tonalités intégrées."

subsectionsTitle: "Comment fonctionne le webhook"
subsections:
  - title: "Déclencheurs - NFC, QR et code-barres"
    body: "<p>Les webhooks se déclenchent à partir de trois sources d'événements : les <strong>scans NFC</strong>, les <strong>scans QR</strong> et les <strong>scans de codes-barres</strong>. Chaque source dispose de son propre interrupteur d'activation, ce qui vous permet d'envoyer les lectures NFC vers votre système d'inventaire sans que le scanner de l'appareil photo n'inonde le même point de terminaison. Le webhook, lui, reste identique - une URL, un corps JSON, un POST.</p>"
    platforms: "iOS · Android"

  - title: "Structure de la charge utile"
    body: "<p>Chaque POST envoie un corps JSON de cette forme :</p><pre><code>{\n  \"identifier\": \"04:A2:7F:1B:5E:80:00\",\n  \"date\": \"2026-05-12T14:23:01Z\",\n  \"content\": \"Filament Spool #1234\",\n  \"tagType\": \"openPrintTag\",\n  \"structured\": {\n    \"material\": \"PLA\",\n    \"color\": \"#FF6F4C\",\n    \"manufacturer\": \"Prusament\",\n    \"uuid\": \"5e8a-7c1d-4f90\"\n  }\n}</code></pre><p><code>tagType</code> et <code>structured</code> n'apparaissent que pour les formats spéciaux comme <a href=\"/features/nfc-reader-writer/\">OpenPrintTag</a> ; tous les autres scans n'envoient que les trois premiers champs. La <a href=\"/developers/\">référence développeur</a> contient le détail champ par champ, l'authentification, curl et des serveurs d'exemple prêts à l'emploi.</p>"
    platforms: "iOS · Android"

  - title: "Serveur de référence sur GitHub"
    body: "<p>Le moyen le plus rapide de voir toute la boucle de bout en bout : le <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">serveur web sur GitHub</a>. Un serveur d'exemple minimal qui accepte les charges utiles des webhooks NFC.cool, les journalise et affiche leur structure en direct. Clonez-le, lancez-le, pointez votre iPhone dessus et regardez les scans arriver.</p>"
    platforms: "iOS · Android"

specsTitle: "Détails techniques"
specs:
  - title: "Transport"
    items:
      - "HTTPS recommandé ; HTTP autorisé en développement"
      - "POST avec `Content-Type: application/json`"
      - "Authentification HTTP Basic facultative (nom d'utilisateur + mot de passe)"
      - "Identifiants stockés chiffrés dans le trousseau iOS"
  - title: "Charge utile"
    items:
      - "`identifier` - UID du tag ou code scanné"
      - "`date` - horodatage ISO 8601"
      - "`content` - contenu décodé (chaîne d'URL, texte, etc.)"
      - "`tagType` - présent pour les tags structurés (par ex. `openPrintTag`)"
      - "`structured` - JSON imbriqué pour les types de tags structurés"
  - title: "Sources"
    items:
      - "Scans NFC (lectures NDEF)"
      - "Scans QR"
      - "Scans de codes-barres"
      - "Chaque source activable indépendamment"

