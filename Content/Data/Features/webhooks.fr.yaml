faqTitle: "Questions fréquentes"
faq:
  - question: "Est-ce que cela fonctionne sur Android ?"
    answer: "Oui - les webhooks sont disponibles sur les versions iOS et Android de NFC.cool Tools. La structure de la charge utile JSON est identique sur les deux plateformes. (Les quatre autres actions iOS - Raccourci automatique, synthèse vocale, audio, ouverture de liens - sont réservées à iOS.)"
  - question: "Combien d'URL puis-je configurer ?"
    answer: "Une seule URL pour l'instant. Cette même URL reçoit tous les événements de scan, différenciés par les sources activées et le type de contenu."
  - question: "Quelle authentification est prise en charge ?"
    answer: "L'authentification HTTP Basic - nom d'utilisateur + mot de passe, stockés chiffrés dans le trousseau iOS. Les jetons Bearer, les en-têtes personnalisés et la signature HMAC ne sont pas pris en charge pour le moment."
  - question: "Que se passe-t-il si mon serveur est hors ligne ?"
    answer: "Le POST échoue et l'événement est journalisé sur l'appareil. Il n'y a pas encore de file de nouvelles tentatives automatiques ; si votre serveur risque d'être instable, concevez votre gestionnaire pour qu'il soit idempotent en cas de nouvelle tentative, puis relancez le webhook depuis l'historique des scans."
  - question: "Y a-t-il une limite de taille pour la charge utile ?"
    answer: "Aucune limite stricte imposée par NFC.cool. Le contenu des tags est lui-même limité par la norme NFC (quelques Ko pour les tags NDEF courants)."
  - question: "Où puis-je le voir réellement fonctionner ?"
    answer: "Clonez le <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">serveur web sur GitHub</a>, lancez-le en local, pointez l'app dessus et vous verrez chaque scan arriver en temps réel."

