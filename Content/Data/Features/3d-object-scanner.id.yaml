  subtitle: "Jalan mengelilingi objek dunia nyata dengan iPhone Anda - NFC.cool menjalankan Object Capture Apple di perangkat untuk merekonstruksi model 3D bertekstur. Ekspor model yang sudah jadi ke AR atau alat 3D mana pun."
  platforms: "iOS only"
