capabilitiesTitle: "Yang bisa Anda lakukan"
capabilities:
  - title: "Pengambilan fotogrametri"
    description: "Jalan mengelilingi objek sambil mengambil puluhan foto. Pipeline Object Capture Apple di perangkat merekonstruksi model 3D bertekstur dengan geometri yang realistis."
  - title: "Pratinjau & penyempurnaan"
    description: "Tinjau model dalam 3D sebelum mengekspor. Periksa gambar mentah yang diambil selama sesi jika Anda ingin melihat apa yang ditangkap kamera."
  - title: "AR Quick Look"
    description: "Tempatkan objek yang dipindai di ruang tamu Anda melalui AR Quick Look. Bagikan file USDZ ke teman - mereka dapat melihatnya langsung di dalam Messages."
  - title: "Enam format ekspor"
    description: "Ekspor USDZ bertekstur untuk AR Quick Look, atau geometri saja sebagai USD, OBJ, STL, PLY, atau ABC untuk Blender dan pipeline konten 3D lainnya."

subsectionsTitle: "Dari tangan Anda ke tampilan AR"
subsections:
  - title: "AR Quick Look di Messages"
    body: "<p>USDZ adalah format AR asli Apple. Bagikan objek yang dipindai di iMessage atau AirDrop dan penerima dapat memutarnya, menempatkannya di ruang mereka sendiri, dan mengambil tangkapan layar - semuanya dari pratinjau pesan, tanpa perlu menginstal aplikasi. Sangat bagus untuk pratinjau produk, dokumentasi patung, atau sekadar pamer.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool terhubung langsung ke aplikasi Shortcuts iOS dengan tindakan bawaan: ambil tag NFC terakhir yang dipindai, tulis pesan ke tag, buka pemindai, atau ambil kode QR terakhir yang dipindai. Rangkai menjadi Shortcuts yang memindai tag, mengurai payload-nya, dan memulai apa pun yang Anda inginkan selanjutnya - otomatisasi, pencatatan, journaling, apa saja. Tindakan yang sama menggerakkan kontrol <strong>Tombol Pindai</strong> di layar kunci pada iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone menghubungkan tag NFC ke blok otomatisasi"
    platforms: "iOS"

  - title: "Sinkronisasi iCloud di iPhone, iPad, dan Mac"
    body: "<p>Model yang dipindai tersimpan di folder iCloud Documents Anda, sehingga iPhone yang Anda gunakan untuk memindai, iPad yang Anda gunakan untuk meninjau, dan <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> yang akan Anda gunakan untuk mengedit semuanya melihat perpustakaan yang sama. Pindai saat bepergian, selesaikan di meja kerja.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool tersinkronisasi di iPhone, iPad, dan Mac"
    platforms: "iOS"

