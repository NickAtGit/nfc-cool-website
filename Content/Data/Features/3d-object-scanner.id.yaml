faqTitle: "Pertanyaan yang sering diajukan"
faq:
  - question: "Apakah iPhone saya memerlukan LiDAR?"
    answer: "Ya. Sesi Object Capture Apple membutuhkan perangkat yang dilengkapi LiDAR - yaitu iPhone Pro (12 Pro dan lebih baru) atau iPad Pro mulai tahun 2020. iPhone non-Pro tidak dilengkapi LiDAR."
  - question: "Berapa lama pemindaian berlangsung?"
    answer: "Beberapa menit berjalan mengelilingi objek, lalu beberapa menit rekonstruksi di perangkat. Objek yang lebih besar atau lebih bertekstur membutuhkan waktu lebih lama."
  - question: "Bisakah saya mencetak 3D hasilnya?"
    answer: "Anda dapat mengekspor ke OBJ dan mengonversi ke STL di Blender, MeshLab, atau alat 3D standar mana pun. Ketelitian model terbaik untuk objek berukuran sedang dengan tekstur yang jelas."
  - question: "Apa perbedaan antara ini dan Pemindai Ruangan?"
    answer: "Object Capture (fitur ini) membangun satu model 3D dari sebuah benda. Pemindai Ruangan menggunakan LiDAR dan RoomPlan Apple untuk membangun denah lantai sebuah ruang - dinding, pintu, furnitur. Keduanya membutuhkan LiDAR; keduanya menjawab pertanyaan yang berbeda."

