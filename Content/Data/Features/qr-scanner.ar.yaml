  description: "امسح رموز QR بالكاميرا أو التقطها من أي صورة، ثم صمّم رموزك الخاصة بالأيقونات وGenmoji في استوديو رموز QR المدمج."
  imagePath: "/assets/images/Webflow/qr-studio.webp"
