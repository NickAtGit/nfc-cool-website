faqTitle: "الأسئلة الشائعة"
faq:
  - question: "لماذا يقتصر هذا على iOS؟"
    answer: "يركّز إصدار NFC.cool على Android حاليًا على NFC وبطاقة العمل الرقمية. ومسح رموز QR مُدرَج في خارطة طريق Android."
  - question: "هل رموز QR من الاستوديو متوافقة مع جميع القارئات؟"
    answer: "نعم. إنها رموز QR قياسية مع تنسيق تجميلي اختياري. يمكن لأي قارئ قياسي (كاميرا iOS وGoogle Lens وماسحات Android الافتراضية) فكّ ترميزها."
  - question: "هل يمكنني مسح رمز QR من لقطة شاشة؟"
    answer: "نعم. اختر أي صورة من مكتبة صورك، وسيجد NFC.cool كل رمز QR بداخلها - حتى الرموز المغطّاة جزئيًا."
  - question: "هل يضمّن الاستوديو علامة مائية أو هوية NFC.cool؟"
    answer: "تحمل رموز Free إسنادًا صغيرًا. أما رموز Platinum فبلا علامة مائية - تصميمك وحده."

