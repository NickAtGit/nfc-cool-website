capabilitiesTitle: "ما يمكنك فعله"
capabilities:
  - title: "مسح شامل لرموز QR"
    description: "عناوين URL وبطاقات vCard وبيانات اعتماد Wi-Fi وأحداث التقويم والمدفوعات وروابط App Store العميقة - يكتشف NFC.cool نوع المحتوى ويقترح الإجراء المناسب."
  - title: "اكتشاف رموز QR في لقطات الشاشة"
    description: "اختر أي صورة من مكتبة صورك، وسيجد NFC.cool أي رمز QR بداخلها ويفكّ ترميزه - حتى الرموز المحجوبة جزئيًا أو منخفضة التباين."
  - title: "استوديو رموز QR"
    description: "صمّم رموز QR بألوان مخصّصة وأنماط عيون مستديرة وأشكال بكسل مخصّصة وشعار أو Genmoji في الوسط. صدّرها بصيغة PNG بدقة تصل إلى 4096×4096."
  - title: "السجل وإعادة المشاركة"
    description: "تُحفظ كل عملية مسح محليًا - أعد فتح المحتوى أو انسخه أو شاركه أو عد مباشرة إلى الإجراء."
  - title: "إجراء تلقائي عند القراءة"
    description: "افتح عناوين URL أو شغّل الاختصارات أو أطلق webhook أو انطق النتيجة بصوت عالٍ لحظة مسح الرمز - نفس الأتمتة ذات الخطافات الخمسة التي تشغّل عمليات مسح NFC."

subsectionsTitle: "أكثر من مجرد ماسح"
subsections:
  - title: "الأدوات - رمز QR على الشاشة الرئيسية"
    body: "<p>ضع رموز QR الأكثر مشاركة على الشاشة الرئيسية لـiPhone أو iPad باستخدام <strong>أداة صورة QR</strong>. Wi-Fi للمكتب، ورابط بطاقة عملك، وقائمة طعام حانتك - ظاهرة بلمحة، وقابلة للمسح من هاتف الشخص المجاور دون أن تفتح أي شيء. تعرض <strong>أداة آخر مسح</strong> أحدث رمز تم مسحه لتعيد مشاركته فورًا. وتطلق <strong>أداة زر المسح</strong> الماسح مباشرة من الشاشة الرئيسية أو شاشة القفل - بلمسة واحدة، حتى على iOS 17+ عبر عناصر التحكم التفاعلية.</p>"
    imagePath: "/assets/images/Features/qr-scanner-widgets-home-screen.webp"
    imageAlt: "الشاشة الرئيسية لـiPhone مع أدوات رموز QR وزر المسح"
    platforms: "iOS"

  - title: "استوديو رموز QR: أشكال بكسل وألوان وعيون وشعارات مخصّصة"
    body: "<p>يتيح لك استوديو رموز QR الحفاظ على قابلية المسح مع التخلّص من مظهر المربّعات المؤسّسي الجامد. اختر أشكال البكسل (مستديرة أو نقاط أو معيّنات) وأنماطًا لكل عين وألوان المقدّمة والخلفية وصورة شعار أو Genmoji في الوسط. صدّرها بستة أحجام بكسل - 512 أو 1024 أو 1536 أو 2048 أو 3072 أو 4096.</p>"
    imagePath: "/assets/images/Features/qr-scanner-studio-card.webp"
    imageAlt: "استوديو رموز QR مع شعار مخصّص"
    platforms: "iOS"

  - title: "المسح المتعدّد والقراءة المجمّعة والإضاءة عند الطلب"
    body: "<p>ثلاثة إعدادات تحوّل الماسح من أداة لمرة واحدة إلى سير عمل متواصل. يتيح لك <strong>المسح المتعدّد</strong> مسح عدة رموز في جلسة كاميرا واحدة. تُبقي <strong>القراءة المجمّعة</strong> الكاميرا مفتوحة لجرد المخزون أو تسجيل الحضور في الفعاليات. تشغّل <strong>الإضاءة التلقائية</strong> مصباح LED في الإضاءة المنخفضة كي لا تتلمّس زر الفلاش.</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhone يمسح عدة رموز QR وباركود مع إضاءة المصباح"
    platforms: "iOS"

  - title: "الاختصارات وApp Intents"
    body: "<p>يتكامل NFC.cool مباشرة مع تطبيق اختصارات iOS بإجراءات مدمجة: احصل على آخر وسم NFC تم مسحه، أو اكتب رسالة إلى وسم، أو افتح الماسح، أو استخرج آخر رمز QR تم مسحه. اربطها في اختصارات تمسح وسمًا وتحلّل محتواه وتطلق ما تريد فعله بعد ذلك - أتمتة أو تسجيل أو تدوين، ما شئت. تشغّل الإجراءات نفسها عنصر التحكم <strong>زر المسح</strong> في شاشة القفل على iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone يربط وسم NFC بكتل الأتمتة"
    platforms: "iOS"

  - title: "مزامنة iCloud عبر iPhone وiPad وMac"
    body: "<p>يتزامن سجل المسح وتصاميم استوديو QR عبر كل جهاز على حساب iCloud الخاص بك. صمّم رمز QR على iPad، وشاركه من iPhone، وحرّره على <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - المكتبة نفسها والتعديلات نفسها، دون تصدير ذهابًا وإيابًا.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool يتزامن عبر iPhone وiPad وMac"
    platforms: "iOS"

