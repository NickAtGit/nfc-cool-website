      - "Interleaved 2 of 5, ITF-14"
      - "GS1 DataBar (estándar, Expanded, Limited)"
  - title: "Códigos 2D / apilados (6 formatos)"
    items:
      - "Código QR"
      - "Micro QR"
      - "PDF417"
      - "Micro PDF417"
      - "Aztec"
      - "Data Matrix"

