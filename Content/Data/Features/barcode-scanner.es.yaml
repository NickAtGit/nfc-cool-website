faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿Por qué es solo para iOS?"
    answer: "La versión de Android de NFC.cool se centra actualmente en NFC y en la tarjeta de visita digital. La lectura de códigos de barras está en la hoja de ruta de Android."
  - question: "¿Puedo escanear varios códigos de barras a la vez?"
    answer: "Sí - el modo de lote mantiene la cámara abierta y pone en cola cada código de barras que encuentra. Toca cualquier elemento de la cola para actuar sobre él."
  - question: "¿Puedo guardar y compartir mis escaneos?"
    answer: "Sí - cada escaneo permanece en la vista de historial con su fecha y hora. Puedes marcar un escaneo como favorito, ponerle un título y compartirlo desde ahí."
  - question: "¿El escáner funciona sin conexión?"
    answer: "Sí para el escaneo en sí. La búsqueda de productos necesita internet (procesa el número del código de barras a través de un buscador), pero la lectura del código de barras se hace solo en el dispositivo."

