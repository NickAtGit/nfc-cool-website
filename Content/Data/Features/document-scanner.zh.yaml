faqTitle: "常见问题"
faq:
  - question: "OCR 能离线使用吗？"
    answer: "可以。iOS Vision 完全在设备端处理 OCR。你可以在飞机上、野外，任何地方扫描并 OCR 文档。"
  - question: "OCR 支持哪些语言？"
    answer: "iOS Vision 目前可识别英语、法语、意大利语、德语、西班牙语、葡萄牙语和简体中文，此外还支持手写识别。"
  - question: "OCR 的准确度如何？"
    answer: "对印刷体文字准确度非常高。手写识别的准确度取决于字迹的工整程度和对比度。你可以在扫描后编辑任何识别出的文本。"
  - question: "扫描的文档存储在哪里？"
    answer: "免费版：存储在设备上的 App 沙盒中。Platinum 版：可选择自动导出到 iCloud 文档，从而显示在文件 App 中，并出现在所有登录了你 iCloud 的设备上。"

