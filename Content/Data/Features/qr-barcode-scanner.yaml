specsTitle: "Supported formats"
specs:
  - title: "2D codes"
    items:
      - "QR Code (M1–M4)"
      - "Micro QR"
      - "Aztec"
      - "Data Matrix"
      - "PDF417"
  - title: "1D Barcodes"
    items:
      - "EAN-13, EAN-8"
      - "UPC-A, UPC-E"
      - "Code 128, Code 39, Code 93"
      - "Interleaved 2 of 5 (ITF)"
      - "Codabar"
  - title: "QR Studio export"
    items:
      - "SVG (vector)"
      - "PNG up to 4096×4096"
      - "Logo overlays up to 30% area"
      - "Custom eye shapes & frames"

