faqTitle: "Frequently asked"
faq:
  - question: "Why is this iOS-only?"
    answer: "The Android version of NFC.cool currently focuses on NFC and the Digital Business Card. QR & Barcode Scanning is on the Android roadmap."
  - question: "Can I scan multiple codes at once?"
    answer: "Yes - batch mode keeps the camera open and queues every code it finds. Tap any item in the queue to act on it."
  - question: "Are the QR codes from the Studio compatible with all readers?"
    answer: "Yes - they're standard QR codes with optional cosmetic styling. All standard QR readers (including iOS Camera and Google Lens) can decode them."

