faqTitle: "Questions fréquentes"
faq:
  - question: "L'OCR fonctionne-t-il hors ligne ?"
    answer: "Oui. Vision d'iOS gère l'OCR entièrement sur l'appareil. Vous pouvez numériser et appliquer l'OCR à vos documents dans un avion, en pleine nature, n'importe où."
  - question: "Quelles langues l'OCR prend-il en charge ?"
    answer: "Vision d'iOS reconnaît actuellement l'anglais, le français, l'italien, l'allemand, l'espagnol, le portugais et le chinois simplifié. La reconnaissance de l'écriture manuscrite est également prise en charge."
  - question: "Quelle est la précision de l'OCR ?"
    answer: "Très élevée pour le texte imprimé. Pour l'écriture manuscrite, la précision dépend de la netteté et du contraste. Vous pouvez modifier n'importe quel texte reconnu après la numérisation."
  - question: "Où sont stockés les documents numérisés ?"
    answer: "Offre Free : dans le bac à sable de l'app, sur l'appareil. Platinum : exportés automatiquement, en option, vers iCloud Documents pour apparaître dans l'app Fichiers et sur tous les appareils connectés à votre iCloud."

