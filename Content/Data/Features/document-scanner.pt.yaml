faqTitle: "Perguntas Frequentes"
faq:
  - question: "O OCR funciona offline?"
    answer: "Sim. O Vision do iOS trata do OCR inteiramente no dispositivo. Pode digitalizar e fazer OCR de documentos num avião, no mato, em qualquer lugar."
  - question: "Que idiomas suporta o OCR?"
    answer: "O Vision do iOS reconhece atualmente inglês, francês, italiano, alemão, espanhol, português e chinês simplificado. O reconhecimento de escrita manual também é suportado."
  - question: "Qual é a precisão do OCR?"
    answer: "Muito elevada para texto impresso. A precisão da escrita manual depende da clareza e do contraste. Pode editar qualquer texto reconhecido após a digitalização."
  - question: "Onde são guardados os documentos digitalizados?"
    answer: "Nível gratuito: na sandbox da aplicação no dispositivo. Platinum: opcionalmente exportados automaticamente para os Documentos no iCloud, para que apareçam na aplicação Ficheiros e em todos os dispositivos com sessão iniciada no seu iCloud."

