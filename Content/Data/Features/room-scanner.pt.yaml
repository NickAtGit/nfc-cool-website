slug: "room-scanner"
backLinkText: "← Todas as funcionalidades"

card:
  title: "Digitalizador de Divisões"
  description: "Percorra uma divisão e o RoomPlan cria uma planta limpa - paredes, portas, janelas e mobiliário - com medidas da divisão e cálculo de área."
  imagePath: "/assets/images/Webflow/scan-room.webp"
  platforms: "iOS apenas"

hero:
  title: "Digitalizador de Divisões"
  subtitle: "O RoomPlan, alimentado por LiDAR, transforma um percurso pelo seu espaço numa planta paramétrica limpa - paredes, portas, janelas e mobiliário reconhecido, exportados como uma única cena USDZ."
  platforms: "iOS apenas"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "O Que Pode Fazer"
capabilities:
  - title: "Captura com RoomPlan"
    description: "Percorra uma divisão com o sensor LiDAR do seu iPhone. O NFC.cool cria um modelo paramétrico em tempo real - paredes, portas, janelas e aberturas."
  - title: "Mobiliário Reconhecido"
    description: "Camas, sofás, mesas, cadeiras, arrumação, fogões, lava-loiças, sanitas, banheiras e televisores são detetados e identificados dentro da cena."
  - title: "Área de Chão e Dimensões"
    description: "Cada divisão indica a área de chão, a altura do teto e as dimensões de cada parede. Leia-as a partir do modelo ou incorpore-as no USDZ exportado."
  - title: "AR Quick Look"
    description: "Abra a divisão concluída no AR Quick Look ou partilhe o USDZ - os destinatários podem andar à volta do modelo diretamente nas Mensagens."

subsectionsTitle: "De um Percurso a uma Planta Funcional"
subsections:
  - title: "Coloque a sua Divisão em AR"
    body: "<p>Assim que uma digitalização termina, coloque-a no AR Quick Look e ande fisicamente à volta do gémeo digital. Útil para confirmar a disposição do mobiliário antes de comprar, ou para ter uma noção de escala que os desenhos num tablet simplesmente não transmitem.</p>"
    imagePath: "/assets/images/Blog/mac-3d-detail.webp"
    imageAlt: "Vista detalhada de digitalização de divisão"
    platforms: "iOS"

  - title: "Fluxos de Trabalho de Várias Divisões"
    body: "<p>Cada digitalização é uma divisão. Capture a cozinha, capture a sala de estar, capture os quartos - ficam lado a lado na sua biblioteca, e um editor 3D à sua escolha pode juntá-las num USDZ de várias divisões. Particularmente útil para anúncios imobiliários, planeamento de renovações ou documentação para seguros.</p>"
    platforms: "iOS"

  - title: "Atalhos e App Intents"
    body: "<p>O NFC.cool integra-se diretamente na aplicação Atalhos do iOS com ações incorporadas: obter a última tag NFC lida, gravar uma mensagem numa tag, abrir o digitalizador ou obter o último código QR lido. Encadeie-as em Atalhos que leem uma tag, analisam o seu conteúdo e desencadeiam o que quiser a seguir - automação, registo, diário, o que imaginar. As mesmas ações alimentam o controlo <strong>Botão de Digitalização</strong> no ecrã bloqueado no iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone a ligar uma tag NFC a blocos de automação"
    platforms: "iOS"

  - title: "Sincronização iCloud entre iPhone, iPad e Mac"
    body: "<p>As divisões digitalizadas ficam na sua pasta de Documentos no iCloud, por isso o iPhone com que digitalizou, o iPad em que reviu e o <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> em que vai editar veem todos a mesma biblioteca. Percorra o espaço uma vez, refine a planta mais tarde na sua secretária.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool a sincronizar entre iPhone, iPad e Mac"
    platforms: "iOS"

specsTitle: "Hardware e Resultado"
