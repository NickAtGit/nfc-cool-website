faqTitle: "Perguntas Frequentes"
faq:
  - question: "Preciso de LiDAR?"
    answer: "Sim. O RoomPlan é uma API exclusiva de LiDAR da Apple. (o Digitalizador de Objetos 3D também precisa de LiDAR - a sessão de Object Capture da Apple verifica-o.)"
  - question: "Quanto tempo demora uma digitalização?"
    answer: "Basta percorrer a divisão. O resultado é gerado em tempo real e fica pronto quando terminar."
  - question: "Posso abrir o resultado em software CAD?"
    answer: "Sim - o USDZ é suportado pela maioria das ferramentas CAD/3D modernas. Para fluxos de trabalho com SketchUp / Revit, converta através do Blender ou de uma ferramenta gratuita de USD para OBJ."

