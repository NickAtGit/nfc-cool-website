faqTitle: "Frequently asked"
faq:
  - question: "Why is this iOS-only?"
    answer: "The Android version of NFC.cool currently focuses on NFC and the Digital Business Card. Barcode scanning is on the Android roadmap."
  - question: "Can I scan multiple barcodes at once?"
    answer: "Yes — batch mode keeps the camera open and queues every barcode it finds. Tap any item in the queue to act on it."
  - question: "Can I export the scan history?"
    answer: "Yes — the history view exports to CSV with timestamp, format, and raw payload."
  - question: "Does the scanner work offline?"
    answer: "Yes for the scan itself. Product lookup needs internet (it hits Amazon / Google Shopping / eBay), but the barcode read is on-device only."
