card:
  title: "Barcode Scanner"
  description: "Scan 13 barcode formats plus 6 two-dimensional codes - EAN, UPC, QR, PDF417, Data Matrix, and more. Batch mode keeps the camera open for inventory and check-ins."
  imagePath: "/assets/images/Webflow/qr-barcode.webp"
  platforms: "iOS only"

hero:
  title: "Barcode Scanner"
  subtitle: "Scan 19 code formats - 13 linear barcodes (EAN, UPC, Code 128, GS1 DataBar and more) plus 6 two-dimensional codes (QR, PDF417, Aztec, Data Matrix and Micro variants). Batch mode keeps the camera open for inventory counts and event check-ins."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/qr-barcode.webp"

capabilitiesTitle: "What You Can Do"
capabilities:
  - title: "All Major Barcode Formats"
    description: "Scan EAN-13/8, UPC-E (UPC-A is read as EAN-13), Code 128, Code 39 (incl. Mod 43), Code 93, ITF, ITF-14, Codabar, GS1 DataBar, PDF417, Aztec, Data Matrix and more - automatic format detection, no mode switching."
  - title: "Batch Mode"
    description: "Scan a stack of barcodes back-to-back without re-aiming. Useful for inventory counts, event check-ins, or library archives."
  - title: "Product Lookup"
    description: "Tap a scanned retail barcode to look it up - the barcode number is run through a pre-configured search engine (Google, Ecosia, DuckDuckGo, Bing, or Startpage) and matching results come straight back."
  - title: "Scan History & Sharing"
    description: "Every scan is saved with a timestamp. Favorite the scans that matter, give one its own title, and share it straight from the history view."
  - title: "Auto-Action on Read"
    description: "URLs and shortcut codes can auto-open the moment they're scanned, fire a webhook, or get spoken aloud - the same five-hook automation that powers NFC and QR."

subsectionsTitle: "Built for High-Volume Scanning"
subsections:
  - title: "Multi-Scan, Batch Read, and Torch on Demand"
    body: "<p>Three settings turn the scanner from one-and-done into a continuous workflow. <strong>Multi-scan</strong> lets you scan several codes in one camera session. <strong>Batch read</strong> keeps the camera open for inventory or event check-ins. <strong>Auto-torch</strong> kicks the LED on in low light so you don't fumble for the flashlight button.</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhone scanning multiple QR codes and barcodes with torch light"
    platforms: "iOS"

  - title: "Webhooks for Stocktake & Event Check-Ins"
    body: "<p>Point the barcode scanner at your back-office system. Every barcode read fires a webhook to your URL, so your inventory database, attendee CRM, or library catalogue updates in real time as the camera moves. See <a href=\"/features/webhooks/\">Webhooks & Automation</a> for the JSON payload shape and a reference server.</p>"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool plugs straight into the iOS Shortcuts app with built-in actions: grab the last scanned NFC tag, write a message to a tag, open the scanner, or pull the last scanned QR code. Chain them into Shortcuts that scan a tag, parse its payload, and kick off whatever you want next - automation, logging, journaling, you name it. The same actions power the lock-screen <strong>Scan Button</strong> control on iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone connecting an NFC tag to automation blocks"
    platforms: "iOS"

  - title: "iCloud Sync across iPhone, iPad, and Mac"
    body: "<p>Your barcode scan history syncs across every device on your iCloud account. Scan a shelf of products on the iPhone, review the list on the iPad, title and share scans from the <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - one synced history, nothing to move by hand.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

