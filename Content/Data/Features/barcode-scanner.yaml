slug: "barcode-scanner"
appStoreURL: "https://apps.apple.com/app/apple-store/id1249686798?pt=106913804&ct=web_en&mt=8"
backLinkText: "← All features"

hero:
  title: "Barcode Scanner"
  subtitle: "Scan EAN, UPC, Code 128, PDF417, Aztec, Data Matrix and 20+ more formats. Batch mode keeps the camera open for inventory counts and event check-ins."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/qr-barcode.webp"

capabilitiesTitle: "What you can do"
capabilities:
  - title: "All major barcode formats"
    description: "Scan EAN-13/8, UPC-A/E, Code 128, Code 39, ITF, PDF417, Aztec, Data Matrix and more - automatic format detection, no mode switching."
  - title: "Batch mode"
    description: "Scan a stack of barcodes back-to-back without re-aiming. Useful for inventory counts, event check-ins, or library archives."
  - title: "Product lookup"
    description: "Look up retail barcodes via web search or pre-configured retailers (Amazon, Google Shopping, eBay) with one tap from the scan."
  - title: "Scan history"
    description: "Every scan is saved with timestamp and format. Export the list as CSV or copy individual codes."

screenshots:
  - path: "/assets/images/Webflow/qr-barcode.webp"
    alt: "Scanning a barcode with the camera"

specsTitle: "Supported formats"
specs:
  - title: "1D Barcodes"
    items:
      - "EAN-13, EAN-8"
      - "UPC-A, UPC-E"
      - "Code 128, Code 39, Code 93"
      - "Interleaved 2 of 5 (ITF)"
      - "Codabar"
  - title: "Stacked / 2D"
    items:
      - "PDF417"
      - "Aztec"
      - "Data Matrix"
      - "MaxiCode"

faqTitle: "Frequently asked"
faq:
  - question: "Why is this iOS-only?"
    answer: "The Android version of NFC.cool currently focuses on NFC and the Digital Business Card. Barcode scanning is on the Android roadmap."
  - question: "Can I scan multiple barcodes at once?"
    answer: "Yes - batch mode keeps the camera open and queues every barcode it finds. Tap any item in the queue to act on it."
  - question: "Can I export the scan history?"
    answer: "Yes - the history view exports to CSV with timestamp, format, and raw payload."

cta:
  title: "Scan anything, in any quantity."
  buttonText: "Download for iOS"
