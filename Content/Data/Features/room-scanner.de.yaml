slug: "room-scanner"
backLinkText: "← Alle Funktionen"

hero:
  title: "Raumscan"
  subtitle: "LiDAR-gestütztes RoomPlan verwandelt einen Spaziergang durch dein Zuhause in einen sauberen, parametrischen Grundriss – Wände, Türen, Fenster und erkannte Möbel, exportiert als einzelne USDZ-Szene."
  platforms: "Nur iOS"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "Was du tun kannst"
capabilities:
  - title: "RoomPlan-Aufnahme"
    description: "Gehe mit dem LiDAR-Sensor deines iPhones durch einen Raum. NFC.cool baut in Echtzeit ein parametrisches Modell – Wände, Türen, Fenster und Öffnungen."
  - title: "Erkannte Möbel"
    description: "Betten, Sofas, Tische, Stühle, Schränke, Herde, Spülen, Toiletten, Badewannen und Fernseher werden erkannt und in der Szene benannt."
  - title: "Bodenfläche & Maße"
    description: "Jeder Raum liefert Bodenfläche, Deckenhöhe und Wandlängen. Lies sie direkt am Modell ab oder bette sie in das exportierte USDZ ein."
  - title: "AR Quick Look"
    description: "Öffne den fertigen Raum in AR Quick Look oder teile das USDZ – Empfänger können direkt in Nachrichten durch das Modell laufen."

subsectionsTitle: "Vom Rundgang zum echten Grundriss"
subsections:
  - title: "Deinen Raum in AR begehen"
    body: "<p>Sobald ein Scan fertig ist, lege ihn in AR Quick Look und gehe physisch um das digitale Pendant herum. Praktisch, um Möbelplatzierung vor dem Kauf zu prüfen, oder einfach um ein Größengefühl zu bekommen, das Zeichnungen auf dem Tablet nicht vermitteln.</p>"
    imagePath: "/assets/images/Blog/mac-3d-detail.webp"
    imageAlt: "Raum-Scan-Detail-Ansicht"
    platforms: "iOS"

  - title: "Workflows mit mehreren Räumen"
    body: "<p>Jeder Scan ist ein Raum. Erfasse die Küche, das Wohnzimmer, die Schlafzimmer – sie liegen nebeneinander in deiner Bibliothek, und ein 3D-Editor deiner Wahl kann sie zu einem Multi-Raum-USDZ zusammensetzen. Besonders nützlich für Immobilien-Listings, Renovierungs-Planung oder Versicherungs-Dokumentation.</p>"
    platforms: "iOS"

specsTitle: "Hardware & Ausgabe"
specs:
  - title: "Hardware-Anforderungen"
    items:
      - "iPhone mit LiDAR (12 Pro und neuere Pro-Modelle)"
      - "iPad Pro (2020) und neuer werden ebenfalls unterstützt"
      - "RoomPlan verfügbar ab iOS 16; die neuesten Verbesserungen kommen mit iOS 17+"
  - title: "Ausgabe"
    items:
      - "USDZ-Szene mit benannten Elementen"
      - "Wände, Türen, Fenster, Öffnungen"
      - "Erkannte Möbel-Kategorien"
      - "Bodenfläche und Maße"

