backLinkText: "← Alle Funktionen"

hero:
  title: "Raumscan"
  subtitle: "LiDAR-gestütztes RoomPlan verwandelt einen Spaziergang durch dein Zuhause in einen sauberen, parametrischen Grundriss - Wände, Türen, Fenster und erkannte Möbel, exportiert als einzelne USDZ-Szene."
  platforms: "Nur iOS"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "Was du machen kannst"
capabilities:
  - title: "RoomPlan-Aufnahme"
    description: "Gehe mit dem LiDAR-Sensor deines iPhones durch einen Raum. NFC.cool baut in Echtzeit ein parametrisches Modell - Wände, Türen, Fenster und Öffnungen."
  - title: "Erkannte Möbel"
    description: "Betten, Sofas, Tische, Stühle, Schränke, Herde, Spülen, Toiletten, Badewannen und Fernseher werden erkannt und in der Szene benannt."
  - title: "Bodenfläche & Maße"
    description: "Jeder Raum liefert Bodenfläche, Deckenhöhe und Wandlängen. Exportiere die Zahlen als JSON oder nutze sie direkt in der USDZ-Datei."
  - title: "AR Quick Look"
    description: "Öffne den fertigen Raum in AR Quick Look oder teile das USDZ - Empfänger können direkt in Nachrichten durch das Modell laufen."

screenshots:
  - path: "/assets/images/Webflow/scan-room.webp"
    alt: "Raum mit LiDAR scannen"

specsTitle: "Hardware & Ausgabe"
specs:
  - title: "Hardware-Anforderungen"
    items:
      - "iPhone mit LiDAR (12 Pro und neuere Pro-Modelle)"
      - "iPad Pro ab 2020 wird ebenfalls unterstützt"
      - "iOS 17+ für die aktuellsten RoomPlan-Features"
  - title: "Ausgabe"
    items:
      - "USDZ-Szene mit benannten Elementen"
      - "Wände, Türen, Fenster, Öffnungen"
      - "Erkannte Möbel-Kategorien"
      - "Bodenfläche und Maße"

faqTitle: "Häufige Fragen"
faq:
  - question: "Brauche ich LiDAR?"
    answer: "Ja - RoomPlan ist eine reine LiDAR-API von Apple. Objektscans (Photogrammetrie) funktionieren auf jedem iPhone, Raumscans benötigen LiDAR."
  - question: "Wie lange dauert ein Scan?"
    answer: "Einfach durch den Raum gehen. Das Ergebnis wird live erzeugt und ist fertig, sobald du aufhörst."
  - question: "Kann ich das Ergebnis in CAD-Software öffnen?"
    answer: "Ja - USDZ wird von den meisten modernen CAD-/3D-Tools unterstützt. Für SketchUp- oder Revit-Workflows konvertiere über Blender oder ein USD-zu-OBJ-Tool."

cta:
  title: "Deinen Raum in Minuten erfassen."
  buttonText: "Für iOS herunterladen"
