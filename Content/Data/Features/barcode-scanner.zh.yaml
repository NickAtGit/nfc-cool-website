faqTitle: "常见问题"
faq:
  - question: "为什么这项功能仅限 iOS？"
    answer: "NFC.cool 的 Android 版本目前专注于 NFC 和电子名片。条形码扫描已列入 Android 的路线图。"
  - question: "我可以一次扫描多个条形码吗？"
    answer: "可以。批量模式会让摄像头保持开启，并把找到的每一个条形码排入队列。轻触队列中的任意一项即可对其执行操作。"
  - question: "我可以保存并分享我的扫描记录吗？"
    answer: "可以。每次扫描都会带时间戳留在历史视图中。你可以收藏某条扫描记录、为它命名，并从那里分享出去。"
  - question: "扫描器离线也能用吗？"
    answer: "扫描本身可以离线进行。商品查询需要联网（它会把条形码编号送入搜索引擎），但条形码的读取完全在设备本地完成。"

