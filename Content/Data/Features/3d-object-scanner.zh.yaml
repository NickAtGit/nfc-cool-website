faqTitle: "常见问题"
faq:
  - question: "我的 iPhone 需要 LiDAR 吗？"
    answer: "需要。Apple 的 Object Capture 会话要求配备 LiDAR 的设备，也就是 iPhone Pro（12 Pro 及更新机型）或 2020 年起的 iPad Pro。非 Pro 机型的 iPhone 不配备 LiDAR。"
  - question: "一次扫描需要多久？"
    answer: "围绕物体走动几分钟，然后在设备端重建几分钟。物体越大、纹理越丰富，所需时间越长。"
  - question: "我可以把结果用于 3D 打印吗？"
    answer: "你可以导出为 OBJ，再在 Blender、MeshLab 或任意标准 3D 工具中转换为 STL。对于中等大小、纹理良好的物体，模型保真度最佳。"
  - question: "它和房间扫描有什么区别？"
    answer: "Object Capture（本功能）为单个物体构建一个 3D 模型。房间扫描则使用 LiDAR 和 Apple 的 RoomPlan 来构建空间的平面图，包括墙壁、门和家具。两者都需要 LiDAR，但解决的是不同的问题。"

