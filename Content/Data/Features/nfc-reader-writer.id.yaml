capabilitiesTitle: "Yang Bisa Anda Lakukan"
capabilities:
  - title: "Baca setiap tag NDEF"
    description: "Tempelkan tag NFC apa pun dan periksa rekaman NDEF-nya - URL, kontak, teks biasa, data MIME, peluncuran aplikasi, muatan kustom - plus byte mentah dan jenis teknologi."
  - title: "Tulis 25+ jenis pesan"
    description: "Situs web, nomor telepon, vCard, kredensial Wi-Fi, PayPal, Cash App & Venmo, Spotify, YouTube, Shortcuts, Instagram, X, LinkedIn, TikTok, WhatsApp, dan lainnya."
  - title: "Kunci & lindungi dengan kata sandi"
    description: "Jadikan tag permanen hanya-baca, atau lindungi dengan kata sandi sehingga hanya perangkat yang diberi wewenang yang bisa membaca atau menulis. Pengerasan tag kelas industri."
  - title: "Format, tulis massal, kloning"
    description: "Format tag kosong, tulis massal muatan yang sama ke tumpukan tag untuk acara atau peluncuran produk, dan kloning isi satu tag ke tag lain."
  - title: "Tindakan otomatis saat membaca"
    description: "Jalankan iOS Shortcuts secara otomatis, ucapkan hasilnya dengan keras, aktifkan webhook, atau buka tautan secara otomatis saat tag diketuk. Lima pemicu, satu ketukan."

subsectionsTitle: "Lebih dalam dari aplikasi NFC biasa"
subsections:
  - title: "NFC Safe - enkripsi rahasia di tag itu sendiri"
    body: "<p>Sebagian besar aplikasi NFC memperlakukan tag seperti kartu pos - siapapun dengan ponsel bisa membacanya. NFC Safe memperlakukannya seperti amplop tersegel. Rahasia Anda (kata sandi, frasa pemulihan, kunci lisensi, atau teks apa pun) dienkripsi di perangkat Anda dengan AES-256 sebelum sampai ke tag. Kehilangan tag, dicuri, diserahkan ke orang asing - tanpa frasa sandi Anda, muatannya hanyalah kebisingan.</p><p>Enkripsi yang sama berfungsi di kedua platform, sehingga Anda bisa mengunci rahasia di iPhone dan membukanya di Android. Ingin penjelasan lengkap tentang cara enkripsinya? <a href=\"/blog/nfc-safe-encrypted-secrets/\">Baca panduan mendalam NFC Safe di blog</a>.</p>"
    imagePath: "/assets/images/Blog/nfc-safe-encrypted-secrets.webp"
    imageAlt: "Rahasia terenkripsi NFC Safe di sebuah tag"
    platforms: "iOS · Android"

  - title: "NFC Tap Counter - lacak setiap tag berdasarkan ID dan hitungannya"
    body: "<p>Beberapa chip NFC menghitung pemindaian mereka sendiri di perangkat keras. NFC Tap Counter memanfaatkan itu: ia mengatur tag sehingga menambahkan hitungan ketukan langsung - dan/atau ID tag uniknya - ke apapun yang dibawanya (URL, email, SMS, atau Shortcut) pada setiap pembacaan tunggal. Tidak ada server, tidak ada internet, tidak ada backend yang perlu dikelola - chip yang melakukan penghitungan dan penggantian sendiri.</p><p>Itu membuat satu tag memberi tahu Anda stiker fisik mana yang diketuk dan berapa kali, dan memungkinkan Anda bertindak: batasi 100 pemindaian pertama untuk demo, lacak keterlibatan di kartu nama, atau buktikan keaslian dengan penghitung yang hanya pernah naik. Ingin panduan lengkapnya? <a href=\"/blog/count-nfc-tag-scans/\">Baca panduan NFC Tap Counter di blog</a>, atau <a href=\"/tap-counter/\">coba demo langsung</a> - ketuk tag dan lihat halaman menghitung.</p>"
    imagePath: "/assets/images/Blog/count-nfc-tag-scans.webp"
    imageAlt: "Tag NFC diketuk oleh ponsel dengan hitungan pemindaiannya yang naik"
    platforms: "iOS · Android"

  - title: "OpenPrintTag - filamen printer 3D Anda, di gulungan"
    body: "<p>OpenPrintTag adalah standar terbuka untuk menyematkan metadata gulungan filamen (material, warna, pabrikan, UUID, panjang tersisa) ke dalam rekaman NDEF kecil berenkode CBOR. NFC.cool membaca dan menulis format ini secara native di kedua platform - sehingga printer yang kompatibel dapat mengidentifikasi gulungan Anda begitu dimuat. Baru mengenal formatnya? <a href=\"/blog/openprinttag-read-write-nfc-spools-phone/\">Panduan blog kami memandu cara membaca dan menulis gulungan OpenPrintTag</a>.</p><p>Format yang sama mendukung muatan webhook terstruktur di halaman <a href=\"/features/webhooks/\">Webhooks & Otomasi</a> - aktifkan POST ke farm cetak Anda begitu gulungan baru terdeteksi.</p>"
    imagePath: "/assets/images/Blog/openprinttag-read-write-nfc-spools-phone.webp"
    imageAlt: "Membaca dan menulis gulungan NFC OpenPrintTag dengan ponsel"
    platforms: "iOS · Android"

  - title: "Reset kepala sikat gigi"
    body: "<p>Kepala sikat Philips Sonicare membawa tag NFC yang melacak penggunaan sehingga gagangnya mengingatkan Anda untuk menggantinya. NFC.cool dapat mereset penghitung itu - membaca status tag, memandu Anda melalui reset, menulis status baru kembali. Sama di kedua platform. Ingin tahu persis apa yang dilacak chip? <a href=\"/blog/reset-sonicare-brush-head-nfc/\">Baca panduan kepala sikat Sonicare di blog</a>. (Kami tidak membuat kepala sikat; kami hanya memberi milik Anda satu bulan lagi masa pakai.)</p>"
    imagePath: "/assets/images/Blog/reset-sonicare-brush-head-nfc.webp"
    imageAlt: "Mereset kepala sikat Philips Sonicare dengan NFC"
    platforms: "iOS · Android"

  - title: "Mode pengguna mahir"
    body: "<p>Untuk orang yang ingin tahu apa yang sebenarnya ada di chip: NFC.cool dapat membuang memori penuh tag sebagai hex, mendeteksi model chip yang mendasarinya (NTAG213/215/216, NTAG424 DNA, MIFARE Classic/Ultralight, ISO 15693 varian, FeliCa, dll.), dan melaporkan total byte, byte pengguna, halaman kunci, dan kontainer kemampuan. Dibangun untuk pengembang, pembuat, dan siapapun yang men-debug sebuah tag.</p><p>Di iOS, <strong>mode Expert APDU</strong> masuk satu level lebih dalam - kirim perintah ISO 7816 mentah ke tag dan periksa responsnya, untuk saat Anda berintegrasi dengan pembaca yang tidak biasa, protokol kustom, atau hanya ingin melihat apa yang akan diakui chip.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-power-user-mode.webp"
    imageAlt: "iPhone memeriksa memori tag NFC dengan panel diagnostik"
    platforms: "iOS · Android"

  - title: "Mata uang kripto dengan satu ketukan"
    body: "<p>Enkode Bitcoin, Ethereum, Solana, Lightning, atau alamat dompet apa pun sebagai rekaman NDEF payment-URI. Ketuk untuk berbagi dompet statis di konferensi, sematkan dalam stiker di produk Anda, atau serahkan kartu logam dengan alamat permanen kepada seseorang. Membaca bersifat timbal balik - pindai tag kripto, buka langsung ke aplikasi dompet Anda.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-cryptocurrency-tap.webp"
    imageAlt: "iPhone berbagi dompet kripto melalui tag NFC"
    platforms: "iOS · Android"

  - title: "Onboarding Wi-Fi tanpa mengetik kata sandi"
    body: "<p>Tulis SSID Wi-Fi, jenis keamanan, dan kata sandi ke tag sekali saja. Mulai saat itu, siapapun yang mengetuknya bergabung ke jaringan - tidak perlu mengeja kata sandi, tidak perlu catatan tempel yang dicoret di AirBnB. Balik arahnya: baca tag Wi-Fi dari rumah orang lain dan biarkan OS meminta untuk bergabung.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-wifi-onboarding.webp"
    imageAlt: "iPhone bergabung ke Wi-Fi dari tag NFC"
    platforms: "iOS · Android"

  - title: "Ucapkan dengan keras"
    body: "<p>Untuk aksesibilitas, untuk alur kerja hands-free, atau hanya karena menyenangkan - aktifkan hook sintesis ucapan dan setiap muatan tag dibacakan dengan keras begitu Anda mengetuknya. Kecepatan bicara dapat dikonfigurasi; berfungsi dengan VoiceOver dan teknologi bantu lainnya secara paralel.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-speak-aloud.webp"
    imageAlt: "iPhone membaca tag NFC dengan keras dengan gelombang audio"
    platforms: "iOS"

  - title: "Tulis massal CSV"
    body: "<p>Untuk operator NFC serius di iOS: unggah spreadsheet muatan, serahkan ponsel ke asisten, dan tulis seluruh tumpukan tag dalam satu sesi.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-csv-batch-write.webp"
    imageAlt: "iPhone menulis massal tag NFC dari spreadsheet"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool terhubung langsung ke aplikasi iOS Shortcuts dengan tindakan bawaan: ambil tag NFC terakhir yang dipindai, tulis pesan ke tag, buka pemindai, atau ambil kode QR terakhir yang dipindai. Rangkai ke dalam Shortcuts yang memindai tag, mengurai muatannya, dan memulai apa pun yang Anda inginkan berikutnya - otomasi, pencatatan, jurnal, apa saja. Tindakan yang sama mendukung kontrol <strong>Tombol Pindai</strong> di layar kunci pada iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone menghubungkan tag NFC ke blok otomasi"
    platforms: "iOS"

  - title: "Sinkronisasi iCloud di iPhone, iPad, dan Mac"
    body: "<p>Riwayat pemindaian, entri NFC Safe, dan templat penulisan sinkron dengan mulus di setiap perangkat yang masuk ke akun iCloud Anda. Ketuk tag di iPhone di saku Anda dan pemindaian ada di perpustakaan iPad Anda sesaat kemudian. NFC.cool kini <a href=\"/blog/nfc-cool-comes-to-mac/\">berjalan di Mac Apple Silicon</a> juga, sehingga perpustakaan yang sama muncul di sana.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool sinkron di iPhone, iPad, dan Mac"
    platforms: "iOS"

