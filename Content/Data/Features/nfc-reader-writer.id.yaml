faqTitle: "Pertanyaan yang sering diajukan"
faq:
  - question: "Apakah iPhone saya perlu dibuka kuncinya untuk membaca tag?"
    answer: "Untuk sebagian besar pemindaian tag, tidak - iPhone XS dan lebih baru dapat membaca tag NDEF dari layar kunci di latar belakang, tanpa perlu membuka aplikasi. Di Android, aplikasi perlu berada di latar depan untuk membaca tag."
  - question: "Bisakah saya membaca tag tanpa koneksi internet?"
    answer: "Ya. Pembacaan dan penulisan NFC terjadi sepenuhnya di perangkat. NFC.cool tidak pernah mengunggah konten tag ke server manapun."
  - question: "Apakah menulis tag NFC aman?"
    answer: "Penulisan aman dan dapat dibatalkan secara default - Anda bisa menulis ulang tag sebanyak yang Anda suka. Gunakan fitur kunci hanya saat Anda yakin: setelah tag dikunci secara permanen, tag tidak bisa ditulis ulang."
  - question: "Seberapa aman NFC Safe?"
    answer: "NFC Safe mengenkripsi muatan dengan AES-256-GCM, menurunkan kunci dari frasa sandi Anda melalui PBKDF2-HMAC-SHA256 selama 100.000 iterasi dengan garam acak 16-byte dan nonce 12-byte per rekaman. Tanpa frasa sandi, muatan di tag tidak bisa dibedakan dari byte acak."
  - question: "Apakah tag NFC Safe yang sama berfungsi di iOS dan Android?"
    answer: "Ya. Formatnya dapat dioperasikan bersama. Enkripsi di satu platform, dekripsi di platform lain - frasa sandi yang sama, muatan yang sama."
  - question: "Apakah mereset kepala sikat Sonicare membatalkan sesuatu?"
    answer: "Ini mereset penghitung penggunaan di tag sehingga gagang berhenti mengingatkan Anda. Kepala sikat itu sendiri tidak tahu sudah direset; ia terus menyikat. Gunakan penilaian Anda sendiri tentang kapan bulu sikat perlu diganti."

