faqTitle: "الأسئلة الشائعة"
faq:
  - question: "هل أحتاج إلى LiDAR؟"
    answer: "نعم. RoomPlan هو واجهة برمجة تطبيقات (API) من Apple تعمل بـLiDAR حصريًا. (ماسح الأجسام ثلاثية الأبعاد يحتاج إلى LiDAR أيضًا - جلسة Object Capture من Apple تتحقق من وجوده.)"
  - question: "كم يستغرق المسح؟"
    answer: "ما عليك سوى المرور عبر الغرفة. تُولَّد النتيجة مباشرةً وتكون جاهزة حين تنتهي."
  - question: "هل يمكنني فتح النتيجة في برامج CAD؟"
    answer: "نعم - صيغة USDZ مدعومة في معظم أدوات CAD وثلاثية الأبعاد الحديثة. لسير عمل SketchUp / Revit، حوّلها عبر Blender أو أداة مجانية لتحويل USD إلى OBJ."

