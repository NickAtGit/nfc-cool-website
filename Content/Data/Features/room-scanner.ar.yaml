card:
  title: "ماسح الغرف"
  description: "امشِ عبر الغرفة ليبني RoomPlan مخططًا أرضيًا نظيفًا - الجدران والأبواب والنوافذ والأثاث - مكتملًا بقياسات الغرفة وحساب المساحة."
  imagePath: "/assets/images/Webflow/scan-room.webp"
  platforms: "iOS فقط"

hero:
  title: "ماسح الغرف"
  subtitle: "يحوّل RoomPlan المدعوم بتقنية LiDAR تجوّلك في مساحتك إلى مخطط أرضي بارامتري نظيف - جدران وأبواب ونوافذ وأثاث يتعرّف عليه، يُصدَّر كمشهد USDZ واحد."
  platforms: "iOS فقط"
  heroImagePath: "/assets/images/Webflow/scan-room.webp"

capabilitiesTitle: "ما يمكنك فعله"
capabilities:
  - title: "التقاط RoomPlan"
    description: "امشِ عبر الغرفة مستخدمًا مستشعر LiDAR في جهاز iPhone. يبني NFC.cool نموذجًا بارامتريًا في الوقت الفعلي - الجدران والأبواب والنوافذ والفتحات."
  - title: "أثاث يُتعرّف عليه"
    description: "يُكتشف الأسِرّة والأرائك والطاولات والكراسي ووحدات التخزين والمواقد والأحواض والمراحيض وأحواض الاستحمام وأجهزة التلفاز ويُوسم كل منها داخل المشهد."
  - title: "مساحة الأرضية والأبعاد"
    description: "تُبلّغ كل غرفة عن مساحة الأرضية وارتفاع السقف وأبعاد كل جدار. اقرأها من النموذج أو ضمّنها في ملف USDZ المُصدَّر."
  - title: "AR Quick Look"
    description: "افتح الغرفة المكتملة في AR Quick Look أو شارك ملف USDZ - يمكن للمستلمين التجوّل حول النموذج داخل تطبيق الرسائل مباشرةً."

subsectionsTitle: "من جولة سير إلى مخطط أرضي عملي"
subsections:
  - title: "ضع غرفتك في الواقع المعزّز"
    body: "<p>بمجرد انتهاء المسح، أدرجه في AR Quick Look وتجوّل فعليًا حول التوأم الرقمي. مفيد للتحقق من مواضع الأثاث قبل الشراء، أو لاستشعار المقياس الذي لا تنقله الرسومات على جهاز لوحي.</p>"
    imagePath: "/assets/images/Blog/mac-3d-detail.webp"
    imageAlt: "عرض تفصيلي لمسح غرفة"
    platforms: "iOS"

  - title: "سير عمل متعدد الغرف"
    body: "<p>كل عملية مسح هي غرفة واحدة. امسح المطبخ، وامسح غرفة المعيشة، وامسح غرف النوم - تبقى جنبًا إلى جنب في مكتبتك، ويمكن لمحرّر ثلاثي الأبعاد من اختيارك أن يدمجها في ملف USDZ متعدد الغرف. مفيد بوجه خاص لإعلانات العقارات أو تخطيط التجديد أو توثيق التأمين.</p>"
    platforms: "iOS"

  - title: "الاختصارات وApp Intents"
    body: "<p>يتكامل NFC.cool مباشرةً مع تطبيق اختصارات iOS عبر إجراءات مدمجة: احصل على آخر وسم NFC ممسوح، أو اكتب رسالة إلى وسم، أو افتح الماسح، أو استخرج آخر رمز QR ممسوح. اربطها معًا في اختصارات تمسح وسمًا، وتحلّل حمولته، وتُطلق ما تريده بعد ذلك - أتمتة أو تسجيل أو تدوين، سمِّ ما شئت. الإجراءات نفسها تُشغّل عنصر التحكم <strong>زر المسح</strong> على شاشة القفل في iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "جهاز iPhone يربط وسم NFC بكتل أتمتة"
    platforms: "iOS"

  - title: "مزامنة iCloud عبر iPhone وiPad وMac"
    body: "<p>تبقى الغرف الممسوحة في مجلد مستندات iCloud لديك، لذا فإن جهاز iPhone الذي مسحت به، وجهاز iPad الذي راجعت عليه، وجهاز <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> الذي ستحرّر عليه، جميعها ترى المكتبة نفسها. تجوّل في المساحة مرة واحدة، وحسّن المخطط الأرضي لاحقًا على مكتبك.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool يزامن عبر iPhone وiPad وMac"
    platforms: "iOS"

