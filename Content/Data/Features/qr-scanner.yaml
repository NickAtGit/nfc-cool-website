slug: "qr-scanner"
backLinkText: "← All features"

hero:
  title: "QR Code Scanner & Studio"
  subtitle: "Scan any QR code from the camera or pick one out of a screenshot. Design custom QR codes with logos, Genmoji, and brand colors in the built-in QR Code Studio."
  platforms: "iOS only"
  heroImagePath: "/assets/images/Webflow/qr-studio.webp"

capabilitiesTitle: "What You Can Do"
capabilities:
  - title: "Universal QR Scanning"
    description: "URLs, vCards, Wi-Fi credentials, calendar events, payments, app-store deep-links - NFC.cool detects the payload type and offers the right action."
  - title: "Detect QR Codes in Screenshots"
    description: "Pick any image from your photo library and NFC.cool finds and decodes any QR code inside it - even partially obscured or low-contrast ones."
  - title: "QR Code Studio"
    description: "Design QR codes with custom colors, rounded eye patterns, custom pixel shapes, and a logo or Genmoji in the center. Export as PNG at up to 4096×4096."
  - title: "History & Re-Share"
    description: "Every scan is saved locally - re-open the payload, copy it, share it, or jump straight back to the action."
  - title: "Auto-Action on Read"
    description: "Open URLs, run Shortcuts, fire a webhook, or speak the result aloud the moment a code is scanned - the same five-hook automation that powers NFC scans."

subsectionsTitle: "More than a Scanner"
subsections:
  - title: "Widgets - your QR on the Home Screen"
    body: "<p>Drop your most-shared QR codes onto the iPhone or iPad home screen with the <strong>QR Image Widget</strong>. Wi-Fi for the office, your business-card link, the menu for your bar - visible at a glance, scannable from the next person's phone without you opening anything. The <strong>Last Scan Widget</strong> shows the most recently scanned code so you can re-share it instantly. And the <strong>Scan Button Widget</strong> launches the scanner directly from the home screen or lock screen - a single tap, even on iOS 17+ via interactive controls.</p>"
    imagePath: "/assets/images/Features/qr-scanner-widgets-home-screen.webp"
    imageAlt: "iPhone Home Screen with QR code widgets and scan button"
    platforms: "iOS"

  - title: "QR Code Studio: Custom Pixel Shapes, Colors, Eyes, Logos"
    body: "<p>QR Code Studio lets you keep the scannability while losing the corporate-square aesthetic. Choose pixel shapes (rounded, dots, diamonds), per-eye styles, foreground / background colors, a logo image or Genmoji in the center. Export at six pixel sizes - 512, 1024, 1536, 2048, 3072, or 4096.</p>"
    imagePath: "/assets/images/Features/qr-scanner-studio-card.webp"
    imageAlt: "QR Code Studio with a custom logo"
    platforms: "iOS"

  - title: "Multi-Scan, Batch Read, and Torch on Demand"
    body: "<p>Three settings turn the scanner from one-and-done into a continuous workflow. <strong>Multi-scan</strong> lets you scan several codes in one camera session. <strong>Batch read</strong> keeps the camera open for inventory or event check-ins. <strong>Auto-torch</strong> kicks the LED on in low light so you don't fumble for the flashlight button.</p>"
    imagePath: "/assets/images/Features/qr-scanner-multi-scan-batch-torch.webp"
    imageAlt: "iPhone scanning multiple QR codes and barcodes with torch light"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool plugs straight into the iOS Shortcuts app with built-in actions: grab the last scanned NFC tag, write a message to a tag, open the scanner, or pull the last scanned QR code. Chain them into Shortcuts that scan a tag, parse its payload, and kick off whatever you want next - automation, logging, journaling, you name it. The same actions power the lock-screen <strong>Scan Button</strong> control on iOS 17+.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone connecting an NFC tag to automation blocks"
    platforms: "iOS"

  - title: "iCloud Sync across iPhone, iPad, and Mac"
    body: "<p>Scan history and your QR Studio designs sync across every device on your iCloud account. Design a QR on the iPad, share it from the iPhone, edit it on the <a href=\"/blog/nfc-cool-comes-to-mac/\">Mac</a> - same library, same edits, no exporting back and forth.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool syncing across iPhone, iPad, and Mac"
    platforms: "iOS"

