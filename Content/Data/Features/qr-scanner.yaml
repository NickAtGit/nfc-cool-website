faqTitle: "Frequently Asked"
faq:
  - question: "Why is this iOS-only?"
    answer: "The Android version of NFC.cool currently focuses on NFC and the Digital Business Card. QR scanning is on the Android roadmap."
  - question: "Are the QR codes from the Studio compatible with all readers?"
    answer: "Yes. They're standard QR codes with optional cosmetic styling. Every standard reader (iOS Camera, Google Lens, Android stock scanners) can decode them."
  - question: "Can I scan a QR code from a screenshot?"
    answer: "Yes. Pick any image from your photo library and NFC.cool finds every QR code inside - even partially covered ones."
  - question: "Does the Studio embed a watermark or NFC.cool branding?"
    answer: "Free codes carry a small attribution. Platinum codes are watermark-free - purely your design."
