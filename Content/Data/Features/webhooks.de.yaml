capabilitiesTitle: "Die fünf Hooks"
capabilities:
  - title: "Webhook (POST an deine URL)"
    description: "HTTP POST mit strukturiertem JSON-Body im Moment des Scans. Eine URL konfigurieren, optional HTTP Basic Auth, fertig. iOS und Android."
  - title: "Shortcut (iOS)"
    description: "Bei einer gescannten URL mit Schema <code>shortcuts://</code> startet automatisch der passende iOS-Shortcut - ohne weiteren Tap. Speise Scan-Daten in alles, was Shortcuts erreichen kann."
  - title: "Links öffnen (iOS)"
    description: "Bei einer normalen URL als Payload öffnet sich Safari (oder das passende Deep-Link-Ziel) automatisch. Der „Tippen zum Öffnen“-Schritt entfällt."
  - title: "Sprachausgabe (iOS)"
    description: "Liest die Payload laut vor, freihändig. Sprechgeschwindigkeit einstellbar. Nützlich für Barrierefreiheit, hands-busy-Workflows oder einfach zur Bestätigung."
  - title: "Audio abspielen (iOS)"
    description: "Spielt einen Bestätigungston beim Scannen - deine eigene Audiodatei oder einer der eingebauten Töne."

subsectionsTitle: "Wie der Webhook funktioniert"
subsections:
  - title: "Auslöser - NFC, QR und Barcode"
    body: "<p>Webhooks feuern bei drei Event-Quellen: <strong>NFC-Scans</strong>, <strong>QR-Scans</strong>, <strong>Barcode-Scans</strong>. Jede Quelle hat ihren eigenen Ein-/Aus-Schalter, sodass du z. B. NFC-Lesungen ins Inventur-System schicken kannst, ohne dass der Kamera-Scanner denselben Endpunkt zuspammt. Der Webhook selbst ist immer derselbe - eine URL, ein JSON-Payload, ein POST.</p>"
    platforms: "iOS · Android"

  - title: "Payload-Form"
    body: "<p>Jeder POST sendet einen JSON-Body in dieser Form:</p><pre><code>{\n  \"identifier\": \"04:A3:B2:81:C5:6E:80\",\n  \"date\": \"2026-05-15T10:42:18Z\",\n  \"content\": \"https://example.com/product/42\",\n  \"tagType\": \"openPrintTag\",\n  \"structured\": {\n    \"material\": \"PLA\",\n    \"color\": \"#FF6F4C\",\n    \"manufacturer\": \"Prusament\",\n    \"uuid\": \"5e8a-…\"\n  }\n}</code></pre><p><code>identifier</code> ist die Tag-UID oder der gescannte Code. <code>date</code> ist ISO 8601. <code>content</code> ist die dekodierte Payload. <code>tagType</code> und <code>structured</code> erscheinen nur bei speziellen Formaten wie <a href=\"/de/features/nfc-reader-writer/\">OpenPrintTag</a> - andere Scans lassen sie weg.</p>"
    platforms: "iOS · Android"

  - title: "Curl-Beispiel"
    body: "<p>So sieht es auf der Serverseite aus - das <code>curl</code>-Äquivalent für eine normale URL-Payload:</p><pre><code>curl -X POST https://dein-server.example.com/scans \\\n  -H \"Content-Type: application/json\" \\\n  -u \"benutzername:passwort\" \\\n  -d '{\n    \"identifier\": \"04:A3:B2:81:C5:6E:80\",\n    \"date\": \"2026-05-15T10:42:18Z\",\n    \"content\": \"https://example.com/menu\"\n  }'</code></pre><p>Das <code>-u</code>-Flag entspricht dem, was NFC.cool sendet, wenn HTTP Basic Auth in den Einstellungen konfiguriert ist - Benutzername und Passwort liegen verschlüsselt im iOS-Keychain.</p>"
    platforms: "iOS · Android"

  - title: "Referenz-Server auf GitHub"
    body: "<p>Der schnellste Weg, den ganzen Kreislauf zu sehen: <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Web-Server auf GitHub</a>. Ein minimaler Beispiel-Server, der NFC.cool-Webhook-Payloads empfängt, loggt und die Struktur live zeigt. Klonen, starten, iPhone darauf richten, Scans landen sehen.</p>"
    platforms: "iOS · Android"

specsTitle: "Technische Details"
specs:
  - title: "Transport"
    items:
      - "HTTPS empfohlen; HTTP für Dev erlaubt"
      - "POST mit `Content-Type: application/json`"
      - "Optional HTTP Basic Auth (Benutzername + Passwort)"
      - "Zugangsdaten verschlüsselt im iOS-Keychain"
  - title: "Payload"
    items:
      - "`identifier` - Tag-UID oder gescannter Code"
      - "`date` - ISO-8601-Zeitstempel"
      - "`content` - dekodierte Payload (URL-String, Text usw.)"
      - "`tagType` - vorhanden bei strukturierten Tags (z. B. `openPrintTag`)"
      - "`structured` - verschachteltes JSON für strukturierte Tag-Typen"
  - title: "Quellen"
    items:
      - "NFC-Scans (NDEF-Lesungen)"
      - "QR-Scans"
      - "Barcode-Scans"
      - "Jede Quelle einzeln aktivierbar"

