faqTitle: "Häufig gefragt"
faq:
  - question: "Funktioniert das auf Android?"
    answer: "Ja - Webhooks sind sowohl in der iOS- als auch in der Android-Version von NFC.cool Tools verfügbar. Die JSON-Payload-Form ist plattformübergreifend gleich. (Die anderen vier iOS-Hooks - Auto-Shortcut, Sprachausgabe, Audio, Link-Öffnen - sind iOS-only.)"
  - question: "Wie viele URLs kann ich konfigurieren?"
    answer: "Heute eine URL. Dieselbe URL empfängt alle Scan-Events, unterschieden durch die aktivierten Quell-Schalter und den Payload-Typ."
  - question: "Welche Authentifizierung wird unterstützt?"
    answer: "HTTP Basic Auth - Benutzername + Passwort, verschlüsselt im iOS-Keychain. Bearer-Token, Custom-Header und HMAC-Signaturen werden derzeit nicht unterstützt."
  - question: "Was passiert, wenn mein Server offline ist?"
    answer: "Der POST schlägt fehl und das Ereignis wird auf dem Gerät geloggt. Eine automatische Retry-Queue gibt es heute nicht; baue deinen Handler idempotent und triggere im Zweifel aus dem Scan-Verlauf neu."
  - question: "Gibt es ein Payload-Größenlimit?"
    answer: "Kein hartes Limit seitens NFC.cool. Die Tag-Payloads selbst sind durch den NFC-Standard begrenzt (wenige KB für typische NDEF-Tags)."
  - question: "Wo kann ich es live sehen?"
    answer: "Klone den <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Web-Server auf GitHub</a>, starte ihn lokal, richte die App darauf - und beobachte, wie die Scans in Echtzeit eintreffen."
