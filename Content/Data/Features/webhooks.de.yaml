faqTitle: "Häufige Fragen"
faq:
  - question: "Funktioniert das auf Android?"
    answer: "Ja - Webhooks sind sowohl in der iOS- als auch in der Android-Version von NFC.cool Tools verfügbar."
  - question: "Können mehrere Endpunkte bei einem Scan ausgelöst werden?"
    answer: "Ja. Jeder aktivierte Webhook erhält das Ereignis unabhängig. Filter-Regeln bestimmen, welche Payloads an welche Endpunkte gehen."
  - question: "Gibt es ein Rate-Limit?"
    answer: "NFC.cool selbst limitiert nicht, aber die meisten Empfänger-Services tun es. Nutze Webhook-Filter, um Endpunkte nicht mit irrelevanten Scans zu fluten."
  - question: "Was passiert, wenn mein Server offline ist?"
    answer: "Fehlgeschlagene POSTs werden lokal auf dem Gerät in die Warteschlange gestellt und mit exponentiellem Backoff wiederholt. Du kannst jeden vergangenen Scan jederzeit aus dem Verlauf manuell erneut senden."

