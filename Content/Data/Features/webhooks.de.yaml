hero:
  title: "Webhooks & Automatisierung"
  subtitle: "Schicke NFC- und QR-Scan-Daten in Echtzeit direkt an deinen eigenen Server. Baue papierlose Workflows, synchronisiere mit CRMs, löse Zapier-Automatisierungen aus. NFC.cool ist der Scanner; die Daten gehören dir."
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/webhook.webp"

capabilitiesTitle: "Was du machen kannst"
capabilities:
  - title: "Scans an jede URL POSTen"
    description: "Konfiguriere einen oder mehrere Webhook-Endpunkte; jeder Scan löst einen HTTP POST mit strukturiertem JSON aus - Payload, Zeitstempel, Tag-UID und jegliche Metadaten, die du angefügt hast."
  - title: "Nach Tag oder Payload filtern"
    description: "Leite bestimmte Tag-UIDs oder Payload-Muster an bestimmte Endpunkte. Ein Tag löst Slack aus; ein anderer aktualisiert dein Inventar-System. Du entscheidest die Logik."
  - title: "Eigene Header & Auth"
    description: "Füge Authorization, X-API-Key oder beliebige eigene Header hinzu. Authentifiziere dich an deinem Service, ohne Secrets gegenüber NFC.cool offenzulegen."
  - title: "Retry & Queue"
    description: "Bei wackliger Verbindung stellt NFC.cool fehlgeschlagene POSTs in eine Warteschlange und versucht es mit exponentiellem Backoff erneut. Dein Scan-Protokoll geht nie verloren."
  - title: "Datenschutz bleibt zuerst"
    description: "NFC.cool sieht die Daten nie, nachdem sie dein Gerät verlassen. Kein NFC.cool-Konto, kein Upload zu unseren Servern, kein Analytics auf deine Scans."

screenshots:
  - path: "/assets/images/Webflow/webhook.webp"
