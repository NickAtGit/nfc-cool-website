specsTitle: "Technische Details"
specs:
  - title: "HTTP-Transport"
    items:
      - "Nur HTTPS (TLS 1.2+)"
      - "POST mit JSON-Body"
      - "Bis zu 32 KB Payload pro Anfrage"
      - "Eigene Header unterstützt"
  - title: "Payload-Format"
    items:
      - "`type`: nfc | qr | barcode"
      - "`payload`: dekodierter Inhalt"
      - "`uid`: Tag-/Code-Identifier"
      - "`timestamp`: ISO 8601"
      - "`device`: optionales Gerätelabel"
  - title: "Zuverlässigkeit"
    items:
      - "Lokale Warteschlange für Offline-Scans"
      - "Exponentieller Retry (max. 5 Versuche)"
      - "Pro-Endpunkt aktivieren/deaktivieren"
      - "Manueller Replay aus dem Verlauf"

