faqTitle: "Questions fréquentes"
faq:
  - question: "Mon iPhone doit-il être déverrouillé pour lire un tag ?"
    answer: "Pour la plupart des scans, non - l'iPhone XS et les modèles plus récents peuvent lire les tags NDEF depuis l'écran verrouillé, en arrière-plan, sans lancer l'app. Sur Android, l'app doit être au premier plan pour lire un tag."
  - question: "Puis-je lire un tag sans connexion internet ?"
    answer: "Oui. Les lectures et écritures NFC se font entièrement sur l'appareil. NFC.cool n'envoie jamais le contenu des tags vers un serveur."
  - question: "Est-il sans risque d'écrire des tags NFC ?"
    answer: "L'écriture est sans risque et réversible par défaut - vous pouvez réécrire un tag autant de fois que vous le souhaitez. N'utilisez la fonction de verrouillage que si vous êtes sûr : une fois un tag verrouillé définitivement, il ne peut plus être réécrit."
  - question: "Quel est le niveau de sécurité de NFC Safe ?"
    answer: "NFC Safe chiffre les contenus en AES-256-GCM, en dérivant la clé de votre phrase secrète via PBKDF2-HMAC-SHA256 sur 100 000 itérations, avec un sel aléatoire de 16 octets et un nonce de 12 octets par enregistrement. Sans la phrase secrète, le contenu du tag est indiscernable d'octets aléatoires."
  - question: "Un même tag NFC Safe fonctionne-t-il sur iOS et Android ?"
    answer: "Oui. Le format est interopérable. Chiffrez sur une plateforme, déchiffrez sur l'autre - même phrase secrète, même contenu."
  - question: "Réinitialiser une tête de brosse Sonicare annule-t-il quelque chose ?"
    answer: "Cela réinitialise le compteur d'usure stocké sur le tag pour que le manche cesse de vous solliciter. La tête de brosse elle-même ne sait pas qu'elle a été réinitialisée ; elle continue simplement de brosser. À vous de juger quand les poils doivent être remplacés."

