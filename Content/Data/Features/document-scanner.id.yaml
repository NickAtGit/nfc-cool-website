faqTitle: "Pertanyaan yang sering diajukan"
faq:
  - question: "Apakah OCR bekerja offline?"
    answer: "Ya. iOS Vision menangani OCR sepenuhnya di perangkat. Anda bisa memindai dan melakukan OCR dokumen di pesawat, di pedalaman, di mana saja."
  - question: "Bahasa apa yang didukung OCR?"
    answer: "iOS Vision saat ini mengenali bahasa Inggris, Prancis, Italia, Jerman, Spanyol, Portugis, dan Mandarin Sederhana. Pengenalan tulisan tangan juga didukung."
  - question: "Seberapa akurat OCR-nya?"
    answer: "Sangat tinggi untuk teks cetak. Akurasi tulisan tangan tergantung pada kerapian dan kontras. Anda dapat mengedit teks yang dikenali setelah pemindaian."
  - question: "Di mana dokumen yang dipindai disimpan?"
    answer: "Tingkat gratis: di sandbox aplikasi pada perangkat. Platinum: secara opsional diekspor otomatis ke iCloud Documents sehingga muncul di aplikasi Files dan di setiap perangkat yang masuk ke iCloud Anda."

