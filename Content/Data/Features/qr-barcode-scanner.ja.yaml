slug: "qr-barcode-scanner"
appStoreURL: "https://apps.apple.com/app/apple-store/id1249686798?pt=106913804&ct=web_ja&mt=8"
backLinkText: "← すべての機能"

hero:
  title: "QR & バーコード・スキャナー"
  subtitle: "QRコードと25種類以上のバーコードを高速バッチモードでスキャン。写真からもQRコードを検出。組み込みのQRコードスタジオでロゴ、Genmoji、ブランドカラーを使ったオリジナルデザインを作れます。"
  platforms: "iOSのみ"
  heroImagePath: "/assets/images/Webflow/qr-barcode.webp"

capabilitiesTitle: "できること"
capabilities:
  - title: "万能QRスキャン"
    description: "URL、vCard、Wi-Fi設定、カレンダーイベント、決済、アプリストアのディープリンク - NFC.coolがペイロードの種類を判定し、最適なアクションを提案します。"
  - title: "主要なバーコード形式すべてに対応"
    description: "EAN-13、UPC-A/E、Code 128、Code 39、ITF、PDF417、Aztec、Data Matrixなどに対応。ウェブ検索や指定の小売業者で商品を検索できます。"
  - title: "写真からQRコードを検出"
    description: "ライブラリのスクリーンショットや写真を選ぶと、NFC.coolが内部のQRコードを検出してデコード - 一部隠れていても認識します。"
  - title: "バッチモード"
    description: "再照準なしで連続してバーコードをスキャン。棚卸し、イベントの受付、図書館アーカイブなどに最適です。"
  - title: "QRコードスタジオ"
    description: "カスタムカラー、丸みのある目パターン、中央のロゴ、iOS 18以降ではGenmojiを使ったQRコードをデザイン。SVGまたは印刷品質のPNGで書き出せます。"

screenshots:
  - path: "/assets/images/Webflow/qr-studio.webp"
    alt: "QRコードスタジオのデザイナー"
  - path: "/assets/images/Webflow/qr-barcode.webp"
    alt: "QRコードまたはバーコードをスキャン"

specsTitle: "対応フォーマット"
specs:
  - title: "2Dコード"
    items:
      - "QRコード(M1–M4)"
      - "Micro QR"
      - "Aztec"
      - "Data Matrix"
      - "PDF417"
  - title: "1Dバーコード"
    items:
      - "EAN-13、EAN-8"
      - "UPC-A、UPC-E"
      - "Code 128、Code 39、Code 93"
      - "Interleaved 2 of 5(ITF)"
      - "Codabar"
  - title: "QRスタジオ書き出し"
    items:
      - "SVG(ベクター)"
      - "PNG 最大4096×4096"
      - "ロゴオーバーレイ 最大30%"
      - "カスタム目形状 & フレーム"

featuredReviewsTitle: "ユーザーの声"
featuredReviews:
  - quote: "自分を売り込む新しい方法に夢中です。ありがとう。"
    author: "Super.Sanchez"
    location: "App Store · 2021年11月"
  - quote: "ダウンロードしたばかりですが、じっくり試す価値があります!"
    author: "User 220220"
    location: "App Store · 2022年11月"

faqTitle: "よくある質問"
faq:
  - question: "なぜiOS限定ですか?"
    answer: "現在のAndroid版NFC.coolはNFCとデジタル名刺に注力しています。QR・バーコード・スキャンはAndroidロードマップに含まれています。"
  - question: "複数のコードを一度にスキャンできますか?"
    answer: "はい - バッチモードはカメラを開いたままにし、見つけたすべてのコードをキューに溜めます。キューの項目をタップすると操作できます。"
  - question: "スタジオで作ったQRコードはすべてのリーダーで読めますか?"
    answer: "はい - 標準のQRコードに装飾スタイルを加えているだけです。標準のQRリーダー(iOSカメラやGoogle Lensを含む)で問題なくデコードできます。"

cta:
  title: "ワンタッチでスキャン & デザイン。"
  buttonText: "iOS版をダウンロード"
