faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿Mi iPhone tiene que estar desbloqueado para leer una etiqueta?"
    answer: "Para la mayoría de los escaneos de etiquetas, no - el iPhone XS y más recientes pueden leer etiquetas NDEF desde la pantalla de bloqueo en segundo plano, sin necesidad de abrir la app. En Android, la app tiene que estar en primer plano para leer una etiqueta."
  - question: "¿Puedo leer una etiqueta sin conexión a internet?"
    answer: "Sí. Las lecturas y grabaciones NFC ocurren por completo en el dispositivo. NFC.cool nunca sube el contenido de las etiquetas a ningún servidor."
  - question: "¿Es seguro grabar etiquetas NFC?"
    answer: "La grabación es segura y reversible por defecto - puedes regrabar una etiqueta tantas veces como quieras. Usa la función de bloqueo solo cuando estés seguro: una vez que una etiqueta queda bloqueada de forma permanente, no se puede regrabar."
  - question: "¿Qué seguridad tiene NFC Safe?"
    answer: "NFC Safe cifra los payloads con AES-256-GCM, derivando la clave de tu frase de contraseña mediante PBKDF2-HMAC-SHA256 a lo largo de 100.000 iteraciones, con un salt aleatorio de 16 bytes y un nonce de 12 bytes por registro. Sin la frase de contraseña, el payload de la etiqueta es indistinguible de bytes aleatorios."
  - question: "¿La misma etiqueta NFC Safe funciona en iOS y en Android?"
    answer: "Sí. El formato es interoperable. Cifra en una plataforma, descifra en la otra - misma frase de contraseña, mismo payload."
  - question: "¿Reiniciar un cabezal Sonicare anula algo?"
    answer: "Reinicia el contador de uso de la etiqueta para que el mango deje de insistirte. El propio cabezal no sabe que se ha reiniciado; simplemente sigue cepillando. Usa tu propio criterio para saber cuándo hay que cambiar las cerdas."

