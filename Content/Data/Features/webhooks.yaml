capabilitiesTitle: "The Five Hooks"
capabilities:
  - title: "Webhook (POST to your URL)"
    description: "HTTP POST with a structured JSON body the moment a scan succeeds. Configure one URL, optional HTTP Basic auth, and you're done. iOS and Android."
  - title: "Shortcut (iOS)"
    description: "When a scanned URL has a `shortcuts://` scheme, run the matching iOS Shortcut automatically - no extra tap. Pipe scan data into anything Shortcuts can reach."
  - title: "Open Links (iOS)"
    description: "When the payload is a regular URL, auto-open it in Safari (or the matching deep-link target). Skip the 'tap to open' step."
  - title: "Speech Synthesis (iOS)"
    description: "Read the scanned payload aloud, hands-free. Configurable speech rate. Useful for accessibility, hands-busy workflows, or just satisfying confirmation."
  - title: "Play Audio (iOS)"
    description: "Play a confirmation sound on scan - your own choice of audio file or one of the built-in tones."

subsectionsTitle: "How the Webhook Works"
subsections:
  - title: "Triggers - NFC, QR, and Barcode"
    body: "<p>Webhooks fire on three event sources: <strong>NFC scans</strong>, <strong>QR scans</strong>, and <strong>barcode scans</strong>. Each source has its own enable/disable toggle, so you can pipe NFC reads into your inventory system without the camera scanner spamming the same endpoint. The webhook itself is the same - one URL, one JSON payload, one POST.</p>"
    platforms: "iOS · Android"

  - title: "Payload Shape"
    body: "<p>Every POST sends a JSON body shaped like this:</p><pre><code>{\n  \"identifier\": \"04:A3:B2:81:C5:6E:80\",\n  \"date\": \"2026-05-15T10:42:18Z\",\n  \"content\": \"https://example.com/product/42\",\n  \"tagType\": \"openPrintTag\",\n  \"structured\": {\n    \"material\": \"PLA\",\n    \"color\": \"#FF6F4C\",\n    \"manufacturer\": \"Prusament\",\n    \"uuid\": \"5e8a-…\"\n  }\n}</code></pre><p><code>identifier</code> is the tag UID or scanned code. <code>date</code> is ISO 8601. <code>content</code> is the decoded payload. <code>tagType</code> and <code>structured</code> are present only for special formats like <a href=\"/features/nfc-reader-writer/\">OpenPrintTag</a> - every other scan omits them.</p>"
    platforms: "iOS · Android"

  - title: "Curl Example"
    body: "<p>Here's what your server receives - the equivalent <code>curl</code> for a plain URL payload:</p><pre><code>curl -X POST https://your-server.example.com/scans \\\n  -H \"Content-Type: application/json\" \\\n  -u \"username:password\" \\\n  -d '{\n    \"identifier\": \"04:A3:B2:81:C5:6E:80\",\n    \"date\": \"2026-05-15T10:42:18Z\",\n    \"content\": \"https://example.com/menu\"\n  }'</code></pre><p>The <code>-u</code> flag matches what NFC.cool sends when you've configured HTTP Basic auth in Settings - username and password are stored encrypted in the iOS Keychain.</p>"
    platforms: "iOS · Android"

  - title: "Reference Server on GitHub"
    body: "<p>The fastest way to see the whole loop end-to-end: <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Web Server on GitHub</a>. A minimal example server that accepts NFC.cool webhook payloads, logs them, and shows the structure live. Clone, run, point your iPhone at it, watch the scans land.</p>"
    platforms: "iOS · Android"

specsTitle: "Technical Details"
specs:
  - title: "Transport"
    items:
      - "HTTPS recommended; HTTP allowed in dev"
