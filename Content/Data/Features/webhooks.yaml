faqTitle: "Frequently Asked"
faq:
  - question: "Does this work on Android?"
    answer: "Yes - webhooks are available on both iOS and Android versions of NFC.cool Tools. The JSON payload shape is the same across platforms. (The other four iOS hooks - auto-Shortcut, speech, audio, link-open - are iOS-only.)"
  - question: "How many URLs can I configure?"
    answer: "One URL today. The same URL receives all scan events, distinguished by the enabled source toggles and the payload type."
  - question: "What authentication is supported?"
    answer: "HTTP Basic auth - username + password, stored encrypted in the iOS Keychain. Bearer tokens, custom headers, and HMAC signing are not currently supported."
  - question: "What happens if my server is offline?"
    answer: "The POST fails and the event is logged on the device. Today there's no automatic retry queue; if your server might be flaky, design your handler to be idempotent on retry and re-trigger from the scan history."
  - question: "Is there a payload-size limit?"
    answer: "No hard limit imposed by NFC.cool. Tag payloads themselves are bounded by the NFC standard (a few KB for typical NDEF tags)."
  - question: "Where can I see it actually working?"
    answer: "Clone the <a href=\"https://github.com/NickAtGit/nfc-cool-webhook-server\">Web Server on GitHub</a>, run it locally, point the app at it, and you'll see every scan arrive in real time."
