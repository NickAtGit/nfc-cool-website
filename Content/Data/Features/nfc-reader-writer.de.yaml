faqTitle: "Häufig gefragt"
faq:
  - question: "Muss mein iPhone entsperrt sein, um einen Tag zu lesen?"
    answer: "Für die meisten Tag-Scans nein - iPhone XS und neuer lesen NDEF-Tags vom Lockscreen im Hintergrund, kein App-Start nötig. Unter Android muss die App im Vordergrund sein, um einen Tag zu lesen."
  - question: "Kann ich einen Tag ohne Internet lesen?"
    answer: "Ja. NFC-Lese- und Schreibvorgänge passieren komplett auf dem Gerät. NFC.cool lädt Tag-Inhalte nie auf einen Server."
  - question: "Ist NFC-Schreiben sicher?"
    answer: "Schreiben ist standardmäßig sicher und reversibel - du kannst einen Tag beliebig oft neu beschreiben. Verwende die Sperr-Funktion nur, wenn du sicher bist: einmal dauerhaft gesperrt, lässt sich der Tag nicht mehr beschreiben."
  - question: "Wie sicher ist NFC Safe?"
    answer: "NFC Safe verschlüsselt Payloads mit AES-256-GCM und leitet den Schlüssel aus deiner Passphrase via PBKDF2-HMAC-SHA256 über 100.000 Iterationen mit 16-Byte-Random-Salt und 12-Byte-Nonce pro Record ab. Ohne Passphrase ist die Payload auf dem Tag von Zufallsbytes nicht zu unterscheiden."
  - question: "Funktioniert derselbe NFC-Safe-Tag auf iOS und Android?"
    answer: "Ja. Das Format ist interoperabel. Auf einer Plattform verschlüsseln, auf der anderen entschlüsseln - gleiche Passphrase, gleiche Payload."
  - question: "Verliert ein Sonicare-Bürstenkopf durch den Reset etwas?"
    answer: "Es setzt den Nutzungs-Zähler im Tag zurück, sodass der Griff aufhört zu mahnen. Der Bürstenkopf selbst weiß nichts vom Reset; er putzt einfach weiter. Wann die Borsten wirklich ausgetauscht werden müssen, entscheidest du."
