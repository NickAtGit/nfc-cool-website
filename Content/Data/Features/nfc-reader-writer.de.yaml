hero:
  title: "NFC lesen & schreiben"
  subtitle: "Lies jeden gängigen NFC-Tag und schreibe über 25 Nachrichtenarten. Verschlüssele Geheimnisse direkt auf dem Tag mit NFC Safe (AES-256-GCM). Sperre und schütze Tags per Passwort, damit niemand sie verändern kann."
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

capabilitiesTitle: "Was du tun kannst"
capabilities:
  - title: "Jeden NDEF-Tag lesen"
    description: "Tippe einen NFC-Tag an und inspiziere seine NDEF-Records - URLs, Kontakte, Klartext, MIME-Daten, App-Starts, benutzerdefinierte Payloads - plus Rohbytes und Tech-Typ."
  - title: "25+ Nachrichtenarten schreiben"
    description: "Websites, Telefonnummern, vCards, WLAN-Daten, PayPal, Cash App & Venmo, Spotify, YouTube, Shortcuts, Instagram, X, LinkedIn, TikTok, WhatsApp und mehr."
  - title: "Sperren & Passwortschutz"
    description: "Mache einen Tag dauerhaft schreibgeschützt oder schütze ihn mit Passwort, sodass nur autorisierte Geräte lesen oder schreiben können. Industrietaugliche Tag-Härtung."
  - title: "Formatieren, Stapel schreiben, klonen"
    description: "Formatiere leere Tags, schreibe dieselbe Payload auf einen ganzen Stapel Tags für Events oder Produkt-Launches, und klone den Inhalt eines Tags auf einen anderen."
  - title: "Aktionen automatisch beim Lesen"
    description: "Starte iOS-Shortcuts, sprich das Ergebnis vor, feuere einen Webhook ab oder öffne Links automatisch beim Tippen. Fünf Hooks, ein Tap."

subsectionsTitle: "Tiefer als jede gewöhnliche NFC-App"
subsections:
  - title: "NFC Safe - Geheimnisse direkt auf dem Tag verschlüsseln"
    body: "<p>Die meisten NFC-Apps behandeln den Tag wie eine Postkarte - jeder mit einem Handy kann ihn lesen. NFC Safe behandelt ihn wie einen versiegelten Umschlag. Dein Geheimnis (ein Passwort, eine Recovery-Phrase, ein Lizenzschlüssel oder beliebiger Text) wird auf deinem Gerät mit AES-256 verschlüsselt, bevor es überhaupt den Tag erreicht. Tag verloren, gestohlen oder einem Fremden in die Hand gedrückt - ohne deine Passphrase ist die Payload nur Rauschen.</p><p>Dieselbe Verschlüsselung funktioniert auf beiden Plattformen: ein Geheimnis auf dem iPhone sperren, auf Android entsperren. Du willst genau wissen, wie verschlüsselt wird? <a href=\"/de/blog/nfc-safe-encrypted-secrets/\">Lies den NFC-Safe-Deep-Dive im Blog</a>.</p>"
    imagePath: "/assets/images/Blog/nfc-safe-encrypted-secrets.webp"
    imageAlt: "NFC Safe verschlüsseltes Geheimnis auf einem Tag"
    platforms: "iOS · Android"

  - title: "NFC-Tap-Zähler - Jeden Tag per ID und Zählerstand verfolgen"
    body: "<p>Manche NFC-Chips zählen ihre eigenen Scans in der Hardware. Der NFC-Tap-Zähler macht sich das zunutze: Er richtet einen Tag so ein, dass dieser bei jedem einzelnen Lesevorgang seinen aktuellen Zählerstand - und/oder seine eindeutige Tag-ID - an das anhängt, was er trägt (eine URL, E-Mail, SMS oder einen Kurzbefehl). Kein Server, kein Internet, kein Backend zu pflegen - der Chip zählt und ersetzt selbst.</p><p>So verrät dir ein einziger Tag, welcher physische Aufkleber angetippt wurde und wie oft, und du kannst darauf reagieren: die ersten 100 Scans auf eine Demo begrenzen, Engagement auf einer Visitenkarte verfolgen oder Echtheit mit einem Zähler nachweisen, der nur nach oben geht. Du willst die ausführliche Anleitung? <a href=\"/de/blog/count-nfc-tag-scans/\">Lies den NFC-Tap-Zähler-Guide im Blog</a>.</p>"
    imagePath: "/assets/images/Blog/count-nfc-tag-scans.webp"
    imageAlt: "Ein NFC-Tag wird von einem Smartphone angetippt, der Zählerstand steigt"
    platforms: "iOS · Android"

  - title: "OpenPrintTag - dein 3D-Drucker-Filament, direkt auf der Spule"
    body: "<p>OpenPrintTag ist ein offener Standard, um Filament-Spulen-Metadaten (Material, Farbe, Hersteller, UUID, Restlänge) in einem kleinen CBOR-codierten NDEF-Record einzubetten. NFC.cool liest und schreibt das Format nativ auf beiden Plattformen - Bambu, Prusa oder jeder Drucker mit angeschlossenem NFC-Reader erkennt deine Spule, sobald sie eingelegt ist. Neu beim Format? <a href=\"/de/blog/openprinttag-read-write-nfc-spools-phone/\">Unser Blog-Guide erklärt das Lesen und Schreiben von OpenPrintTag-Spulen</a>.</p><p>Dasselbe Format speist die strukturierten Webhook-Payloads auf der Seite <a href=\"/de/features/webhooks/\">Webhooks & Automatisierung</a> - ein POST an deine Druck-Farm in dem Moment, in dem eine frische Spule erkannt wird.</p>"
    imagePath: "/assets/images/Blog/openprinttag-read-write-nfc-spools-phone.webp"
    imageAlt: "OpenPrintTag-NFC-Spulen mit dem Handy lesen und schreiben"
    platforms: "iOS · Android"

  - title: "Zahnbürstenkopf zurücksetzen"
    body: "<p>Philips-Sonicare-Bürstenköpfe tragen einen NFC-Tag, der die Nutzung verfolgt, damit dich der Griff zum Austausch mahnt. NFC.cool kann diesen Zähler zurücksetzen - Tag-Zustand lesen, dich durch den Reset führen, neuen Zustand zurückschreiben. Gleich auf beiden Plattformen. (Wir bauen keine Bürstenköpfe; wir geben deinem einfach noch einen Monat Würde.)</p>"
    imagePath: "/assets/images/Blog/reset-sonicare-brush-head-nfc.webp"
    imageAlt: "Philips-Sonicare-Bürstenkopf per NFC zurücksetzen"
    platforms: "iOS · Android"

  - title: "Power-User-Modus"
    body: "<p>Für die, die wirklich wissen wollen, was auf dem Chip steht: NFC.cool dumpt den vollen Tag-Speicher als Hex, erkennt das zugrundeliegende Chip-Modell (NTAG213/215/216, NTAG424 DNA, MIFARE Classic/Ultralight, ISO-15693-Varianten, FeliCa usw.) und meldet Gesamtbytes, User-Bytes, Lock-Pages und Capability-Container. Gebaut für Entwickler, Maker und alle, die einen Tag debuggen.</p><p>Auf iOS geht der <strong>Expert-APDU-Modus</strong> noch tiefer - sende rohe ISO-7816-Kommandos an den Tag und inspiziere die Antworten, wenn du mit einem ungewöhnlichen Reader, einem eigenen Protokoll arbeitest oder einfach wissen willst, was der Chip preisgibt.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-power-user-mode.webp"
    imageAlt: "iPhone analysiert NFC-Tag-Speicher mit Diagnosepanels"
    platforms: "iOS · Android"

  - title: "Kryptowährung per Tap"
    body: "<p>Codiere Bitcoin, Ethereum, Solana, Lightning oder jede Wallet-Adresse als Payment-URI-NDEF-Record. Tippe, um eine statische Wallet auf Konferenzen zu teilen, klebe einen Sticker auf dein Produkt oder gib jemandem eine Metallkarte mit dauerhafter Adresse. Lesen geht reziprok - scanne einen Krypto-Tag und lande direkt im Deeplink deiner Wallet-App.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-cryptocurrency-tap.webp"
    imageAlt: "Krypto-Wallet wird per iPhone und NFC-Tag geteilt"
    platforms: "iOS · Android"

  - title: "WLAN teilen, ohne das Passwort zu tippen"
    body: "<p>Schreibe SSID, Sicherheitstyp und Passwort einmal auf einen Tag. Ab dann verbindet sich jeder, der ihn antippt, mit dem Netz - kein Passwort buchstabieren, kein gekritzelter Zettel im Airbnb. Umgekehrt geht's auch: lies einen fremden WLAN-Tag, und das Betriebssystem fragt dich, ob du beitreten möchtest.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-wifi-onboarding.webp"
    imageAlt: "iPhone verbindet sich per NFC-Tag mit WLAN"
    platforms: "iOS · Android"

  - title: "Vorlesen lassen"
    body: "<p>Für Barrierefreiheit, für Hands-free-Workflows oder einfach, weil's nett ist - aktiviere den Sprachsynthese-Hook, und jede Payload wird beim Tap laut vorgelesen. Sprechgeschwindigkeit ist einstellbar; funktioniert parallel zu VoiceOver und anderen Hilfstechnologien.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-speak-aloud.webp"
    imageAlt: "iPhone liest einen NFC-Tag mit Audiowellen vor"
    platforms: "iOS"

  - title: "Shortcuts & App Intents"
    body: "<p>NFC.cool klinkt sich mit eingebauten Aktionen direkt in die iOS-Kurzbefehle-App ein: den zuletzt gescannten NFC-Tag abrufen, eine Nachricht auf einen Tag schreiben, den Scanner öffnen oder den zuletzt gescannten QR-Code holen. Verkette sie zu Shortcuts, die einen Tag scannen, die Payload parsen und dann tun, was immer du willst - Automatisierung, Logging, Journaling, alles. Dieselben Aktionen treiben den <strong>Scan-Button</strong> auf dem Lockscreen unter iOS 17+ an.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-shortcuts-app-intents.webp"
    imageAlt: "iPhone verbindet NFC-Tag mit Automationsblöcken"
    platforms: "iOS"

  - title: "iCloud-Sync über iPhone, iPad und Mac"
    body: "<p>Scan-Verlauf, NFC-Safe-Einträge und Schreibvorlagen synchronisieren nahtlos über alle Geräte, die mit deiner iCloud angemeldet sind. Tippe einen Tag auf dem iPhone in deiner Tasche, und der Scan ist Sekunden später in der iPad-Bibliothek. NFC.cool <a href=\"/de/blog/nfc-cool-comes-to-mac/\">läuft jetzt auch auf Apple-Silicon-Macs</a>, also taucht dieselbe Bibliothek dort auf.</p>"
    imagePath: "/assets/images/Blog/nfc-cool-comes-to-mac.webp"
    imageAlt: "NFC.cool synchronisiert über iPhone, iPad und Mac"
    platforms: "iOS"

  - title: "CSV-Batch-Write"
    body: "<p>Für ernsthafte NFC-Profis auf iOS: lade eine Tabelle mit Payloads hoch, gib das Handy einer Assistenz und schreibe den ganzen Stapel in einer Session.</p>"
    imagePath: "/assets/images/Features/nfc-reader-writer-csv-batch-write.webp"
    imageAlt: "iPhone beschreibt viele NFC-Tags aus einer Tabelle"
    platforms: "iOS"

