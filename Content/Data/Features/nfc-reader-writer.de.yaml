      - "ISO 14443 A/B, ISO 15693, FeliCa (iOS)"
  - title: "Record-Typen"
    items:
      - "URI (web, mailto, tel, sms, geo, eigene Schemes)"
      - "Text (mit Sprach-Tag)"
      - "vCard / Kontakt"
      - "WLAN-Daten, Bluetooth-Pairing"
      - "Smart Poster (zusammengesetzt)"
      - "App-Start"
      - "Kryptowährungs-Adresse (URI-basiert)"
      - "OpenPrintTag (3D-Drucker-Filament-Metadaten)"
      - "NFC Safe (verschlüsselter External-Type, urn:nfc:ext:crypto)"
      - "MIME, External, Rohbytes"
  - title: "Plattform-Hinweise"
    items:
      - "iOS 16+ (Hintergrund-Tag-Lesen vom Lockscreen ab iPhone XS)"
      - "Android 8.0+ (API 26), Foreground-NFC-Lesen"
      - "Tag-Schreiben unter iOS braucht Core-NFC-Entitlements – in der App eingebaut"
      - "Hintergrund-NFC-Lesen unter Android verlangt, dass die App im Vordergrund ist"

