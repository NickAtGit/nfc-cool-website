faqTitle: "Häufige Fragen"
faq:
  - question: "Muss mein iPhone entsperrt sein, um einen Tag zu lesen?"
    answer: "Für die meisten Scans ja, aber iPhone XS und neuer können NDEF-Tags im Hintergrund vom Sperrbildschirm lesen - ohne App-Start."
  - question: "Kann ich einen Tag ohne Internet lesen?"
    answer: "Ja. NFC-Lesevorgänge passieren komplett auf dem Gerät. NFC.cool überträgt Tag-Inhalte nie an einen Server."
  - question: "Ist das Beschreiben von NFC-Tags sicher?"
    answer: "Das Schreiben ist standardmäßig sicher und reversibel. Nutze die Sperr-Funktion nur, wenn du sicher bist - ein dauerhaft gesperrter Tag kann nicht mehr neu beschrieben werden."

