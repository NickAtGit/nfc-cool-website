hero:
  title: "NFC lesen & schreiben"
  subtitle: "Lies jeden NFC-Tag und schreibe über 25 Nachrichtenarten. Schütze Geheimes mit NFC Safe (256-Bit-AES). Sperre und passwortschütze Tags, damit sie nicht manipuliert werden können."
  platforms: "iOS · Android"
  heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

capabilitiesTitle: "Was du machen kannst"
capabilities:
  - title: "Jeden NDEF-Tag lesen"
    description: "Tippe einen NFC-Tag an, um seine NDEF-Records zu lesen - URLs, Kontakte, Text, MIME-Daten, App-Verknüpfungen, eigene Payloads. Inspiziere Technik-Typen und Roh-Bytes."
  - title: "Über 25 Nachrichtenarten schreiben"
    description: "Webseiten, Telefonnummern, vCards, WLAN-Zugangsdaten, Apple-Pay- und PayPal-Links, Spotify, Apple Music, YouTube, Kurzbefehle, Instagram, X, Threads, LinkedIn, Mastodon - und mehr."
  - title: "NFC Safe (verschlüsselt)"
    description: "Speichere Geheimnisse wie Passwörter oder Wiederherstellungs-Codes auf einem Tag mit 256-Bit-AES-Verschlüsselung. Nur deine Passphrase entschlüsselt - selbst ein gestohlener Tag ist unlesbar."
  - title: "Sperren & Passwortschutz"
    description: "Mache einen Tag schreibgeschützt, damit er nie überschrieben werden kann, oder passwortschütze ihn, damit nur autorisierte Geräte lesen oder schreiben können. Industrietaugliches Tag-Management."
  - title: "Formatieren & Batch-Schreiben"
    description: "Formatiere leere Tags, schreibe denselben Inhalt im Stapel auf viele Tags für Events oder Produkt-Launches und klone den Inhalt eines Tags auf einen anderen."

