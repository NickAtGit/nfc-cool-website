faqTitle: "Häufig gestellte Fragen"
faq:
  - question: "Ist NFC.cool kostenlos?"
    answer: "Ja, NFC.cool Tools und NFC.cool Business Card kannst du kostenlos im App Store und bei Google Play laden. Ein optionales In-App-Abo schaltet NFC Safe (256-Bit-AES-verschlüsselte Geheimnisse), 3D-Scan-Exporte und unbegrenzte Webhooks frei; alles andere bleibt für immer kostenlos."
  - question: "Welche Plattformen werden unterstützt?"
    answer: "NFC.cool Tools läuft auf iPhone, iPad und Android. NFC.cool Business Card gibt es nur fürs iPhone - die Visitenkarten-Funktionen sind auf Android direkt in NFC.cool Tools integriert, sodass du keine zweite App brauchst."
  - question: "Funktioniert NFC.cool offline?"
    answer: "Ja. Tag-Lesen und -Schreiben, QR-Code-Scannen, Barcode-Scannen, Dokumenten-OCR und 3D-Erfassung laufen vollständig auf dem Gerät. Nur optionale Cloud-Funktionen (Webhooks an deinen Server, Push-Benachrichtigungen für Business Card) brauchen Internet."
  - question: "Trackt NFC.cool mich oder verkauft es meine Daten?"
    answer: "Nein. NFC.cool enthält keine Drittanbieter-Analytics, keine Werbe-SDKs, keine Tracking-Pixel. Scan-Daten bleiben auf deinem Gerät, es sei denn du sendest sie selbst an einen Webhook. Crash-Logs laufen über Apples anonyme Diagnose, die du in den iOS-Einstellungen deaktivieren kannst."
  - question: "Welche NFC-Tags funktionieren mit NFC.cool?"
    answer: "Jeder NDEF-konforme NFC-Tag - NTAG213, NTAG215, NTAG216, MIFARE Ultralight, ICODE SLIX und die meisten anderen. NTAG216 ist die empfohlene Standardwahl dank 924 Byte Kapazität und breiter Kompatibilität mit iPhone und Android."
  - question: "Kann NFC.cool QR-Codes und Barcodes scannen?"
    answer: "Ja. NFC.cool Tools scannt jeden gängigen QR-Code plus über 20 Barcode-Formate (EAN, UPC, Code 128, Aztec, PDF417, Data Matrix und mehr) per Kamera in Echtzeit oder aus beliebigen Fotos. Der Batch-Modus hält die Kamera für Inventuren und Event-Check-ins offen."
  - question: "Kann ich NFC-Tags mit meinem iPhone beschreiben?"
    answer: "Ja - jedes iPhone ab dem XS kann NFC-Tags mit NFC.cool Tools beschreiben. Wähle aus über 25 Nachrichtenarten: URLs, WLAN-Zugangsdaten, Kontaktkarten (vCard), iOS-Kurzbefehle, Zahlungen, Social-Profile und mehr. Geheimes vorab mit NFC Safe (256-Bit-AES) verschlüsseln für Tap-to-Unlock-Abläufe."
  - question: "Unterstützt NFC.cool iOS-Kurzbefehle und den Action Button?"
    answer: "Ja. NFC.cool Tools liefert App Intents, native iOS-Kurzbefehl-Aktionen, Sperrbildschirm-Widgets und Action-Button-Hooks. Starte jeden Scan direkt aus dem Kontrollzentrum, vom Homescreen oder von der Apple Watch und verkette Scans zu eigenen Automatisierungen."
  - question: "Wie teilt NFC.cool Business Card meine Karte ohne App?"
    answer: "Per Apple AppClip (sofortige Übertragung ohne Download, Empfänger sehen deine Karte in einem System-Popover), QR-Code, Apple Wallet Pass oder öffentlicher Web-Profil-URL. Empfänger speichern deinen Kontakt mit einem Tipp - sie müssen NFC.cool nicht installieren oder ein Konto anlegen."
  - question: "Ist NFC.cool Open Source?"
    answer: "Die Apps sind nicht Open Source, deine Daten aber portabel. Jeder Scan bleibt standardmäßig auf deinem Gerät; nichts wird an NFC.cool-Server gesendet. Entwickler:innen binden Scan-Daten in ihren Stack ein per Webhooks, App Intents, iOS-Kurzbefehlen oder URL-Schemata - vollständige Referenz auf der Entwickler-Seite."

