faqTitle: "Häufig gestellte Fragen"
faq:
  - question: "Ist NFC.cool kostenlos?"
    answer: "Ja - NFC.cool Tools und NFC.cool Business Card sind kostenlos zum Download verfügbar. NFC-Tags lesen, QR-Codes und Barcodes scannen, Dokumenten-Scan mit OCR sowie 3D- und Raum-Scans sind gratis. Ein optionales Platinum-Abo schaltet NFC Safe (256-Bit-AES-verschlüsselte Geheimnisse) frei; erweiterte NFC-Steuerung (formatieren, mit Passwort schützen, sperren, Batch-Modi, CSV-Schreiben, Expert-Befehle, Tap-Zähler); QR-Power-Funktionen (keine Wasserzeichen, Batch-Lesen); Dokumenten-PDF-Export und Auto-Export nach iCloud; 3D-Flächenberechnung, Modell- und Foto-Export; iOS-Kurzbefehle, Widgets und Kontrollzentrum; Webhooks; Sprachsynthesizer; Premium-App-Icons und -Farben; sowie werbefreie Nutzung mit bevorzugtem Support."
  - question: "Welche Plattformen werden unterstützt?"
    answer: "NFC.cool Tools läuft auf iPhone, iPad und Android. NFC.cool Business Card gibt es nur fürs iPhone - die Visitenkarten-Funktionen sind auf Android direkt in NFC.cool Tools integriert, sodass du keine zweite App brauchst. Auf dem iPad funktionieren alle kamerabasierten Funktionen (QR, Barcode, Dokumenten-, 3D- und Raum-Scan), aber NFC-Lesen und -Schreiben benötigen ein iPhone, da iPads keine NFC-Hardware haben."
  - question: "Wie fange ich mit NFC.cool an?"
    answer: "Lade NFC.cool Tools aus dem App Store oder bei Google Play, dann erkunde die Tabs: NFC zum Lesen und Schreiben von Tags, QR für QR-Codes und Barcodes, Document für Papier-zu-PDF-Scans, 3D für Objekt- und Raum-Erfassung. Kein Konto erforderlich - alles läuft auf dem Gerät."
  - question: "Wie scanne ich meinen ersten NFC-Tag?"
    answer: "Öffne NFC.cool Tools, tippe auf 'NFC lesen' und halte die obere Kante deines iPhones an einen NFC-Tag - NFC.cool öffnet sich danach mit einer geparsten Ansicht des Tag-Inhalts. Außer App-Installation ist kein Setup nötig."
  - question: "Wie beschreibe ich meinen ersten NFC-Tag?"
    answer: "Öffne NFC.cool Tools, wechsle zum NFC-Tab und wähle 'NFC schreiben', wähle eine Nachrichtenart (URL, WLAN-Zugang, Kontaktkarte, iOS-Kurzbefehl und mehr), gib die Daten ein und halte die obere Kante deines iPhones an einen leeren NTAG216 (oder einen anderen NDEF-konformen Tag). Jetzt löst jeder Tipp auf den Tag deine gewählte Aktion aus. NDEF-Tags kannst du bei den Händlern auf der <a href=\"/de/affiliate-links/\">NFC-Tags-Seite</a> kaufen."
  - question: "Funktioniert NFC.cool offline?"
    answer: "Ja. NFC-Tags lesen und schreiben, QR-Code-Scannen, Barcode-Scannen, Dokumenten-OCR und 3D- / Raum-Erfassung laufen vollständig auf dem Gerät. Nur optionale Cloud-Funktionen (Webhooks an deinen Server, iCloud Sync) brauchen Internet."
  - question: "Welche NFC-Tags funktionieren mit NFC.cool?"
    answer: "Jeder NDEF-konforme NFC-Tag - NTAG213, NTAG215, NTAG216, MIFARE Ultralight, ICODE SLIX und die meisten anderen. NTAG216 ist die empfohlene Standardwahl dank 888 Byte Kapazität und breiter Kompatibilität mit iPhone und Android. Auf der <a href=\"/de/affiliate-links/\">NFC-Tags-Seite</a> findest du getestete Händler."
  - question: "Kann NFC.cool QR-Codes und Barcodes scannen?"
    answer: "Ja - 19 Code-Formate werden per iPhone-Kamera oder aus beliebigen Fotos erkannt: 6 zweidimensionale Codes (QR Code, Micro QR, Aztec, Data Matrix, PDF417, Micro PDF417) und 13 lineare Barcodes (EAN-13, EAN-8, UPC-E, Code 39 inkl. Mod 43, Code 93, Code 128, Codabar, Interleaved 2 of 5, ITF-14 plus die drei GS1-DataBar-Varianten). UPC-A wird als EAN-13 mit führender Null gelesen. Der Batch-Modus hält die Kamera für Inventuren und Event-Check-ins offen."
  - question: "Kann ich NFC-Tags mit meinem iPhone beschreiben?"
    answer: "Ja - jedes iPhone ab dem iPhone 7 kann NFC-Tags mit NFC.cool Tools sowohl lesen als auch beschreiben. Wähle aus über 25 Nachrichtenarten: URLs, WLAN-Zugangsdaten, Kontaktkarten (vCard), iOS-Kurzbefehle, Zahlungen, Social-Profile und mehr. Geheimes vorab mit NFC Safe (256-Bit-AES) verschlüsseln für Tap-to-Unlock-Abläufe."
  - question: "Unterstützt NFC.cool iOS-Kurzbefehle und den Action Button?"
    answer: "Ja, im Platinum-Abo. NFC.cool Tools liefert App Intents, native iOS-Kurzbefehl-Aktionen, Sperrbildschirm- und Homescreen-Widgets, Action-Button-Hooks und Quick-Launch im Kontrollzentrum - verkette Scans zu eigenen Automatisierungen oder löse sie per Knopfdruck aus. Die kostenlose Stufe deckt den einfachen Scan-und-Teilen-Ablauf ab; Kurzbefehle, Widgets und Action Button stecken hinter dem optionalen Platinum-Abo."
  - question: "Wie teilt NFC.cool Business Card meine Karte ohne App?"
    answer: "Per Apple AppClip (sofortige Übertragung ohne Download, Empfänger sehen deine Karte in einem System-Popover), QR-Code, Apple Wallet Pass oder öffentlicher Web-Profil-URL. Empfänger speichern deinen Kontakt mit einem Tipp - sie müssen NFC.cool nicht installieren oder ein Konto anlegen."
  - question: "Wie unterscheidet sich NFC.cool von anderen NFC-Apps?"
    answer: "Die meisten NFC-Apps konzentrieren sich entweder aufs Lesen oder aufs Schreiben - NFC.cool Tools kann beides, plus QR-Codes, Barcodes, Dokumenten-OCR, 3D-Erfassung und Raum-Scans in einer einzigen App. Drei weitere Unterschiede: Datenschutz (Scan-Daten bleiben auf dem Gerät und werden nie an NFC.cool-Server gesendet); tiefe iOS-Integration (App Intents, Kurzbefehle, Sperrbildschirm-Widgets, Action Button, Webhooks), sodass Scans deine eigenen Automatisierungen auslösen statt in der App eingeschlossen zu bleiben; und aktiver Solo-Entwickler-Support - der Entwickler liest jede E-Mail persönlich und liefert Fixes innerhalb weniger Tage."

