appStoreReviewsTitle: "Was unsere Nutzer sagen"
appStoreReviews:
  - quote: "Wunderschöne UX und nahezu makellose Umsetzung — im Gegensatz zu anderen NFC-Apps."
    author: "garretthoyos"
    location: "App Store · USA"
  - quote: "Der Raum-Mapper ist ziemlich genial. Diese App kann so viel mehr als nur Tags zu schreiben."
    author: "rockphikapps"
    location: "App Store · USA"
  - quote: "Wunderbar geschrieben und voller Funktionen. Hatte Fragen — der Entwickler antwortete sofort. Ich lerne immer noch jede einzelne kennen."
    author: "PhotoBomber_69"
    location: "App Store · USA"
  - quote: "Ich schickte eine Beschwerde — und bekam eine persönliche E-Mail vom Entwickler. Innerhalb einer Woche war mein Fix in der App. Heute eine Seltenheit."
    author: "LGLB"
    location: "App Store · USA"
  - quote: "Fünf Sterne allein für das Engagement des Entwicklers. Regelmäßige Updates, dediziert, geduldig mit Anfängern."
    author: "HellRazorCustoms"
    location: "App Store · USA"
  - quote: "Ich LIEBE diese App. Perfekt für Leute wie mich, die fast nichts über NFC-Tags wissen!"
    author: "Dallasg479"
    location: "App Store · USA"
  - quote: "Gerade heruntergeladen — definitiv wert, sich Zeit zu nehmen und sie auszuprobieren!"
    author: "User 220220"
    location: "App Store · USA"
  - quote: "Ich liebe meine neue Art, mich selbst zu präsentieren. Danke euch!"
    author: "Super.Sanchez"
    location: "App Store · USA"
  - quote: "Zu Anfang dachte ich, es sei eine 0815 NFC-Tag-App. Nach ein bisschen Spielen: genial, was man alles automatisieren und organisieren kann. Allein die Tresor-Funktion…"
    author: "EBBEElbi"
    location: "App Store · Deutschland"
  - quote: "Ich bin kein Fan von Abo-Apps — diese ist es wert. Seit Jahren mein bevorzugter NFC-Reader, mittlerweile ein echter Allrounder."
    author: "Warum_sind_alle_Namen_weg?"
    location: "App Store · Deutschland"
  - quote: "Wer der Zeit voraus sein und minimalistisch leben möchte, dem kann ich diese App nur empfehlen."
    author: "HPS. h"
    location: "App Store · Japan"
  - quote: "Der Modus, der nach jedem erkannten Tag weiter scannt, ohne unterbrochen zu werden, ist wirklich praktisch."
    author: "com1038"
    location: "App Store · Japan"

