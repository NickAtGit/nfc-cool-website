hero:
  title: "Der All-in-One-Scanner für dein Smartphone"
  subtitle: "Scanne NFC-Tags, QR-Codes, Barcodes, Dokumente, 3D-Modelle und Räume!"

heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

featuresTitle: "Alles, was du zum Scannen brauchst"
features:
  - title: "NFC lesen & schreiben"
    description: "Lies jeden NFC-Tag und schreibe über 25 Nachrichtenarten - Links, WLAN, Kontakte, Zahlungen, Shortcuts, Social-Profile. Schütze Geheimes mit NFC Safe (256-Bit-AES-Verschlüsselung)."
    imagePath: "/assets/images/Webflow/nfc-card.webp"
    platforms: "iOS · Android"
    slug: "nfc-reader-writer"
  - title: "QR-Code-Scannen & Studio"
    description: "Scanne QR-Codes per Kamera oder erkenne sie in jedem Foto. Gestalte eigene mit Logos, Markenfarben und Genmoji im integrierten QR Code Studio."
    imagePath: "/assets/images/Webflow/qr-studio.webp"
    platforms: "Nur iOS"
    slug: "qr-scanner"
  - title: "Barcode-Scannen"
    description: "Scanne EAN, UPC, Code 128, PDF417, Aztec, Data Matrix und über 20 weitere Formate. Der Batch-Modus hält die Kamera für Inventur und Event-Check-ins offen."
    imagePath: "/assets/images/Webflow/qr-barcode.webp"
    platforms: "Nur iOS"
    slug: "barcode-scanner"
  - title: "Dokumenten-Scan mit OCR"
    description: "Erfasse Dokumente mit automatischer Kantenerkennung und On-Device-OCR. Speichere sie als durchsuchbare PDFs."
    imagePath: "/assets/images/Webflow/document-scan.webp"
    platforms: "Nur iOS"
    slug: "document-scanner"
  - title: "3D-Objektscan"
    description: "Photogrammetrie-basierte Erfassung realer Objekte. Umrunde sie, mache 30-100 Aufnahmen, erhalte ein texturiertes 3D-Modell. Export nach USDZ, OBJ, STL, PLY für AR oder 3D-Druck."
    imagePath: "/assets/images/Webflow/3d-object.webp"
    platforms: "Nur iOS"
    slug: "3d-object-scanner"
  - title: "Raumscan"
    description: "LiDAR-gestützte Grundrisse mit automatischer Erkennung von Türen, Fenstern und Möbeln. Benötigt iPhone mit LiDAR (12 Pro und neuer) oder neueres iPad Pro."
    imagePath: "/assets/images/Webflow/scan-room.webp"
    platforms: "Nur iOS"
    slug: "room-scanner"
  - title: "Webhooks & Automatisierung"
    description: "Sende NFC- und QR-Scan-Daten in Echtzeit an deinen eigenen Server. Automatisiere Workflows, binde CRMs an, baue papierlose Prozesse - deine Daten erreichen unsere Server nie."
    imagePath: "/assets/images/Webflow/webhook.webp"
    platforms: "iOS · Android"
    slug: "webhooks"
  - title: "Kurzbefehle & Widgets"
    description: "iOS-Kurzbefehle, Sperrbildschirm-Widgets, Action-Button-Hooks. Starte einen Scan direkt vom Homescreen oder Kontrollzentrum."
    imagePath: "/assets/images/Tools-iOS/Screenshot-4.webp"
    platforms: "Nur iOS"

