hero:
  title: "The All-in-one Scanner for your Smartphone"
  subtitle: "Scan NFC Tags, QR Codes, Barcodes, Documents, 3D Models and Rooms!"

heroImagePath: "/assets/images/Webflow/nfc-scan-tag.webp"

featuresTitle: "Everything you need to scan"
features:
  - title: "NFC Reading & Writing"
    description: "Read any NFC tag and write 25+ message types - links, Wi-Fi, contacts, payments, shortcuts, social profiles. Encrypt secrets with NFC Safe (256-bit AES)."
    imagePath: "/assets/images/Webflow/nfc-card.webp"
    platforms: "iOS · Android"
    slug: "nfc-reader-writer"
  - title: "QR Code Scanning & Studio"
    description: "Scan QR codes from the camera or pick them out of any photo. Design your own with logos, custom colors, and Genmoji in the built-in QR Code Studio."
    imagePath: "/assets/images/Webflow/qr-studio.webp"
    platforms: "iOS only"
    slug: "qr-scanner"
  - title: "Barcode Scanning"
    description: "Scan EAN, UPC, Code 128, PDF417, Aztec, Data Matrix and 20+ more formats. Batch mode keeps the camera open for inventory counts and event check-ins."
    imagePath: "/assets/images/Webflow/qr-barcode.webp"
    platforms: "iOS only"
    slug: "barcode-scanner"
  - title: "Document Scanning with OCR"
    description: "Capture documents with automatic edge detection and on-device OCR. Save as searchable PDFs."
    imagePath: "/assets/images/Webflow/document-scan.webp"
    platforms: "iOS only"
    slug: "document-scanner"
  - title: "3D Object Scanning"
    description: "Photogrammetry-based capture of real-world objects. Walk around, snap 30-100 photos, get a textured 3D model. Export to USDZ, OBJ, STL, PLY for AR or 3D printing."
    imagePath: "/assets/images/Webflow/3d-object.webp"
    platforms: "iOS only"
    slug: "3d-object-scanner"
  - title: "Room Scanning"
    description: "LiDAR-powered floor plans with automatic detection of doors, windows, and furniture. Requires iPhone with LiDAR (12 Pro and newer) or recent iPad Pro."
    imagePath: "/assets/images/Webflow/scan-room.webp"
    platforms: "iOS only"
    slug: "room-scanner"
  - title: "Webhooks & Automation"
    description: "Send scanned NFC and QR data to your own server in real time. Automate workflows, plug into CRMs, build paperless processes - your data never touches our servers."
    imagePath: "/assets/images/Webflow/webhook.webp"
    platforms: "iOS · Android"
    slug: "webhooks"
  - title: "Shortcuts & Widgets"
    description: "iOS Shortcuts, lock-screen widgets, Action Button hooks. Quick-launch a scan from home screen or Control Center."
    imagePath: "/assets/images/Tools-iOS/Screenshot-4.webp"
    platforms: "iOS only"

featureBanner:
  title: "NFC.cool Business Card"
  subtitle: "A dedicated Digital Business Card app for iPhone - share via NFC tap, QR code, AppClip, or Apple Wallet. Track who saves your card, organize leads, and switch on Conference Mode for live events. On Android, the same features are bundled inside NFC.cool Tools."
  imagePath: "/assets/images/BusinessCard/02BusinessCardTop.webp"
  # iOS: dedicated NFC.cool Business Card app (App Store id 6502926572)
  appStoreURL: "https://apps.apple.com/app/apple-store/id6502926572?pt=106913804&ct=BusinessCardBanner&mt=8"
  # Android: business card features are bundled in NFC.cool Tools
  googlePlayURL: "https://play.google.com/store/apps/details?id=cool.nfc&referrer=utm_source%3Dwebsite%26utm_campaign%3Dbusiness_card_banner"

appStoreReviewsTitle: "What people are saying"
appStoreReviews:
  - quote: "Beautiful UX and nearly flawless execution unlike the other NFC apps."
    author: "garretthoyos"
    location: "App Store · United States"
  - quote: "The room mapper is pretty awesome. This app does so much more than write tags."
    author: "rockphikapps"
    location: "App Store · United States"
  - quote: "Beautifully written and packed with features. I had questions and the developer responded immediately. I'm still learning every one of them."
    author: "PhotoBomber_69"
    location: "App Store · United States"
  - quote: "I sent in a gripe and got a personal email from the developer. Within a week the app was updated with my fix - shocking nowadays."
    author: "LGLB"
    location: "App Store · United States"
  - quote: "Five stars for the developer's commitment alone. Frequent updates, dedicated, patient with beginners."
    author: "HellRazorCustoms"
    location: "App Store · United States"
  - quote: "I LOVE THIS APP. Awesome for people like me who know little to nothing about NFC tags!"
    author: "Dallasg479"
    location: "App Store · United States"
  - quote: "Just downloaded it and it's definitely worth the time to explore and try out!"
    author: "User 220220"
    location: "App Store · United States"
  - quote: "I'm loving my new way of promoting myself. Thanks to you guys."
    author: "Super.Sanchez"
    location: "App Store · United States"
  - quote: "Didn't realise at first how much this app can do - I thought it was a generic NFC reader. After a while: the automation and organisation are genius. The Safe alone…"
    author: "EBBEElbi"
    location: "App Store · Germany"
  - quote: "I'm no fan of subscription apps - few are worth it. This one is. Years as my go-to NFC reader, now a true all-rounder."
    author: "Warum_sind_alle_Namen_weg?"
    location: "App Store · Germany"
  - quote: "If you like staying ahead of the time and minimalist lifestyle, I would recommend this app."
    author: "HPS. h"
    location: "App Store · Japan"
  - quote: "The continuous-read mode that keeps scanning every time a tag is detected is genuinely useful."
    author: "com1038"
    location: "App Store · Japan"

