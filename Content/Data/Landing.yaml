faq:
  - question: "What NFC tags are supported?"
    answer: "NFC.cool supports all NFC tag types — NTAG213, NTAG215, NTAG216, MIFARE, and more. Read and write any tag with your iPhone."
  - question: "Can I create QR codes?"
    answer: "Yes! The built-in QR Code Studio lets you create custom QR codes for URLs, Wi-Fi, vCards, and more — with colors, logos, and multiple export formats."
  - question: "Is 3D scanning available on all devices?"
    answer: "3D object scanning works on all iPhones. Room scanning with LiDAR requires iPhone 12 Pro or later, iPad Pro, or iPad Air with LiDAR sensor."
  - question: "What's included in the free version?"
    answer: "Reading NFC tags, scanning QR codes & barcodes, and basic document scanning are all free. Writing NFC tags, advanced features, and 3D export require a Platinum subscription."
  - question: "Is my data private?"
    answer: "Absolutely. NFC.cool stores everything locally on your device. No accounts, no cloud, no tracking. Your data stays yours."

cta:
  title: "Ready to Scan the World?"
  buttonText: "Download Free"