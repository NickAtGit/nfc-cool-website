faqTitle: "Frequently asked"
faq:
  - question: "Does my phone have NFC?"
    answer: "All iPhones from iPhone 7 onward have NFC, and iPhone XS and newer can read tags from the lock screen without launching an app. On Android, most phones from 2015 onward have NFC - check your device specs. NFC.cool will tell you on first launch if your device isn't compatible."
  - question: "What's the difference between iOS and Android?"
    answer: "The iPhone app is a full scanning toolkit - NFC, QR & Barcodes, Documents (with OCR), 3D and Room Scanning. The Android app focuses on NFC reading and writing and includes the Digital Business Card features. The other tools are on the Android roadmap."
  - question: "Is the Digital Business Card a separate app?"
    answer: "On iPhone, yes - NFC.cool Business Card Maker is a dedicated app available at business-card.nfc.cool. On Android, the same Business Card features are included inside NFC.cool Tools - no extra install needed."
  - question: "Which NFC tags should I buy?"
    answer: "For iPhone, NTAG-series Type 2 tags (NTAG213/215/216) work best. NFC.cool supports the full NFC Forum spec (Types 1–5) including MIFARE Classic, MIFARE Ultralight, MIFARE DESFire, ISO 14443, ISO 15693, and FeliCa. Avoid extremely cheap stickers - antenna quality matters."
  - question: "Do I need a special iPhone for 3D and Room Scanning?"
    answer: "Room scanning uses Apple's LiDAR sensor - that's iPhone 12 Pro and newer Pro models, plus iPad Pro 2020 and later. Photogrammetry-based 3D object scanning runs on any iPhone with iOS 17 and enough compute (basically any 2020+ device)."
  - question: "Are the apps free?"
    answer: "Yes - both apps are free on the App Store and Google Play, with no ads. Some advanced workflows may be unlockable inside the apps, but the core NFC, QR, document, 3D, and Business Card features are free."
  - question: "Where is my data stored?"
    answer: "By default, everything stays on your device - scans, written tags, contacts, documents, 3D models. Nothing is uploaded to NFC.cool. You can opt in to webhooks if you want to forward scan data to your own server; even then NFC.cool never sees the data."
  - question: "Can businesses use NFC.cool?"
    answer: "Yes - webhooks let teams pipe NFC and QR scans straight into their own backends, CRMs, or automation tools (Zapier, n8n, Make). There's no NFC.cool account or upload involved, so your data never crosses our servers. For NFC tag campaigns at scale or custom branding, email hello@nfc.cool."
  - question: "Is it GDPR-compliant?"
    answer: "The apps process data on-device, so there's no transfer of personal data to NFC.cool in the default mode. The website itself is cookie-free. The newsletter (Mailjet) is the only third-party data flow, and the form is self-hosted so no cookies are set on visit. See the Privacy policy for the full breakdown."
  - question: "Which OCR languages are supported?"
    answer: "Document Scanning uses Apple's Vision framework, which currently recognizes English, French, Italian, German, Spanish, Portuguese, and Simplified Chinese. Handwriting recognition is supported on iOS 16 and later."
  - question: "Is there a Mac, iPad, or Apple Watch version?"
    answer: "iPad Pro models with LiDAR can run the iPhone app and use the full 3D and Room Scanning toolset. There's no dedicated Mac or Apple Watch app today; the Business Card AppClip works on both Apple Watch and Mac via Continuity."
  - question: "How do I report a bug or request a feature?"
    answer: "Drop a note at hello@nfc.cool - every suggestion is logged and directly informs the roadmap. We typically respond within a day."

