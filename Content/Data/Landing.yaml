faqTitle: "Frequently asked questions"
faq:
  - question: "Is NFC.cool free?"
    answer: "Yes, NFC.cool Tools and NFC.cool Business Card are free to download on the App Store and Google Play. An optional in-app subscription unlocks NFC Safe (256-bit AES secret storage), 3D-scan exports, and unlimited webhooks; everything else is free forever."
  - question: "Which platforms are supported?"
    answer: "NFC.cool Tools runs on iPhone, iPad, and Android. NFC.cool Business Card is iPhone-only - its features are bundled into NFC.cool Tools on Android, so Android users get the same digital business card capabilities without installing a second app."
  - question: "Does NFC.cool work offline?"
    answer: "Yes. Tag reading and writing, QR code scanning, barcode scanning, document OCR, and 3D capture all run entirely on-device. Only optional cloud features (webhooks to your server, push notifications for Business Card lead capture) need the internet."
  - question: "Does NFC.cool track me or sell my data?"
    answer: "No. NFC.cool ships no third-party analytics, no advertising SDKs, no tracking pixels. Scan data stays on your device unless you explicitly send it to your own webhook. Crash logs are Apple's anonymous Diagnostics & Usage, which you can opt out of in iOS Settings."
  - question: "Which NFC tags work with NFC.cool?"
    answer: "Any NDEF-compliant NFC tag - NTAG213, NTAG215, NTAG216, MIFARE Ultralight, ICODE SLIX, and most others. NTAG216 is the recommended default for general use thanks to its 924-byte capacity and broad compatibility with iPhone and Android."
  - question: "Can NFC.cool scan QR codes and barcodes?"
    answer: "Yes. NFC.cool Tools scans every common QR code variant plus 20+ barcode formats (EAN, UPC, Code 128, Aztec, PDF417, Data Matrix, and more) using your camera in real time or from any photo in your library. Batch mode keeps the camera open for inventory counts and event check-ins."
  - question: "Can I write NFC tags with my iPhone?"
    answer: "Yes - every iPhone from XS onwards can write NFC tags using NFC.cool Tools. Choose from 25+ message types: URLs, Wi-Fi credentials, contact cards (vCard), iOS Shortcuts, payments, social profiles, and more. Encrypt secrets first with NFC Safe (256-bit AES) for tap-to-unlock workflows."
  - question: "Does NFC.cool support iOS Shortcuts and the Action Button?"
    answer: "Yes. NFC.cool Tools ships App Intents, native iOS Shortcuts actions, lock-screen widgets, and Action Button hooks. You can quick-launch any scan from Control Center, the home screen, or your Apple Watch, and chain scans into custom automations."
  - question: "How does NFC.cool Business Card share my card without an app?"
    answer: "Through Apple AppClip (instant share with no download, recipients see your card in a system popover), QR code, Apple Wallet pass, or a public web profile URL. Recipients save your contact to their phone in one tap - they don't need to install NFC.cool or create an account."
  - question: "Is NFC.cool open-source?"
    answer: "The apps are closed-source but data-portable. Every scan stays on your device; nothing is sent to NFC.cool servers by default. Developers can hook scan output into their own stack via webhooks, App Intents, iOS Shortcuts, or URL schemes - see the Developers page for the full integration reference."

