  - title: "QR & Barcode Scanner"
    description: "Scan any QR code or barcode instantly. Create custom QR codes with the built-in studio."
    imagePath: "/assets/theme/images/qr.svg"
    url: "/qr-barcode-scanner/"
  - title: "Document Scanner"
    description: "Go paperless — scan, sign, and share documents with professional quality."
    imagePath: "/assets/theme/images/document.svg"
    url: "/document-scanner/"
  - title: "3D Object & Room Scanner"
    description: "Create high-quality 3D models of objects and entire rooms with LiDAR support."
    imagePath: "/assets/theme/images/3d.svg"
    url: "/3d-room-scanner/"

pricing:
  title: "Simple Pricing"
  subtitle: "Start free, upgrade when you're ready"
  ctaText: "Get Started"
  tiers:
    - name: "Free"
      monthlyPrice: "$0"
      features: ["NFC tag reading", "QR & barcode scanning", "Basic document scanning"]
    - name: "Platinum"
      badge: "Most Popular"
