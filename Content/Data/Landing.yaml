faqTitle: "Frequently asked questions"
faq:
  - question: "Is NFC.cool free?"
    answer: "Yes - NFC.cool Tools and NFC.cool Business Card are free to download. Reading NFC tags, scanning QR codes and barcodes, document scanning with OCR, and 3D / room scanning are all free. An optional Platinum subscription unlocks NFC Safe (256-bit AES encrypted secrets); advanced NFC controls (format, password protect, lock, batch modes, CSV write, expert commands, tap counter); QR power features (no watermarks, batch read); document PDF export and auto-export to iCloud; 3D area calculation, model export and photo export; iOS Shortcuts, widgets and Control Center; webhooks; speech synthesizer; premium app icons and colors; and ad-free, priority support."
  - question: "Which platforms are supported?"
    answer: "NFC.cool Tools runs on iPhone, iPad, and Android. NFC.cool Business Card is iPhone-only - its features are bundled into NFC.cool Tools on Android, so Android users get the same digital business card capabilities without installing a second app. On iPad, all camera-based features (QR, barcode, document, 3D, room scanning) work, but NFC reading and writing require an iPhone since iPads don't ship with NFC hardware."
  - question: "How do I get started with NFC.cool?"
    answer: "Download NFC.cool Tools from the App Store or Google Play, then explore the tabs: NFC for tag reading and writing, QR for QR codes and barcodes, Document for paper-to-PDF scanning, 3D for object and room capture. No account is required - everything runs on-device."
  - question: "How do I scan my first NFC tag?"
    answer: "Open NFC.cool Tools, tap \"Read NFC\" and hold your iPhone's top edge against an NFC tag - NFC.cool then opens with a parsed view of the tag's content. No setup beyond installing the app. On an Android phone you can also try it right away with the <a href=\"/online-nfc-reader/\">online NFC reader</a> - no install required."
  - question: "How do I write my first NFC tag?"
    answer: "Open NFC.cool Tools, switch to the NFC tab and choose \"Write NFC\", pick a message type (URL, Wi-Fi credential, contact card, iOS Shortcut, and more), enter the data, then tap your iPhone's top edge against a blank NTAG216 (or other NDEF-compliant tag). Now anyone tapping that tag triggers your chosen action. Buy NDEF tags from any of the retailers on the <a href=\"/affiliate-links/\">NFC Tags page</a>."
  - question: "Does NFC.cool work offline?"
    answer: "Yes. NFC tag reading and writing, QR code scanning, barcode scanning, document OCR, and 3D / room capture all run entirely on-device. Only optional cloud features (webhooks to your server, iCloud Sync) need the internet."
  - question: "Which NFC tags work with NFC.cool?"
    answer: "Any NDEF-compliant NFC tag - NTAG213, NTAG215, NTAG216, MIFARE Ultralight, ICODE SLIX, and most others. NTAG216 is the recommended default for general use thanks to its 888-byte capacity and broad compatibility with iPhone and Android. See the <a href=\"/affiliate-links/\">NFC Tags page</a> for tested retailers."
  - question: "Can NFC.cool scan QR codes and barcodes?"
    answer: "Yes - 19 code formats are recognized from the iPhone camera or any photo in your library: 6 two-dimensional codes (QR Code, Micro QR, Aztec, Data Matrix, PDF417, Micro PDF417) and 13 linear barcodes (EAN-13, EAN-8, UPC-E, Code 39 incl. Mod 43, Code 93, Code 128, Codabar, Interleaved 2 of 5, ITF-14, plus the three GS1 DataBar variants). UPC-A is read as EAN-13 with a leading zero. Batch mode keeps the camera open for inventory counts and event check-ins."
  - question: "Can I write NFC tags with my iPhone?"
    answer: "Yes - every iPhone from iPhone 7 onwards can both read and write NFC tags using NFC.cool Tools. Choose from 25+ message types: URLs, Wi-Fi credentials, contact cards (vCard), iOS Shortcuts, payments, social profiles, and more. Encrypt secrets first with NFC Safe (256-bit AES) for tap-to-unlock workflows."
  - question: "Does NFC.cool support iOS Shortcuts and the Action Button?"
    answer: "Yes, on the Platinum tier. NFC.cool Tools ships App Intents, native iOS Shortcuts actions, lock-screen and home-screen widgets, Action Button hooks, and Control Center quick-launch - chain scans into your own automations or trigger them with one button. The free tier covers the basic scan-and-share flow; the Shortcuts / widgets / Action Button surface lives behind the optional Platinum subscription."
  - question: "How does NFC.cool Business Card share my card without an app?"
    answer: "Through Apple AppClip (instant share with no download, recipients see your card in a system popover), QR code, Apple Wallet pass, or a public web profile URL. Recipients save your contact to their phone in one tap - they don't need to install NFC.cool or create an account."
  - question: "How is NFC.cool different from other NFC apps?"
    answer: "Most NFC apps focus on either reading or writing - NFC.cool Tools does both, plus QR codes, barcodes, document OCR, 3D capture, and room scanning in a single app. Three other differentiators: privacy (scan data stays on-device, never sent to NFC.cool servers); deep iOS integration (App Intents, Shortcuts, lock-screen widgets, Action Button, webhooks) so scans trigger your own automations rather than being trapped inside the app; and active solo-developer support - the developer reads every email personally and ships fixes within days."

