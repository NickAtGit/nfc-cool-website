faqTitle: "Preguntas frecuentes"
faq:
  - question: "¿NFC.cool es gratis?"
    answer: "Sí - NFC.cool Tools y NFC.cool Business Card se descargan gratis. Leer etiquetas NFC, escanear códigos QR y de barras, escanear documentos con OCR y el escaneo 3D / de habitaciones son todos gratis. Una suscripción Platinum opcional desbloquea NFC Safe (secretos cifrados con AES de 256 bits); controles NFC avanzados (formatear, proteger con contraseña, bloquear, modos por lotes, escritura CSV, comandos de experto, contador de toques); funciones avanzadas de QR (sin marcas de agua, lectura por lotes); exportación de documentos a PDF y exportación automática a iCloud; cálculo de área 3D, exportación de modelos y exportación de fotos; Atajos de iOS, widgets y Centro de Control; webhooks; sintetizador de voz; iconos y colores premium de la app; y sin anuncios, con soporte prioritario."
  - question: "¿Qué plataformas son compatibles?"
    answer: "NFC.cool Tools funciona en iPhone, iPad y Android. NFC.cool Business Card es exclusivo de iPhone - sus funciones vienen incluidas en NFC.cool Tools en Android, así que los usuarios de Android disfrutan de las mismas posibilidades de tarjeta de visita digital sin instalar una segunda app. En iPad, todas las funciones basadas en la cámara (QR, códigos de barras, documentos, 3D, habitaciones) funcionan, pero leer y escribir NFC requieren un iPhone, ya que los iPad no incorporan hardware NFC."
  - question: "¿Cómo empiezo a usar NFC.cool?"
    answer: "Descarga NFC.cool Tools desde la App Store o Google Play y luego explora las pestañas: NFC para leer y escribir etiquetas, QR para códigos QR y de barras, Documento para escanear papel a PDF, 3D para captura de objetos y habitaciones. No hace falta cuenta - todo funciona en el dispositivo."
  - question: "¿Cómo escaneo mi primera etiqueta NFC?"
    answer: "Abre NFC.cool Tools, toca \"Leer NFC\" y acerca el borde superior de tu iPhone a una etiqueta NFC - NFC.cool se abre entonces con una vista analizada del contenido de la etiqueta. No hay más configuración que instalar la app. En un móvil Android también puedes probarlo al momento con el <a href=\"/online-nfc-reader/\">lector NFC online</a> - sin instalar nada."
  - question: "¿Cómo escribo mi primera etiqueta NFC?"
    answer: "Abre NFC.cool Tools, cambia a la pestaña NFC y elige \"Escribir NFC\", selecciona un tipo de mensaje (URL, credencial Wi-Fi, tarjeta de contacto, Atajo de iOS y mucho más), introduce los datos y luego acerca el borde superior de tu iPhone a una NTAG216 en blanco (u otra etiqueta compatible con NDEF). Ahora cualquiera que toque esa etiqueta activa la acción que elijas. Compra etiquetas NDEF en cualquiera de las tiendas de la <a href=\"/affiliate-links/\">página de etiquetas NFC</a>."
  - question: "¿NFC.cool funciona sin conexión?"
    answer: "Sí. Leer y escribir etiquetas NFC, escanear códigos QR, escanear códigos de barras, el OCR de documentos y la captura 3D / de habitaciones funcionan todos enteramente en el dispositivo. Solo las funciones opcionales en la nube (webhooks a tu servidor, Sincronización con iCloud) necesitan internet."
  - question: "¿Qué etiquetas NFC funcionan con NFC.cool?"
    answer: "Cualquier etiqueta NFC compatible con NDEF - NTAG213, NTAG215, NTAG216, MIFARE Ultralight, ICODE SLIX y la mayoría de las demás. La NTAG216 es la opción recomendada por defecto para uso general, gracias a su capacidad de 888 bytes y su amplia compatibilidad con iPhone y Android. Consulta la <a href=\"/affiliate-links/\">página de etiquetas NFC</a> para ver tiendas probadas."
  - question: "¿NFC.cool puede escanear códigos QR y de barras?"
    answer: "Sí - se reconocen 19 formatos de código desde la cámara del iPhone o desde cualquier foto de tu galería: 6 códigos bidimensionales (Código QR, Micro QR, Aztec, Data Matrix, PDF417, Micro PDF417) y 13 códigos de barras lineales (EAN-13, EAN-8, UPC-E, Code 39 incl. Mod 43, Code 93, Code 128, Codabar, Interleaved 2 of 5, ITF-14, más las tres variantes GS1 DataBar). El UPC-A se lee como EAN-13 con un cero delante. El modo por lotes mantiene la cámara abierta para recuentos de inventario y registros de entrada en eventos."
  - question: "¿Puedo escribir etiquetas NFC con mi iPhone?"
    answer: "Sí - todos los iPhone a partir del iPhone 7 pueden leer y escribir etiquetas NFC con NFC.cool Tools. Elige entre más de 25 tipos de mensaje: URL, credenciales Wi-Fi, tarjetas de contacto (vCard), Atajos de iOS, pagos, perfiles sociales y mucho más. Cifra primero los secretos con NFC Safe (AES de 256 bits) para flujos de desbloqueo con un toque."
  - question: "¿NFC.cool admite los Atajos de iOS y el botón de acción?"
    answer: "Sí, en el nivel Platinum. NFC.cool Tools incluye App Intents, acciones nativas de los Atajos de iOS, widgets en la pantalla de bloqueo y la pantalla de inicio, integraciones con el botón de acción y lanzamiento rápido desde el Centro de Control - encadena escaneos en tus propias automatizaciones o actívalos con un solo botón. El nivel gratis cubre el flujo básico de escanear y compartir; la parte de Atajos / widgets / botón de acción vive tras la suscripción Platinum opcional."
  - question: "¿Cómo comparte NFC.cool Business Card mi tarjeta sin una app?"
    answer: "A través de Apple AppClip (compartir al instante sin descargar nada, los destinatarios ven tu tarjeta en una ventana emergente del sistema), código QR, pase de Apple Wallet o una URL de perfil web pública. Los destinatarios guardan tu contacto en su móvil con un solo toque - no necesitan instalar NFC.cool ni crear una cuenta."
  - question: "¿En qué se diferencia NFC.cool de otras apps de NFC?"
    answer: "La mayoría de las apps de NFC se centran en leer o en escribir - NFC.cool Tools hace ambas cosas, además de códigos QR, códigos de barras, OCR de documentos, captura 3D y escaneo de habitaciones en una sola app. Otros tres factores diferenciales: privacidad (los datos de los escaneos se quedan en el dispositivo, nunca se envían a servidores de NFC.cool); integración profunda con iOS (App Intents, Atajos, widgets en la pantalla de bloqueo, botón de acción, webhooks) para que los escaneos activen tus propias automatizaciones en lugar de quedar atrapados dentro de la app; y el soporte activo de un desarrollador independiente - el desarrollador lee personalmente cada email y lanza correcciones en pocos días."

