faqTitle: "Perguntas frequentes"
faq:
  - question: "O NFC.cool é gratuito?"
    answer: "Sim - o NFC.cool Tools e o NFC.cool Business Card são gratuitos para transferir. Ler tags NFC, ler códigos QR e códigos de barras, digitalizar documentos com OCR e digitalizar objetos 3D / divisões são todos gratuitos. Uma subscrição Platinum opcional desbloqueia o NFC Safe (segredos encriptados com AES de 256 bits); controlos NFC avançados (formatar, proteger com palavra-passe, bloquear, modos por lote, escrita CSV, comandos de especialista, contador de toques); funcionalidades avançadas de QR (sem marcas de água, leitura por lote); exportação de documentos para PDF e exportação automática para o iCloud; cálculo de área 3D, exportação de modelos e exportação de fotos; Atalhos do iOS, widgets e Centro de Controlo; webhooks; sintetizador de voz; ícones e cores premium da aplicação; e ausência de anúncios e apoio prioritário."
  - question: "Que plataformas são suportadas?"
    answer: "O NFC.cool Tools funciona em iPhone, iPad e Android. O NFC.cool Business Card é exclusivo para iPhone - as suas funcionalidades estão incluídas no NFC.cool Tools no Android, por isso os utilizadores de Android têm as mesmas capacidades de cartão de visita digital sem instalar uma segunda aplicação. No iPad, todas as funcionalidades baseadas na câmara (QR, códigos de barras, documentos, 3D, divisões) funcionam, mas ler e gravar NFC exigem um iPhone, já que os iPads não vêm com hardware NFC."
  - question: "Como começo a usar o NFC.cool?"
    answer: "Transfira o NFC.cool Tools da App Store ou do Google Play e depois explore os separadores: NFC para ler e gravar tags, QR para códigos QR e códigos de barras, Documento para digitalizar papel para PDF, 3D para captura de objetos e divisões. Não é necessária qualquer conta - tudo corre no dispositivo."
  - question: "Como leio a minha primeira tag NFC?"
    answer: "Abra o NFC.cool Tools, toque em \"Ler NFC\" e encoste a extremidade superior do seu iPhone a uma tag NFC - o NFC.cool abre então com uma vista analisada do conteúdo da tag. Não é preciso configurar nada além de instalar a aplicação. Num telemóvel Android também pode experimentar de imediato com o <a href=\"/online-nfc-reader/\">leitor de NFC online</a> - sem necessidade de instalação."
  - question: "Como gravo a minha primeira tag NFC?"
    answer: "Abra o NFC.cool Tools, mude para o separador NFC e escolha \"Gravar NFC\", selecione um tipo de mensagem (URL, credencial Wi-Fi, cartão de contacto, Atalho do iOS e muito mais), introduza os dados e depois encoste a extremidade superior do seu iPhone a uma NTAG216 em branco (ou outra tag compatível com NDEF). Agora qualquer pessoa que toque nessa tag desencadeia a ação que escolheu. Compre tags NDEF em qualquer um dos retalhistas na <a href=\"/affiliate-links/\">página de Tags NFC</a>."
  - question: "O NFC.cool funciona offline?"
    answer: "Sim. Ler e gravar tags NFC, ler códigos QR, ler códigos de barras, OCR de documentos e captura de 3D / divisões correm todos inteiramente no dispositivo. Apenas as funcionalidades opcionais na nuvem (webhooks para o seu servidor, Sincronização iCloud) precisam de internet."
  - question: "Que tags NFC funcionam com o NFC.cool?"
    answer: "Qualquer tag NFC compatível com NDEF - NTAG213, NTAG215, NTAG216, MIFARE Ultralight, ICODE SLIX e a maioria das outras. A NTAG216 é a predefinição recomendada para uso geral, graças à sua capacidade de 888 bytes e à ampla compatibilidade com iPhone e Android. Consulte a <a href=\"/affiliate-links/\">página de Tags NFC</a> para retalhistas testados."
  - question: "O NFC.cool consegue ler códigos QR e códigos de barras?"
    answer: "Sim - são reconhecidos 19 formatos de código a partir da câmara do iPhone ou de qualquer foto na sua galeria: 6 códigos bidimensionais (Código QR, Micro QR, Aztec, Data Matrix, PDF417, Micro PDF417) e 13 códigos de barras lineares (EAN-13, EAN-8, UPC-E, Code 39 incl. Mod 43, Code 93, Code 128, Codabar, Interleaved 2 of 5, ITF-14, mais as três variantes GS1 DataBar). O UPC-A é lido como EAN-13 com um zero à frente. O modo por lote mantém a câmara aberta para contagens de inventário e registos de entrada em eventos."
  - question: "Posso gravar tags NFC com o meu iPhone?"
    answer: "Sim - todos os iPhones a partir do iPhone 7 conseguem ler e gravar tags NFC com o NFC.cool Tools. Escolha entre mais de 25 tipos de mensagem: URLs, credenciais Wi-Fi, cartões de contacto (vCard), Atalhos do iOS, pagamentos, perfis sociais e muito mais. Encripte primeiro os segredos com o NFC Safe (AES de 256 bits) para fluxos de desbloqueio por toque."
  - question: "O NFC.cool suporta os Atalhos do iOS e o Botão de Ação?"
    answer: "Sim, no nível Platinum. O NFC.cool Tools inclui App Intents, ações nativas dos Atalhos do iOS, widgets no ecrã bloqueado e no ecrã principal, integrações com o Botão de Ação e arranque rápido a partir do Centro de Controlo - encadeie leituras nas suas próprias automações ou desencadeie-as com um só botão. O nível gratuito cobre o fluxo básico de ler e partilhar; a área de Atalhos / widgets / Botão de Ação vive por trás da subscrição Platinum opcional."
  - question: "Como é que o NFC.cool Business Card partilha o meu cartão sem uma aplicação?"
    answer: "Através do Apple AppClip (partilha instantânea sem transferência, os destinatários veem o seu cartão num popover do sistema), código QR, passe da Apple Wallet ou um URL de perfil web público. Os destinatários guardam o seu contacto no telemóvel com um só toque - não precisam de instalar o NFC.cool nem de criar uma conta."
  - question: "Em que é que o NFC.cool é diferente das outras aplicações de NFC?"
    answer: "A maioria das aplicações de NFC foca-se em ler ou em gravar - o NFC.cool Tools faz ambos, mais códigos QR, códigos de barras, OCR de documentos, captura 3D e digitalização de divisões numa única aplicação. Três outros diferenciais: privacidade (os dados das leituras ficam no dispositivo, nunca são enviados para servidores do NFC.cool); integração profunda no iOS (App Intents, Atalhos, widgets no ecrã bloqueado, Botão de Ação, webhooks) para que as leituras desencadeiem as suas próprias automações em vez de ficarem presas na aplicação; e o apoio ativo de um programador individual - o programador lê pessoalmente cada email e lança correções em poucos dias."

