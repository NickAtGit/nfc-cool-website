# Declares CSS display widths so SiteKit's ImageResizer generates appropriately-
# sized WebP variants and emits responsive srcset / sizes on each `<img>`. Without
# this manifest, the pipeline falls back to a heuristic that ships the source
# image at full width to every viewport.
#
# Roles are tested top-to-bottom, first match wins. Keep `default` last.

roles:
  # Page hero - the LCP element on the landing page, features index, per-feature
  # pages, and blog pages, all sharing the unified `.page-hero-visual` markup.
  # Sources are large square screenshots; desktop renders at ~560 CSS px, mobile
  # at max-width 320 CSS px. 560 gives a density srcset of 560w (1x) + 1120w (2x);
  # the 1120w covers a 2x DPR desktop display without over-serving.
  - name: page-hero
    selector: ".page-hero-visual > img"
    desktopWidth: 560
    mobileWidth: 320

  # Feature grid cards - `.landing-feature-image` is locked to height:220px /
  # width:auto at every breakpoint, so it never renders wider than ~220 CSS px.
  # 200 gives a density srcset of 200w (1x) + 400w (2x); the 200w 1x is a ~1.1x
  # upscale of the 220 px slot (imperceptible) and 400w keeps retina sharp.
  - name: feature-card
    selector: "img.landing-feature-image"
    desktopWidth: 200
    mobileWidth: 200

  # Business Card / feature banner image — large below-fold media.
  - name: feature-banner
    selector: ".landing-feature-banner-image > img"
    desktopWidth: 960
    mobileWidth: 720

  # Header logo — rendered at height:28px / width:auto (~114 CSS px).
  - name: logo
    selector: ".sk-site-logo > img"
    desktopWidth: 114
    mobileWidth: 114

  # Small inline avatars (testimonials, App Store reviews, trusted-by icons) —
  # rendered at 40–48 CSS px. 96 px covers 2× DPR.
  - name: small-avatar
    selector: "img.landing-testimonial-avatar, img.landing-review-avatar, img.landing-trusted-icon"
    desktopWidth: 96
    mobileWidth: 96

  # Catch-all — covers blog post images, marketing-page figures, etc.
  - name: default
    selector: "img"
    desktopWidth: 1200
    mobileWidth: 720

mobileBreakpoint: 768
