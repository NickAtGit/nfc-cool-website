# Declares CSS display widths so SiteKit's ImageResizer generates appropriately-
# sized WebP variants and emits responsive srcset / sizes on each `<img>`. Without
# this manifest, the pipeline falls back to a heuristic that ships the source
# image at full width to every viewport.
#
# Roles are tested top-to-bottom, first match wins. Keep `default` last.

roles:
  # Page hero - the LCP element on the landing page, features index, per-feature
  # pages, and blog pages, all sharing the unified `.page-hero-visual` markup.
  # Sources are large square screenshots; desktop renders at ~560 CSS px, mobile
  # at max-width 320 CSS px. 560 gives a density srcset of 560w (1x) + 1120w (2x);
  # the 1120w covers a 2x DPR desktop display without over-serving.
  - name: page-hero
    selector: ".page-hero-visual > img"
    desktopWidth: 560
    mobileWidth: 320

  # Feature grid cards - `.landing-feature-image` is locked to height:220px /
  # width:auto at every breakpoint, so it never renders wider than ~220 CSS px.
  # 200 gives a density srcset of 200w (1x) + 400w (2x); the 200w 1x is a ~1.1x
  # upscale of the 220 px slot (imperceptible) and 400w keeps retina sharp.
  - name: feature-card
    selector: "img.landing-feature-image"
    desktopWidth: 200
    mobileWidth: 200

  # Business Card / feature banner image — large below-fold media.
  - name: feature-banner
    selector: ".landing-feature-banner-image > img"
    desktopWidth: 960
    mobileWidth: 720

  # Header logo — rendered at height:28px / width:auto (~114 CSS px).
  - name: logo
    selector: ".sk-site-logo > img"
    desktopWidth: 114
    mobileWidth: 114

  # Small inline avatars (testimonials, App Store reviews, trusted-by icons) —
  # rendered at 40–48 CSS px. 96 px covers 2× DPR.
  - name: small-avatar
    selector: "img.landing-testimonial-avatar, img.landing-review-avatar, img.landing-trusted-icon"
    desktopWidth: 96
    mobileWidth: 96

  # Feature-page subsection images - the alternating two-column rows on every
  # /features/{slug}/ page. `.feature-subsection` is `grid-template-columns:
  # 1fr 1fr` inside the 1200 px content column, so the image cell renders at
  # ~510 CSS px on desktop. Below the 760 px breakpoint the row stacks to one
  # column and the image fills the card (~700 CSS px). 560 gives a density
  # srcset of 560w (1x) + 1120w (2x).
  - name: feature-subsection
    selector: ".feature-subsection-visual > img"
    desktopWidth: 560
    mobileWidth: 720

  # Blog / changelog / tag-page card thumbnails - `.blog-card-grid` is
  # `repeat(auto-fit, minmax(280px, 1fr))`, so a card image renders at ~285 CSS
  # px on desktop and tablet, widening to ~600 px only once the grid collapses
  # to a single column on narrow phones. 320 covers the 1x desktop card; 640
  # covers the widest single-column mobile case.
  - name: blog-card
    selector: ".blog-card-image > img"
    desktopWidth: 320
    mobileWidth: 640

  # Screenshot gallery on marketing pages - `.page-gallery` lays device shots
  # in an `auto-fit minmax(180px, 1fr)` grid, hard-capped at `max-width: 240px`.
  - name: page-gallery
    selector: ".page-gallery > img"
    desktopWidth: 240
    mobileWidth: 240

  # Catch-all - covers blog post body images, the remaining marketing-page
  # figures, etc.
  - name: default
    selector: "img"
    desktopWidth: 1200
    mobileWidth: 720

mobileBreakpoint: 768
