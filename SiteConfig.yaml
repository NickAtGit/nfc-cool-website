          - title: "Blog"
            url: "/blog/"
          - title: "Support & Kontakt"
            url: "/contact/"
        showSearch: false
        showThemeToggle: true
      footer:
        copyrightName: "NFC.cool"
        startYear: 2017
        showAttribution: false
        links:
          - title: "Funktionen"
            url: "/features/"
          - title: "Online NFC Reader"
            url: "/online-nfc-reader/"
          - title: "Visitenkarte"
            url: "/business-card/"
