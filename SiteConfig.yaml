name: "NFC.cool"
baseURL: "https://nfc.cool"
description: "NFC, QR & Barcode, Document, 3D and Room Scanning - plus a Digital Business Card. The all-in-one scanning toolkit, free on iPhone and Android."
language: "en"

localization:
  defaultLanguage: "en"
  languages: ["de", "ja"]
  translationMode: "manual"
  legalLanguage: "de"

contentDirectory: "Content"
outputDirectory: "_Site"
assetsDirectory: "Content/Assets"
redirectsFile: "redirects.yaml"

# Blog posts use tags as their single taxonomy - no categories. SiteKit
# requires the key to be present, so it is held as an empty list.
categories: []

sections:
  - name: "NFC.cool Blog"
    slug: "blog"
    contentDirectory: "Blog"
    urlPrefix: "blog"
    description: "Guides, comparisons, and how-tos on NFC tags, QR codes, barcodes, and digital business cards on iPhone and Android. Written by the developer behind NFC.cool."
  - name: "Changelog"
    slug: "changelog"
    contentDirectory: "Changelog"
    urlPrefix: "changelog"
    description: "Release notes for NFC.cool Tools, Business Card, and the website."

homePage:
  title: "NFC.cool"
  subtitle: "All-in-one scanning toolkit - free on iPhone and Android"

author:
  name: "NFC.cool"
  email: "info@nfc.cool"

# Per-app rating data injected into the SoftwareApplication JSON-LD blocks on
# the landing page. Refresh manually from App Store Connect / Play Console
# every few months; AI answer engines like Gemini weight these heavily for
# "best NFC app" / "best business card app" type queries.
apps:
  toolsIOS:
    ratingValue: 4.52
    ratingCount: 70660
  toolsAndroid:
    ratingValue: 4.60
    ratingCount: 1280
  businessCardIOS:
    ratingValue: 4.80
    ratingCount: 593

