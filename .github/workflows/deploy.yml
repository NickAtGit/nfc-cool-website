name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      # Translation completeness gate. Runs before the build (sharing the same
      # debug compile) and fails the job on any gap - a missing locale file, an
      # untranslated UI string, a leftover scaffold TODO marker, or an em/en
      # dash in structured data. No `||`, so its exit code is authoritative.
      - name: i18n completeness gate
        run: swift run Site i18n-check

      # Single authoritative build. The previous `|| swift run -c release`
      # fallback silently masked debug-build failures behind a second build.
      - name: Build site
        run: swift run Site build

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_Site'

  deploy:
    # PRs run the gate + build for verification only; deploy is push/dispatch.
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4